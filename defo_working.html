 Brands. … We've got our shows of Darwin, which are essentially fire clay sinks. … We've then got another brand called Perrin and Rowe, which is basically handmade kitchen and bathroom products.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [53:09]** — *\"The self Thermador and Yale North America, all that type of stuff as part of our fortune brands. They're based out of Chicago, the Deerfield Chicago now I think it is. And the other brand that we've got is Victoria and Albert, which we manufacture in South Africa. And it's a fairly high SKU count, probably 300 or 400 products in it that are high-end designer baths.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [21:02]** — *\"We've got a range of electric showers called the E-Series… four variants… I've got an exclusive with Plum World called Emerge… I've got Emotion with pretty much everyone else. I've then got E-Sense with Kingfisher [B&Q/Screwfix]. … It's the same bloody product, the trim's different… we're carrying four times the stock holding.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n---\n\n## Supporting Information\n\n### Current Setup\n- **Amazon UK:** Vendor (1P) only, in steep decline (~£1m FY24 → ~£650-675k FY25, -30% YoY). Existing agency unable to complete Amazon Seller Central setup despite months of trying — KYC and brand-registry tickets still bouncing.\n- **eBay UK:** 62-63 SKUs live since October 2025; part of eBay Pro Trader scaling team; routed through Channel Engine.\n- **B&Q Marketplace:** Live since January 2025; ~£200k in year one with no dedicated marketing — entirely organic; routed through Channel Engine.\n- **Channel Engine:** Operating multi-marketplace order pipe to remove the manual customer-record creation that was overwhelming internal operations.\n- **Direct retail / wholesale:** 20+ direct customers (Plum World, Kingfisher's B&Q & Screwfix, Victorian Plumbing, others). Drop-ship model from Aqualisa's own warehouse for marketplace orders.\n- **Pricing tooling:** Net Rivals (Lengow) — distrusted by Jonathan; actively evaluating alternatives.\n- **Internal capacity:** Thin — Jonathan + Kieran, with Taylor Hotch as analyst; significant pressure already on the warehouse from drop-ship volumes.\n\n> **Jonathan Crowe [03:16]** — *\"We dealt and still do deal with Amazon under a vendor relationship, which doesn't work for me. … We've done almost 200 grand on B&Q Marketplace in the first year. … We currently are listed on eBay. We've got about 62, 63 products… we are now part of that eBay Pro Trader scaling team. … we transitioned across to a channel engine.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [05:50]** — *\"The Amazon bit is where I'm stuck at the minute. Our existing agency have been unable to get us set up onto that Amazon seller platform. They've been raising tickets. … as yet, that Amazon setup seller piece has not moved forward.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [09:19]** — *\"In 2024, we've done just over a million pounds on Amazon. … last year just finished … it's around about 650, 675.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n### Available Budget\n- **Existing agency spend:** ~£4.5-5k/month for combined Amazon + eBay management.\n- **Optimizon retainer (signed):** ~£5k/month — confirmed on the internal Optimizon handover [INTERNAL CALL].\n- **Optimizon ad-tech fee:** 4% of ad spend.\n- **Total marketplace ad budget across channels:** ~£150-175k for FY26 (eBay, B&Q, Screwfix, Victorian Plumbing combined).\n- **Amazon ad spend ceiling FY26:** ~£50-60k achievable; ~£60-68k referenced on internal handover [INTERNAL CALL].\n- **Sponsored Products benchmark referenced:** ~7% of revenue.\n- **Reference points:** Screwfix has delivered ~1200% ROAS on £40-60k ad spend; B&Q Marketplace ~600% ROAS; sets a high internal expectation for Amazon performance.\n- **Risk:** marketing budget for FY26 not yet signed off at time of pitching — Jonathan visibly brac forces a range review; products without testing-house approval will not survive.\n- **2026-2027 stretch goal:** European Amazon expansion (Ireland, France) once compliant range stabilises.\n\n> **Jonathan Crowe [28:03]** — *\"If you put in the 23rd of Feb, I think that gives us, that gives us four weeks to basically get account forms done. The contracts sort of backwards and forwards.\"* *(aqualisa.md, 22/01/2026 — Amazon Services)*\n\n> **Jonathan Crowe [13:39]** — *\"With the new range of launch, the big next gen showers that are coming in. We're launching in mid April … We literally have three or four thousand images. There's different colorways, four colorways. So that will be our big launch.\"* *(aqualisa.md, 22/01/2026 — Amazon Services)*\n\n> **Jonathan Crowe [49:11]** — *\"There's a piece of legislation coming in called the EU Drinking Water Directive… certain materials or finishes … in contact with drinking water are now no longer approved or will no longer be approved from January 27.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Juan Botero [INTERNAL CALL]** — *\"Aqualisa, now we have the kickoff with them tomorrow [9 April].\"* *(aqualisa.md, 08/04/2026 — Aqualisa Handover; **internal Optimizon call**)*\n\n### Services Being Offered (Optimizon scope)\n- **Amazon Seller Central setup** (Aqualisa-owned) using Optimizon's platinum-partner agency relationship to unblock the KYC/brand-registry stalemate.\n- **Optional parallel \"retail / reseller model\"** — Optimizon launching SKUs under their own seller account first, then transferring to Aqualisa once the Aqualisa account is live (offered then deprioritised in favour of full agency model once seller account unblocked).\n- **Hybrid Vendor + Seller management** — protect 1P pricing/content priority while reclaiming buy-box on out-of-stock or strategically priced lines.\n- **Full agency service:** catalogue ingestion, content (titles, bullets, descriptions, A+ pages, brand store, brand storey, carousel images), creative, paid media (Sponsored Products → DSP → retargeting), reporting and analytics.\n- **eBay UK & B&Q Marketplace:** explicitly **out of scope** for this engagement at Jonathan's request — he wants Optimizon focused on Amazon.\n- **Future scope discussed:** Amazon Europe (FR/IT/ES) post-2027 compliance, premium-brand expansion onto John Lewis-style marketplaces, eBay if/when needed.\n\n> **Juan Botero [02:26]** — *\"Our team will be running your Amazon business. … running the business, optimizing all the content, ensuring that the catalog is set up correctly, that variations are set up correctly. We'll do a full ingestion of your catalog first… UPCs, EANs, GTINs, SKU numbers, model numbers, SRPs, cost… dimensions, all the product dimensions as well, and pack configurations.\"* *(aqualisa.md, 22/01/2026 — Amazon Services)*\n\n> **Juan Botero [03:58]** — *\"On the content side, we'll gather all the assets from you, and we'll create a fully optimized what best in class would look like… carousel images, brand store, A+ page, brand story… On advertising, we'll take care of full funnel advertising. So everything from DSP, we'll start with search… retargeting them with advertising… data and analytics.\"* *(aqualisa.md, 22/01/2026 — Amazon Services)*\n\n> **Juan Botero [10:17]** — *\"You can launch all the items and the tail items or items that you don't have on the vendor, get them listed under us while we get you set up. … This just gives you speed.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n---\n\n## Motivation\n\n### KPIs / Goals\n- **Double Amazon turnover in FY26:** £1.2-1.3m (from ~£650-675k in FY25).\n- **B&Q Marketplace:** £300-350k in FY26 (from ~£200k in FY25).\n- **Maintain status as the only double-digit-growth channel in the wider Aqualisa business.**\n- **12-18-month glide path to £1.2m on Amazon** explicitly agreed with Optimizon.\n- **Achieve ROAS that unlocks more budget** — willing to use ROAS as a budget-release mechanism at thresholds of 1,000%+.\n\n> **Jonathan Crowe [37:03]** — *\"I'm expecting to double my turnover on last year. So… I'm expecting 1.2, 1.3 million.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [03:16]** — *\"We've done almost 200 grand on B&Q Marketplace in the first year. … I'm hoping to be sort of 3, 3.50 this year on B&Q Marketplace.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [35:29]** — *\"I'm the only channel that was in double-digit growth last year, right?\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Juan Botero [25:19] / Jonathan Crowe [25:31]** — *\"So I do think that what we talked about, the 1.2 million, within 12 to 18 months, we should be able to definitely get there.\" — \"Yeah, no, I agree with my, my view is you say it's, it's not as if we've never done this before… we've got history, recent history.\"* *(aqualisa.md, 22/01/2026 — Amazon Services)*\n\n### Main Problems / Current Challenges\n- **Amazon vendor death-spiral** — 30% YoY decline; no pricing levers; Amazon hasn't taken a price increase in 5-6 years; aggressively undercutting his trade customers.\n- **Seller Central setup blocked** — incumbent agency unable to clear Amazon KYC/brand-registry process; \"painful\" tickets being bounced for months.\n- **Incumbent agency under-delivers** — operationally focused, \"very light\" on strategy; no advertising; phase-2 imagery (120 SKUs) overdue and Jonathan has \"low expectations.\"\n- **Internal content gap** — no internal resource to produce optimised listings; envious of Plum World-tier content but no investment available.\n- **Range complexity / \"monster\"** — historic exclusive-led SKU strategy created 4× variants of same product per channel; carrying 4× stock; actively unwinding.\n- **Pricing architecture** — distrusts current Net Rivals tool; data quality poor; no dynamic repricing.\n- **Internal politics & warehouse strain** — drop-ship-led marketplace push has put significant pressure on the warehouse; \"I'm not everybody's friend.\"\n- **Parent-co budget pressure** — US HQ aggressively trimming marketing budgets across the group.\n\n> **Jonathan Crowe [07:34 / 07:48]** — *\"Sure. I have no control. … No control on pricing. Our Amazon business is about 30% down year on year. … They have got the best prices in the market and it's causing me some pain in other parts of the business as well as my own customers where Amazon are able to sell some of our products at a far cheaper price than a lot of our other customers.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [24:46]** — *\"I have low expectations on of that next wave of feedback... I have been disappointed by their effectiveness and efficiency around creating that optimized content for the listings.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [22:38]** — *\"We don't have the resources internally to be able to fulfill that … Plum World... their content is extremely good. Our own suite of imagery and content is not as good as I would like it to be. And obviously, to improve that, involves a lot of cost of investment, which we don't currently really have.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [19:41]** — *\"As a business, we have created a monster with exclusive items for that very reason. … we are unwinding all of that work because it's caused us so much complexity. It's got out of hand.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe (undiarised)** — *\"I've come in and just fuck it. Let's dropship. … I've now put a lot of pressure on the business. We're now dropship for eBay. We're dropshipping for B&Q Marketplace. … I'm not everybody's friend at the minute in our warehouse.\"* *(aqualisa.md, 16/01/2026 — Marketplace Partner)*\n\n### Fears\n- **Trade-channel revolt** — alienating 20+ direct retail/distribution customers if Amazon undercuts on price; \"I can't take the carpet from underneath them.\"\n- **Amazon undercutting his own trade book** — r brands onto the right marketplaces** — Perrin & Rowe, Victoria + Albert, Shaws of Darwen onto John Lewis Marketplace and similar premium destinations.\n- **Establish Optimizon as a long-term, future-proofed partner** rather than a transactional vendor.\n\n> **Jonathan Crowe [03:16]** — *\"We had this multi-marketplace strategy that we wanted to go after.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [49:11]** — *\"We obviously have a business or businesses or customers in Ireland that we service at the minute, of which Amazon could be, should be, part of that as well as maybe B&Q, eBay and France. Let's take on the world, let's get that Ferrari.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [53:09]** — *\"In a couple of years time, can we start putting some of this product [V&A, Perrin & Rowe] in the right places with the right marketing treatment behind it? … here in the UK, we've got a business called John Lewis and for me, some of those products should be totally on that John Lewis marketplace.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [39:46]** — *\"What I want to try and use is, I guess that tightrope I refer back to. Sell lots of stuff on marketplace, but use it also as a benchmark to try and keep the price elevated in the market.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n---\n\n## Objections\n\nJonathan's objections are **practical and self-aware** rather than adversarial. He is essentially pre-sold by 22/01 — but flags real constraints.\n\n- **Cost vs incumbent:** Optimizon's fees are higher than the current agency; he will have to defend that internally with his boss.\n- **Scope discipline:** Wants Optimizon focused on Amazon only — pushed back on doing eBay or B&Q via Optimizon (\"at the minute, it's working\").\n- **Investment-vs-write-off risk:** Pushed back on optimising any range that will be deprecated by the EU Drinking Water Directive — won't pay for content on dead SKUs.\n- **Internal speed of decision-making:** Aqualisa is \"not the most dynamic business in the world\"; US legal / parent-co contract review will introduce delay.\n- **Budget headroom:** \"Ferrari for Mondo money\" — the marketing budget is not yet signed off and is expected to be trimmed.\n- **Optimizon capacity:** Explicitly asked Optimizon if the rapidly growing organisation could take Aqualisa on properly.\n\n> **Jonathan Crowe [12:17]** — *\"It's a bit more than what we're currently paying the current agency, but, you know, arguably, my expectation is I'm going to be getting a better service. So again, I'm happy to have that argument.\"* *(aqualisa.md, 22/01/2026 — Amazon Services)*\n\n> **Jonathan Crowe (undiarised)** — *\"Amazon's the real painful piece for me at the minute. … I'm not saying [Optimizon] couldn't do a better job [on B&Q/eBay]. But at the minute, it's working. … hopefully we can find some common ground there.\"* *(aqualisa.md, 16/01/2026 — Marketplace Partner)*\n\n> **Jonathan Crowe (undiarised)** — *\"I don't see the benefit in optimizing those three ranges for essentially by time we get started, I'll ask it. Nine, ten months worth of benefit to then start again at the end of the year. … Let's let's fix what we need to for the essentials.\"* *(aqualisa.md, 16/01/2026 — Marketplace Partner)*\n\n> **Jonathan Crowe [27:14]** — *\"I wouldn't put fab warning [Feb 1] because it's not, it's not going to happen that quickly. We are not the most dynamic business in the world.\"* *(aqualisa.md, 22/01/2026 — Amazon Services)*\n\n> **Jonathan Crowe [48:24]** — *\"Is there anything you think these are worried about? I'm assuming, do you have the capability to take this on? I know obviously the organization is growing. Is there anything you're worried about or concerned about?\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n---\n\n## Evaluations\n\n### Sentiment\n**Highly positive, increasingly committed across the call sequence.** Warm, candid, often humorous; volunteers commercial detail freely (revenue figures, internal politics, named retail customers); explicitly not shopping the engagement; ready to internally champion Optimizon to his boss by 22/01. By 8 April [INTERNAL CALL], the contract is signed and Juan describes him as \"super easy going\" and the team is \"excited about this one.\" The arc is clearly **late-stage qualification → close**, not early discovery.\n\n> **Jonathan Crowe [58:08]** — *\"Yeah, I'm not talking to anybody else and I have no plans to, so. I want this to try and work so hopefully we can get this off the ground.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe (undiarised)** — *\"Listen. I'm fine with that. That sounds good.\"* *(aqualisa.md, 16/01/2026 — Marketplace Partner; agreeing to Juan's parallel retail-model proposal)*\n\n> **Jonathan Crowe [12:17]** — *\"I think the fixed fee one sounds fine. I will need to … I've got a call with my boss tomorrow afternoon, so I'll take him through this and just get his view on it and make sure he's on board with it.\"* *(aqualisa.md, 22/01/2026 — Amazon Services)*\n\n> **Juan Botero [INTERNAL CALL]** — *\"John, super easy going guy. … this is a good one. I like, I'm excited about this one.\"* *(aqualisa.md, 08/04/2026 — Aqualisa Handover; **internal Optimizon call** — Optimizon's read on Jonathan)*\n\n### Decision-making Criteria\n1. **Strategic capability over operational delivery** — Jonathan was unimpressed that the incumbent's \"strategy has been very light to date.\"\n2. **Speed to unblock Amazon Seller Central** — biggest single-issue criterion at first contact.\n3. **Future-proofing / international footprint** — visibly impressed by Optimizon's German office investment (\"Sounds like you already have the Ferrari, James\").\n4. **Long-term partnership orientation** — \"this isn't a six month relationship.\"\n5. **Demonstrable ROAS / quality of advertising** — current agency \"didn't even have an active advertising plan\" historically.\n6. **Cost vs value** — accepts higher cost only if backed by demonstrably better service.\n7. **Pareto-led prioritisation** — wants the \"15 items that will bring 90% of the sales\" approach, not boil-the-ocean.\n8. **Capacity / org maturity of partner** — explicitly asked if Optimizon could absorb the workload.\n\n> **Jonathan Crowe [27:06]** — *\"I think they're more operational, I think, if I'm honest. They're sort of the strategy, yeah, has been very light to date.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [55:24]** — *\"Sounds like you already have the Ferrari, James.\"* *(aqualisa.md, 14/01/2026 — Aqualisa; in response to James describing European/global office expansion)*\n\n> **Jonathan Crowe (undiarised)** — *\"Could we have a target ROAS? So if there was a target return on ad spend that we were going over, that would unlock more budget. … I'd like to think sort of a thousand percent plus.\"* *(aqualisa.md, 16/01/2026 — Marketplace Partner)*\n\n### Alternatives\n- **Incumbent agency (name not stated in any call)** — won the original pitch ~18 months ago; £4.5-5k/month; rolling month-to-month since September 2025; operationally focused; behind on phase-2 imagery; unable to unblock Seller Central. Jonathan: \"I'm not naive. I know that they're, if I didn't think they were working hard enough before, they're not going to be working any harder now.\"\n- **No active competitive pitch from any other agency** — Jonathan has not shopped the engagement.\n- **Pricing tools evaluated:** Net Rivals (incumbent — distrusted); Pricer (Danish, \"too expensive\"); Acuity / formerly BrandView / now Wavia (not convinced).\n- **Optimizon-suggested alternatives:** Nimble (Nimbleway), PriceSpider.\n\n> **Jonathan Crowe [33:08]** — *\"I'm happy to move as soon as we've got another solution in place. The agency have said that the contract is rolling at the minute. It finished in September last year and I haven't signed a new one. … I'm not naive. I know that they're, if I didn't think they were working hard enough before, they're not going to be working any harder now.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [29:03]** — *\"It's awful. It's not dynamic, it's difficult to use. I don't fully trust the data in it. … it's just about better than nothing.\"* *(aqualisa.md, 22/01/2026 — Amazon Services; on Net Rivals)*\n\n### Key Features (what stands out about Optimizon)\n- **Platinum-partner Amazon relationship** — Optimizon can reach into Amazon directly to unblock Seller Central setup (\"a few weeks, a month\") versus the incumbent's year-long stall.\n- **Hybrid Vendor + Seller strategy** — preserves vendor's content/buy-box priority while reclaiming control via Seller; resonated immediately.\n- **Parallel \"retail / reseller\" launch model** — gave Jonathan a path to start selling immediately on Optimizon's own seller account while his Aqualisa account was being created (later superseded once seller account unblocked).\n- **International / European office footprint** — feeds his post-2027 EU expansion ambition.\n- **Strategic + creative + paid-media + analytics under one roof** — addresses incumbent's strategic gap.\n- **Clarity around content scope and ownership** — Jonathan probed IP/content ownership and got clear answers.\n- **Pragmatic, prioritised approach** — Pareto-style \"15 items doing 90% of sales\" framing aligned with his constraints.\n- **Long-term partner narrative** — ability to grow into House of Rohl premium brands.\n\n> **Jonathan Crowe [15:09]** — *\"In terms of scale and speed on the face of it sounds like a very good idea.\"* *(aqualisa.md, 14/01/2026 — Aqualisa; on the parallel retail-model proposal)*\n\n> **James Pitts-Drake [14:13]** — *\"We can have Amazon support setting up a Seller Central account quite quickly. … We've had experience with it within a few weeks, a month.\"* *(aqualisa.md, 14/01/2026 — Aqualisa; the unblock pitch Jonathan latched onto)*\n\n> **Jonathan Crowe [42:47]** — *\"Yeah, yeah, yeah.\"* *(aqualisa.md, 14/01/2026 — Aqualisa; agreement on James's \"15 items will bring 90% of sales\" Pareto framing)*\n\n---\n\n## Vision\n\n### Vision of Success\nFor Jonathan, success is a **future-proofed, multi-marketplace digital business** that doubles Amazon revenue in year one, gives him real pricing and promotional levers back, and leaves room to scale into Europe and into the premium House of Rohl portfolio without re-tooling the partner stack.\n\nConcretely, within the next 12-24 months success looks like:\n- **£1.2-1.3m on Amazon UK in FY26**, on a glide path to multiples of that as Seller + Vendor hybrid matures and the next-gen smart-shower range lands.\n- **B&Q Marketplace at £300-350k** alongside a continuing eBay Pro Trader presence — a balanced UK marketplace portfolio.\n- **Pricing and promotional control restored** via Seller Central, with 1P vendor used strategically rather than as a price-eroding default.\n- **Channel harmony with the 20+ direct trade customers** preserved — marketplace operating as a price *anchor*, not a price *destroyer*.\n- **Range simplified** ahead of the EU Drinking Water Directive (January 2027) — fewer SKUs, fewer channel-exclusive variants, less stock-holding pain.\n- **International expansion** unlocked: Ireland, France, broader EU Amazon as compliance settles; selectively seeding Perrin & Rowe / Victoria + Albert / Shaws of Darwen onto John Lewis-style premium marketplaces.\n- **Optimizon embedded as a long-term partner** rather than a transactional one — \"this isn't a six month relationship.\"\n\n> **Jonathan Crowe [37:03]** — *\"I'm expecting to double my turnover on last year. … 1.2, 1.3 million.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [49:11]** — *\"Let's take on the world, let's get that Ferrari.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [53:09]** — *\"In a couple of years time, can we start putting some of this product in the right places with the right marketing treatment behind it? … some of those products should be totally on that John Lewis marketplace.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Jonathan Crowe [56:13]** — *\"This isn't a six month relationship kind of thing. … providing all the boxes are being ticked, then there's no reason why this shouldn't be a longer term relationship.\"* *(aqualisa.md, 14/01/2026 — Aqualisa)*\n\n> **Juan Botero [INTERNAL CALL]** — *\"What I like about this one is they're part of a portfolio of brands. Right? So right now, we just started with Aqualisa. But I think the opportunity to expand with a lot of other brands and across more channels is good.\"* *(aqualisa.md, 08/04/2026 — Aqualisa Handover; **internal Optimizon call** — Optimizon's view of the strategic upside)*\n\n---\n\n## Notes from the Internal Optimizon Handover (08/04/2026)\n\nPer the project instructions, points sourced from the **internal Optimizon-only call** are flagged separately here. None of the items below are Jonathan's own words — they are Optimizon team commentary captured during the handover from sales (Juan Botero) into delivery (Joshua Sinclair, Dean Hawes, Massimo Dattoma, Alberto Nipitella):\n\n- Jonathan (\"John\") characterised by Juan as **\"super easy going\"** and an exciting, expandable client.\n- **Retainer confirmed at ~£5k/month** (\"5k a month. Yeah. Really good stuff.\").\n- **Approximate Amazon ad spend on contract referenced as ~£60-68k** (\"60 k. 68. Okay.\").\n- **Kickoff scheduled 9 April 2026** (\"we have the kickoff with them tomorrow\").\n- Strategic upside flagged: Aqualisa is part of a wider Fortune Brands / House of Rohl portfolio — opportunity to **expand into Perrin & Rowe, Victoria + Albert, Shaws of Darwen and additional channels** over time.\n- **Content state described as \"very poor\"** by Optimizon delivery; planned execution starts with a single brand-level A+ usable across all items, then brand store, then carousel images for top sellers, then category-specific A+ pages.\n- **Aqualisa is launching a new line of items for 2027** (next-gen smart showers + post-Drinking Water Directive range refresh).\n- **Aqualisa-side primary contact for delivery: Jonathan Crowe**, with **Taylor Hotch** (analyst) named as a supporting contact who will help feed the SKU priority list.\n"}, {"filename": "Draper-Tools_2026-04-24_1400.md", "folder": "Individual Personas", "content": "---\nclient_name: Draper Tools\nparticipants:\n  - name: Simon Del Nevo\n    role: Managing Director, Draper Europe\n    company: Draper Tools (Draper Europe)\n    email: sdelnevo@drapertools.com\n    linkedin: https://www.linkedin.com/in/managingdirector-simon-del-nevo-/\n  - name: Kyle Duggan\n    role: E-commerce Project Manager (UK-based, supporting Draper Europe)\n    company: Draper Tools\n    email: kduggan@drapertools.com\n    linkedin: null\ntags:\n  - persona\n  - prospect\n  - draper-tools\nsource_transcripts:\n  - draper-tools.md (21/04/2026 — two calls)\n  - draper.md (10/03/2026 — Amazon UK Audit Next Steps)\ngenerated_at: 24/04/2026\n---\n\n# Persona: Simon Del Nevo — Draper Tools (Draper Europe)\n\n## Summary\n\nSimon Del Nevo is the Managing Director of Draper Europe — a newly-carved-out arm of a family-owned, UK-headquartered tool manufacturer (Draper Tools) with ~14,000 SKUs. An experienced e-commerce and marketplaces operator who previously led Greenworks (Chinese-backed) and knows Optimizon from that engagement, Simon is driving a high-pressure turnaround of Draper's fragmented European digital business out of a Netherlands base. He is pragmatic, direct, politically astute and self-aware about the internal resistance he faces from a \"parochial\", dealer-first UK leadership — and is essentially running a \"stealth mission\" to prove e-commerce works in Europe before attempting to wrest control of the struggling UK vendor account. He comes to the table already sold on Optimizon's capability (via the prior Greenworks relationship) and is looking for a trusted, low-friction partner to launch Amazon Germany (seller + FBA), eBay and Bol.com with a test-and-learn, 30-SKU-at-a-time approach.\n\n- Decision-maker with high trust in Optimizon already — says \"I just knew that this is the right relationship. I haven't spoken to anyone else.\"\n- Focused on Europe (Germany, France, Italy, Netherlands) via 3P/seller + FBA, not UK vendor (UK vendor is hemorrhaging — £2M+ YoY decline)\n- Primary goal: hit ~£1M in new European marketplace revenue within 12–24 months; growth over profitability in year one\n- Existing agency Rhythm is underperforming on UK (spending ~£15k/month, revenue down £2.5M); Simon would \"kick them out the door\"\n- Key constraints: thin team, weak product content, internal politics with UK parent and dealer channel, Effect Connect feed system still being wired up\n- Sentiment: highly engaged, positive, playful and candid — uses humour and the occasional expletive; ready to commit and move forward on retainer + commission-on-growth structure\n- Open-book, wants clear strategy: \"James, Optimizon, they're the keys. This is what I want to achieve — go and do your work.\"\n\n---\n\n## Profile Info\n\n### Name & Role\n- **Simon Del Nevo**, Managing Director of **Draper Europe** (based in the Netherlands, frequently UK-travelling). Previously ran **Greenworks** Europe (Chinese-owned power tools brand), where he engaged Optimizon. In post for roughly nine months at time of these calls.\n- Working with **Kyle Duggan** (UK-based), his e-commerce project manager, previously part of a 3-person team that built Avala (air-con / dehumidifier brand).\n\n> **Simon Del Nevo [01:20]** — *\"Lots of opportunities, lots of things to do… just fairly full up in a different way to how it was at Globe… This is just a lot of opportunity without the chaos that my previous boss brought with it.\"* *(draper-tools.md, Call 1)*\n\n> **Simon Del Nevo [36:14]** — *\"Europe is something they don't understand, right?… I've come in and I'm making pretty swingeing changes. I mean, I've had five people out there in nine months.\"* *(draper-tools.md, Call 1)*\n\n### Personality\n- **Direct, candid and plain-spoken** — doesn't sugar-coat internal dysfunction or underperforming partners\n- **Politically astute and strategic** — picks battles, uses \"stealth\" tactics inside the organisation\n- **Self-deprecating and humorous** — makes jokes about his team, his own forgetfulness, and the business\n- **Pragmatic, action-oriented** — wants progress in small, compoundable steps rather than big-bang plans\n- **Experienced and confident** — speaks from pattern-matching against prior roles (Greenworks especially)\n- **Mildly irreverent** — will drop a profanity when exasperated, then acknowledge it\n\n> **Simon Del Nevo [21:39]** — *\"I'd be kicking them out the door. I mean, I don't know why they're still there.\"* *(re: incumbent agency Rhythm, draper-tools.md, Call 1)*\n\n> **Simon Del Nevo [23:42]** — *\"I don't want to be in competition with a warehouse in Europe with some guy in his bedroom in fucking Scunthorpe.\"* *(draper-tools.md, Call 1)*\n\n> **Simon Del Nevo [27:49]** — *\"This is a bit of a stealth mission. It's like I feel like I'm trying to snatch Maduro from…\"* *(draper.md / draper-tools.md, Call 2)*\n\n> **Simon Del Nevo [61:38]** — *\"It will be small-minded parochialism between some people that are British and they don't really understand the big wide world. And they'll think this crazy Englishman that runs Europe is coming here and stealing my turnover.\"* *(draper-tools.md, Call 1)*\n\n### Values\n- **Trust and long-term relationships** — chose Optimizon without shopping around, based on prior Greenworks success\n- **Performance and accountability** — \"skin in the game\" partnerships (prefers sales-based over ad-spend-based commission)\n- **Autonomy and local empowerment** — wants Europe to operate as its own functioning business, not a UK \"customer\"\n- **Pragmatism over perfection** — willing to accept content imperfections to get products live\n- **Results-transparency** — open book, wants data-driven P&L decisions on SKU selection\n\n> **Simon Del Nevo [45:38]** — *\"You think about how the remuneration looks. I mean, in principle, I'm fine to look at it. I think I'd rather do some sort of sales-based rather than spend based because I feel like it means you've got more skin in the game to be honest.\"* *(draper-tools.md, Call 1)*\n\n> **Simon Del Nevo [62:28]** — *\"I haven't spoken to anyone else, right? I just knew that this is the right relationship.\"* *(draper-tools.md, Call 1)*\n\n### Potential Demographics (Prospect)\n- Male, late 40s–50s (based on career arc — long tenure at Greenworks, multiple MD-level roles)\n- British expat / UK-national working into a Dutch/European operation\n- Senior commercial / general management background; deep e-commerce and marketplaces expertise\n- Communicates in English; operates across UK, Netherlands, Germany, France, Italy\n\n### Company Background\n- **Draper Tools** — UK-based, family-owned tool manufacturer and distributor with ~14,000 SKUs\n- Brand architecture: **Draper** (core), **Draper Expert** (premium), **Ozzo** (low-end online price-fighter, not co-branded)\n- Product categories: hand tools, automotive tools, construction, power tools (being reorganised), garden, workshop equipment (similar to Clarke / Machine Mart)\n- Acquired **Delta International** in 2018 during Brexit panic; now rebranded **Draper Europe**, operating from a Netherlands warehouse\n- Core European customer base: **automotive trade distributors** (e.g. Euro Car Parts-equivalents) — ~80% of today's Draper Europe revenue; largely off-line, trade-focused\n- **UK Amazon Vendor:** £6.5M last year → £4.4M this year (-£2M); UK Drop-ship account down ~£500k\n- **Amazon EU presence:** France (~£870k), Italy (~£600k), Amazon EU SARL (~£1M — likely SuperPicks warehouse/drop-ship), Amazon Netherlands only ~£10k, UK seller only ~£50k — \"appalling\"\n- **No direct Germany vendor account visible** — Germany sales likely routed via UK or SuperPicks\n- Current UK agency: **Rhythm** (relationship Simon views as broken)\n- New feed platform: **Effect Connect** (Dutch, contract being signed) — gateway to Bol.com, Amazon, eBay\n- Previous Greenworks MD; knows Nozzle, James Pitts-Drake, Cassie, Charlotte, Jazz, Shelby from that engagement\n\n> **Simon Del Nevo [14:38]** — *\"The UK 1P, the vendor account, is hemorrhaging. It's 2 million down. So it was six and a half this time last year. It's 4.4 this time this year… we're basically hemorrhaging. Two and a half million on Amazon so far this year… This should be a 10 to 12 million account.\"* *(draper-tools.md, Call 1)*\n\n> **Simon Del Nevo [12:06]** — *\"14,000 [SKUs].\"* *(draper-tools.md, Call 2)*\n\n---\n\n## Supporting Information\n\n### Current Setup\n- Hybrid Amazon: UK Vendor (1P) + small UK 3P + European vendor/SuperPicks set-up likely routing stock from UK into Germany/France/Italy\n- No active Amazon Germany direct account; no current eBay presence in UK or Europe; no Bol.com yet (launching)\n- Fragmented agency/management: UK team runs vendor; Europe effectively treated as a \"customer\" of UK\n- Thin European team — one strong resource (Kyle Duggan), one junior, weak Delta-legacy staff\n- New website under development; ERP with mini-PIM functionality in place\n\n> **Simon Del Nevo [03:10]** — *\"The quality and organization of our data… we have thousands of products, so there's enough for me to look at. But I think we need to go through chunk by chunk and just start small and grow and build.\"* *(draper-tools.md, Call 1)*\n\n> **Simon Del Nevo [04:14]** — *\"We've basically agreed terms with a company called Effect Connect, which is the feed engine… They're into pretty much all of the marketplaces we would want to be in. They've got Bol.com, which will be the one we test first. But from there, I want to run into Amazon as quick as I can, and eBay, particularly eBay.\"* *(draper-tools.md, Call 2)*\n\n### Available Budget\n- Ad budget: benchmarked against Greenworks model — **~15% of revenue re-invested into ads** as target; starts small and scales\n- Initial ad spend: \"a couple of grand just to start off with to see what return we get\" (James's suggestion — Simon agreed)\n- Agency fees: open to **retainer + commission on growth/sales** model; indicative retainer figure discussed was £3–4k/month (James floated, no commitment)\n- Simon explicitly prefers commission on **sales** (not ad spend) because it creates shared incentive\n\n> **Simon Del Nevo [30:12]** — *\"In principle, my approach last time round of 15% on advertising and marketing, which is a big number, percentage wise is a big number. I feel very comfortable with it. I think we should be putting that much into it.\"* *(draper-tools.md, Call 2)*\n\n> **Simon Del Nevo [22:03]** — *\"If we're on 3P, I would certainly be thinking about the same way that we structured it with Greenworks, that I'd be looking at 15% of revenue to go back in.\"* *(draper-tools.md, Call 1)*\n\n### Project Timeline\n- Effect Connect setup late Q1 / early Q2 2026; Bol.com live in early January (first market)\n- Amazon Germany (seller) next — SKU list by end of April/early May 2026\n- Launch in cohorts of **30 SKUs**, scaling \"30 at a time\"\n- Target: **£1M** in European marketplace revenue within 12–24 months (open to faster)\n- Optimizon to send P&L template; Simon to return SKU list with weights/retail/dimensions ASAP\n\n> **Simon Del Nevo [46:37]** — *\"I'm going to come up with a big round number… if I'm not doing a million somewhere along the line pretty quickly, it feels like with the number of SKUs we've got and the potential we've got… That's okay. Is it 12, 18, 24 months? It's in the planning horizon.\"* *(draper-tools.md, Call 1)*\n\n> **Simon Del Nevo [46:54]** — *\"A million is my number. If you think more is realistic with the pace that we can serve you product, then I'm open to it.\"* *(draper-tools.md, Call 2)*\n\n### Services Being Sold\n- Amazon Germany **Seller Central** set-up (plus auto-coverage for FR/IT/ES)\n- **FBA** on SKUs ≥ £20 retail; **FBM / vendor hybrid** on smaller items\n- Amazon product strategy, listing optimisation, A+ content (free tier), image/AI creative uplift\n- Paid media management (Sponsored Products, AMC data via Nozzle integration)\n- **eBay Germany** set-up + management (deferred scope — big automotive potential)\n- **Bol.com** as secondary channel (Effect Connect integration)\n- Amazon Global Logistics advisory (FBA consolidation from China)\n- Reporting, data, AMC / Nozzle insights, bundle-building, content localisation (with proper translation partner)\n\n> **James Pitts-Drake [07:49]** — *\"We can set you up on the German Amazon Seller Central. We can introduce you to Amazon directly… a lot of agencies obviously don't offer that because we're a platinum partner agency, so we've got that support internally.\"* *(draper-tools.md, Call 2)*\n\n---\n\n## Motivation\n\n### KPIs / Goals\n- **Growth first** — establish a \"chunky sale value\" in Europe quickly\n- ~£1M European marketplace revenue within 12–24 months; stretch higher if product flow allows\n- Profitable (but not super-profitable) in year one; low cost-to-serve is the unlock\n- Build brand awareness on Amazon — \"just by being more visible on Amazon, that's going to help the Draper brand enormously\"\n- Prove the model so control of European vendor accounts can be wrested back from UK\n\n> **Simon Del Nevo [31:32]** — *\"As long as I'm profitable, I'm not trying to be super profitable… I don't need any salesmen, I don't need to be doing much. If we go FBA, I won't need much in the way of customer services.\"* *(draper-tools.md, Call 2)*\n\n> **Simon Del Nevo [32:20]** — *\"Growth and brand awareness are the two key things I'm looking for… I need sales going through the European company.\"* *(draper-tools.md, Call 2)*\n\n### Main Problems / Current Challenges\n- UK Amazon vendor account in steep decline (-£2M YoY); poor content, poor advertising execution by incumbent agency\n- No clear direct-to-Germany Amazon relationship; stock and demand mis-routed through UK / SuperPicks\n- Very high loss-buy-box rate from UK 3P resellers hoovering up margin (e.g. \"Best Buy DE\" in Lombard Road London; Moto Dak in France)\n- Product content is weak: one-image listings, generic A+, translation howlers (\"plasterer's hawk\" → \"plasterer's bird of prey\")\n- Pricing architecture is broken — no real RRP, just inflated \"list prices\" being discounted\n- Retail-price control weak → margin unpredictability for 3P\n- Tiny, unskilled European team and resource-constrained content operation\n- Internal politics: UK parent treats Draper Europe as a \"customer\", not a sister; dealer-first mindset resists online growth\n\n> **Simon Del Nevo [18:39]** — *\"I don't think our advertising is worth a lick, really. I mean, they keep telling me we got a ROAS of 10, but we're two and a half million down on last year for Christ's sake. Something's not right.\"* *(draper-tools.md, Call 1)*\n\n> **Simon Del Nevo [15:33]** — *\"Actually there's almost no retail price in Draper. They have this list price which is a bullshit number that they then discount from.\"* *(draper-tools.md, Call 2)*\n\n> **Simon Del Nevo [04:46]** — *\"The team in Europe, well, they're weak… e-commerce frightens everybody to death and they're trying to force me into not doing it, which I'm ignoring.\"* *(draper-tools.md, Call 2)*\n\n### Fears\n- Internal political blow-up — being accused of \"stealing turnover\" from the UK team\n- Antagonising dealer customers (e.g. Euro Car Parts equivalents) who threaten to delist Draper for going online\n- Team/warehouse capacity can't cope with volume ramp if Amazon explodes\n- Content and translation quality — risk of embarrassing mistakes in German/French automotive/tool terminology\n- Being unable to move fast enough to show results before internal resistance hardens\n- UK-3P resellers undercutting European pricing and torpedoing buy-box economics\n\n> **Simon Del Nevo [10:25]** — *\"If I went to the business and said, you need to route all your European Amazon through us, there'll be internal bullshit going on, right? And probably my warehouse isn't quite there. It could catch us out by surprise a little bit in terms of volumes.\"* *(draper-tools.md, Call 2)*\n\n> **Simon Del Nevo [50:04]** — *\"The problem with the translations for the tool business is there are so many specific terms that can be misconstrued. So many. I mean, we've had some absolute howlers.\"* *(draper-tools.md, Call 1)*\n\n> **Simon Del Nevo [05:00]** — *\"Car parts retailers, right? So the e-commerce frightens everybody to death and they're trying to force me into not doing it.\"* *(draper-tools.md, Call 2)*\n\n### Aspirations\n- Transform Draper Europe from a neglected acquisition into a fully-functioning pan-European e-commerce operation\n- Eventually take over management of European vendor accounts from the UK team\n- Grow Draper brand visibility and equity across Germany, France, Italy, Netherlands, Spain\n- Prove a \"test case\" in Europe that can then be scaled back into a 10x-ed UK account\n- Build a scalable cost-to-serve model (FBA-led) that doesn't require headcount bloat\n\n> **Simon Del Nevo [62:12]** — *\"If the test case works, then you can see the shape of the UK account. They're already doing some volume there. So that could be scaled 10x, I think.\"* *(draper-tools.md, Call 1)*\n\n> **Simon Del Nevo [20:06]** — *\"There's a bit of an integration thing going on where slowly, slowly they're starting to realize that they've got to love it, right?… It will become a fully functioning part of the business. And once that happens, I've got a much better chance of being able to take the vendor accounts and manage them out of Europe.\"* *(draper-tools.md, Call 2)*\n\n---\n\n## Objections\n\nSimon is already sold — objections are **soft, practical and self-aware** rather than adversarial.\n\n- **Speed of content production** — realistic that Draper's internal bandwidth will frustrate Optimizon; flagged proactively\n- **SKU-economics on low-priced items** — individual spanners at £4.99 are uneconomic to ship; threshold of ~£20 retail agreed\n- **Internal political risk** — needs a structure that doesn't look like Europe is poaching from UK\n- **Budget sizing uncertainty** — can't commit big numbers until proof points land; 15% of \"nothing is still nothing\"\n- **No strong objection to pricing/commercial model** — actively offers 15%-of-ad-spend or sales commission structures himself\n- **Concern about team seniority on Optimizon side** — wants the \"A-team\" he knew from Greenworks (Cassie, Charlotte, Jazz, Shelby)\n\n> **Simon Del Nevo [41:08]** — *\"I think we probably need to just get this out at the moment is this might be the area that becomes frustrating for you is my ability to throw resource at the content won't be there in the beginning.\"* *(draper-tools.md, Call 1)*\n\n> **Simon Del Nevo [12:06]** — *\"We sell for instance individual spanners. Well, if I sell an individual spanner and post it to Germany, I'm going to be losing my ass. So I've got to find the thresholds.\"* *(draper-tools.md, Call 2)*\n\n> **Simon Del Nevo [30:27]** — *\"15% of nothing is still nothing. So I've got to set a monthly budget that we can start with to see where it goes. And I've got no idea.\"* *(draper-tools.md, Call 2)*\n\n> **Simon Del Nevo [45:42]** — *\"The fact I've only got one good person and maybe a couple of helpers to throw back at you, that's okay. You're not scared by that?\"* *(draper-tools.md, Call 2)*\n\n---\n\n## Evaluations\n\n### Sentiment\n**Highly positive and engaged** — warm, informal, trusting, collaborative throughout. Uses humour, volunteers commercial information freely (revenue breakdowns, internal politics, competitor relationships), and is actively problem-solving in real time with James. Explicit trust statements and proactive co-design of the commercial structure indicate a deal that is in late-stage qualification rather than early discovery.\n\n> **Simon Del Nevo [49:17]** — *\"Tell me what turns you on, I think. I mean, look, all I know, right? All I know is I want you guys doing it.\"* *(draper-tools.md, Call 2)*\n\n> **Simon Del Nevo [62:28]** — *\"I just knew that this is the right relationship.\"* *(draper-tools.md, Call 1)*\n\n### Decision-making Criteria\n1. **Trust and prior track record** — Greenworks-era results with Optimizon are the single biggest factor\n2. **Team quality** — knows individual Optimizon staff by name; wants the \"A-team\"\n3. **Platinum-partner capability** with Amazon (direct account-setup support)\n4. **Pragmatic phased approach** — 30 SKUs at a time, test-and-learn, not a big-bang proposal\n5. **Commercial alignment** — retainer + sales-based commission (skin in the game)\n6. **Breadth of marketplace coverage** — Amazon + eBay + Bol.com (not just Amazon-only)\n7. **Capability to handle Germany specifically** — local team, bilingual support\n\n> **Simon Del Nevo [45:06]** — *\"I'm just trying to put the people that I want the agency to — I'm just trying to put the roles to the people that I remember from last time around.\"* *(draper-tools.md, Call 2)*\n\n### Alternatives\n- **Rhythm** (incumbent UK agency): \"Kicking them out the door\" — essentially ruled out for Europe\n- **Internal UK vendor team**: organisationally adjacent; Simon deliberately avoiding dependency on them\n- **Amazon direct / vendor expansion**: possible but would deepen UK dependence\n- **No active competitive pitch from other agencies** — Simon has not shopped the engagement\n- **eBay-native specialists (e.g. Frixion for premium HTML content)** mentioned as a sub-contractor not a competitor\n\n> **Simon Del Nevo [05:09]** — *\"Happily I've got a guy based in the UK, Kyle Duggan, who is very well versed in e-commerce… He's unhappy with Rhythm, we're not using Rhythm.\"* *(draper-tools.md, Call 2)*\n\n### Key Features (what stands out about Optimizon)\n- **Prior trust from Greenworks** — zero ramp-up on credibility\n- **Amazon Platinum Partner status** — direct Amazon account-setup support\n- **German office investment** — boots on the ground, bilingual team coming\n- **Full-funnel capability** — strategy, listings, creative, paid media, data (Nozzle + AMC)\n- **Pragmatic 30-SKU phased approach** — aligned to Simon's resource reality\n- **People Simon knows and trusts** (Cassie, Charlotte, Jazz, Shelby, Dan — ex-Amazon)\n- **Ability to bring in adjacent partners** (Frixion for eBay HTML content, Amazon Global Logistics)\n- **Creative cost efficiency via AI** — listing images uplifted without upfront creative fees\n\n> **Simon Del Nevo [07:06]** — *\"They seem highly proficient… but I want you guys on board. I want you working for me.\"* *(draper-tools.md, Call 2)*\n\n> **Simon Del Nevo [52:49]** — *\"We're a gift that keeps on giving. If we get this, if we learn how to spin it, we can really get moving.\"* *(draper-tools.md, Call 2)*\n\n---\n\n## Vision\n\n### Vision of Success\nDraper Europe becomes a fully-functioning, pan-European e-commerce operation — starting with a disciplined seller-central + FBA launch in Germany, rolled out to France, Italy, the Netherlands (Bol.com) and eventually Spain, combined with a strong eBay automotive-led presence. Success in the next 12–24 months looks like:\n\n- **£1M+ European marketplace revenue**, on a trajectory to multiples of that as SKU counts scale from 30 → hundreds → thousands\n- **Brand visibility uplift** for Draper across German and European Amazon search — currently near-zero sponsored presence\n- **Reclaimed control of the European vendor accounts** from the UK team\n- A **proof-case** that can be exported back into the UK vendor relationship — \"scaled 10x\"\n- A **scalable, low-cost-to-serve operating model** (FBA-led, Optimizon-operated) that doesn't require adding European headcount\n- Clean separation between European 3P/seller business and UK-based 3P resellers (closing the global-settings loophole; removing parasitic UK-based sellers from European listings)\n\n> **Simon Del Nevo [62:12]** — *\"If the test case works, then you can see the shape of the UK account. They're already doing some volume there. So that could be scaled 10x, I think.\"* *(draper-tools.md, Call 1)*\n\n> **Simon Del Nevo [32:20]** — *\"I'm pretty sure that if we can show a really interesting proportional growth quite quickly, wresting control of the European vendor, it won't be hard to do.\"* *(draper-tools.md, Call 2)*\n\n> **Simon Del Nevo [59:26]** — *\"There's so many with zero. So our seller account in the UK is appalling. We can outperform the UK. I'm looking forward to this.\"* *(draper-tools.md, Call 1)*\n"}, {"filename": "Meta ICP Persona-Emerging Consumer Brands-003--2026-04-30--1430.md", "folder": "Meta Personas", "content": "---\ntype: meta-persona\ngroup: Emerging Consumer Brands\ninstance_id: \"003\"\ngenerated_date: 2026-04-30\ngenerated_time: \"14:30\"\nprospects:\n  - client_name: 92 Degrees Coffee\n    participants:\n      - name: Gerard\n        role: Co-founder / Director\n        company: 92 Degrees Coffee\n        email: ~\n        linkedin: https://www.linkedin.com/in/gerard-enfort-78174926\n      - name: Jack\n        role: Co-founder / Director\n        company: 92 Degrees Coffee\n        email: ~\n        linkedin: ~\n  - client_name: BarberNo1\n    participants:\n      - name: Harry Hussain\n        role: Founder / Owner\n        company: BarberNo1\n        email: ~\n        linkedin: ~\n      - name: Jamie\n        role: Operations / Growth Lead\n        company: BarberNo1\n        email: ~\n        linkedin: ~\n  - client_name: Assisi Pet Care (A CCO)\n    participants:\n      - name: Trevor Smith\n        role: Head of E-commerce\n        company: Assisi Pet Care / A CCO\n        email: trevor.smith@assisipetcare.com\n        linkedin: https://www.linkedin.com/in/thetrevorsmith/\n      - name: John Bradley\n        role: Amazon Day-to-Day / Vendor Operations\n        company: Assisi Pet Care / A CCO\n        email: john.bradley@assisipetcare.com\n        linkedin: ~\n---\n\n# Meta ICP Persona — Instance 003 — Emerging Consumer Brands\n\n**Generated:** 2026-04-30 14:30 | **Prospects covered:** 92 Degrees Coffee, BarberNo1, Assisi Pet Care (A CCO)\n\n> **Data strength note:** Assisi (3 meetings, 147 min, active client) is the strong anchor. 92 Degrees Coffee (2 meetings, 54 min total) provides medium depth. BarberNo1 (3 meetings — 1 discovery + 2 onboarding/kickoff) is medium-depth but the lead has been silent since 07/11/2025 (167 days at time of writing). No internal meetings are flagged for this group, so all quotes are from external prospect-side speakers.\n\n---\n\n## Summary\n\nThis persona centres on **smaller, growth-stage consumer/lifestyle brands** where Amazon is positioned as a primary acquisition and growth channel rather than a channel-conflict problem. Across the three accounts the same archetype emerges: a **founder-led or founder-adjacent commercial owner** (often the founder themselves, an e-com lead reporting directly to founders/VC, or a head of e-commerce inside a VC-rolled-up portfolio) who treats Amazon as a strategic growth bet. The product is genuinely differentiated (artisan coffee, premium hair styling, natural pet treats), the brand has organic momentum (social, retail, footballer endorsements, retail listings), and the team is bootstrapped or capital-disciplined. Compared to the Heritage Manufacturers persona, these prospects worry less about channel conflict and more about **new-to-brand acquisition, ad efficiency, content/digital-shelf execution, and scaling without burning capital**. The pain is universal: a previous agency or in-house attempt has either burnt through ad spend with no NTB to show for it, or has failed to push the right hero SKU. The opportunity for Optimizon is to be the **strategic partner that proves a profitable acquisition motion**, with full-funnel ad activation (DSP where appropriate), a digital-shelf refresh, and reporting that survives both founder scrutiny and (in Assisi's case) VC scrutiny.\n\n**Key profile bullets:**\n- UK-based growth-stage consumer/lifestyle brands; either founder-led (92 Degrees, BarberNo1) or VC-backed buy-and-build (Assisi)\n- Premium or differentiated product positioning — vegan/sugar-free/kosher (BarberNo1); single-origin artisan coffee with retail roastery (92 Degrees); natural pet treats with strong category share (Assisi)\n- Predominantly **Seller (3P) and FBA**, with Assisi running a hybrid Vendor + FBA + 3P mix; Amazon is positioned as a growth and acquisition channel\n- Revenue range: small (BarberNo1 ~1k–1.4k units/month before scale; 92 Degrees with no Amazon presence yet) to substantial (Assisi ~£2.1m+ vendor sell-in)\n- Decision-maker is **the founder, founder-adjacent, or a head of e-com directly answerable to founders / VC backers** — not buried in a corporate matrix\n- Primary pains: previous agency under-delivered on NTB / wasted ad spend; weak digital shelf or under-pushed hero SKU; thin internal team; tight margin discipline; in Assisi's case post-acquisition integration debt and VC pressure\n- Decision criteria: agency strategic credibility, full-funnel capability (incl. DSP), tight ad-spend discipline, NTB measurement, transparency, and partnership feel\n- Budget profile: **bootstrapped / staged** — willing to scale ad spend if the early KPIs land; not willing to burn capital on vanity metrics\n- Aspirations: become category leader; cross-channel orchestration (D2C, retail, Amazon); for VC-backed Assisi, hit return milestones and consolidate brand portfolio\n\n---\n\n## Cross-Company Overlapping Issues\n\n### 1. Previous Agency / Internal Setup Wasted Ad Spend with No NTB to Show\nThe single strongest shared pattern in this group: an earlier attempt at paid Amazon advertising failed because it was defensive, brand-search-only, or front-loaded.\n\n- **BarberNo1:** Promised 2,000 units/month, peaked at ~1,363 in month 3, fell back. Ad budget burnt through in 1–2 weeks of each month. _\"They originally come to us like June, July and they put a little roadmap in place for us… were given them certain retainer not spend per month from what were finding houses that they were utilizing all the ad spend within a week or two weeks of the month.\"_ — [00:17] Jamie, 29/10/2025\n- **BarberNo1:** _\"When we challenged them they were a bit reactive with it. So we would put up a few question marks out and then that was when we started question, oh, we'll be partnered with the right guys. So we promised us 2000 units within three months. The max we got to was 1363 and then we realized new to brand customers it was very, very little.\"_ — [00:17] Jamie, 29/10/2025\n- **BarberNo1:** _\"This is the thing and it, this is where we sat back with the other guys. We were like, why are we playing so defensive? Like people are organically coming for our salt spray. We've got this Invincia boost pad and nothing's happening with it.\"_ — [23:47] Jamie Barbersno1, 07/11/2025\n- **Assisi:** Inherited integration failure on a key brand: _\"What the previous management team were very good at was acquiring brands, what they were absolutely appalling at, was integrating brands and driving them forward.\"_ — [00:05] Trevor Smith, 02/03/2026\n- **Assisi:** _\"When I arrived, we did singly the worst pop job of doing a relaunch where we effectively added 50% more more volume to the recipe that no one knew they needed… we increased the price by by 50 to 60% without telling them… And then we did no advertising to tell them that they did needed any of that. So it was it was one of the things that we inherited when we arrived. It's been an absolute car crash.\"_ — [00:10] Trevor Smith, 02/03/2026\n- **92 Degrees:** No prior Amazon presence at all — they explicitly want a partner that gets it right from the start. _\"We've to push through e-commerce. It's always just been us through our website, really. It's never been like a maximum focus.\"_ — [04:31] Gerard, 14/01/2026\n\n### 2. Strong Brand Equity Off-Amazon — Not Yet Captured On-Amazon\nAll three have meaningful presence in their primary channel (retail/wholesale, social, D2C) but Amazon is under-leveraged relative to that strength.\n\n- **BarberNo1:** _\"We've got about 4 million views per month. And this is something we want to start utilizing… there is a lot of traction that we're not, you know, we're not utilizing or we're not capitalizing on.\"_ — [09:28] Jamie, 29/10/2025\n- **92 Degrees:** _\"We do coffee better than anybody else. When people have the product, they go nuts about it. And it's getting that thing, isn't it? It's getting people to have the product.\"_ — [06:33] Gerard, 14/01/2026 _(brand strength established through stores, network rail travel locations, franchising, but no Amazon presence yet)_\n- **Assisi:** _\"We're the second largest, the second natural treats brand that's not… that kind of body part based company or a biscuit. You know, good boy are are much bigger than us, but we're the second.\"_ — [00:05] Trevor Smith, 20/02/2026\n- **Assisi (omnichannel):** _\"We're in kind of everything from grocery through wholesale through to pet and vet specialists. Or yeah. We have our own DTC.\"_ — [~00:35] Trevor Smith, 20/02/2026\n\n### 3. Premium / Differentiated Positioning — Not Wanting the Race-to-the-Bottom\nAll three deliberately do not want to compete on price; they want Amazon to amplify the brand, not commoditise it.\n\n- **BarberNo1:** _\"We do have a superior product, superior packaging, superior offering. For example, we have a lot of usps. We're vegan, we're sugar free… we tick all the boxes that are the desirables that people want as a consumer. But we're positioning ourselves as a premium product, a premium growth and therefore it's not going to sit under the typical pricing.\"_ — [25:23] Harry Hussain, 08/09/2025\n- **BarberNo1:** _\"The only biggest horror story I hear from people, there's a very good few businesses that are doing well making money, but there's a lot of businesses that are not making money. And you know that. Let's not get into that trap.\"_ — [19:31] Harry Hussain, 08/09/2025\n- **92 Degrees:** _\"We're trying to take over the world, aren't we?\"_ — [04:01] Gerard, 14/01/2026 _(stated as a half-joke, but consistent with their growth ambition: 10-year-old brand, expanded into Network Rail travel locations, just launched franchising)_\n- **Assisi:** _\"Haulings and pet munchies are the two priorities areas. We're we're all about sort of effectively exploding out through proposition.\"_ — [~00:10] Trevor Smith, 02/03/2026\n\n### 4. NTB / New-to-Brand Acquisition is the KPI That Matters\nFor these brands, NTB is THE metric — not gross sales, not ROAS alone. Amazon is positioned explicitly as an acquisition channel.\n\n- **BarberNo1:** Previous agency delivered units but failed on NTB — _\"new to brand customers it was very, very little.\"_ — [00:17] Jamie, 29/10/2025\n- **Assisi:** _\"There's a discussion with our with our VC backers, which is 30% of new to brand is really important to fill the funnel with new who are who are coming getting in. But the reality, Trevor, is that 70% potentially could have bought anyway.\"_ — [00:15] Trevor Smith, 20/02/2026 _(Trevor explicitly identifies the tension between the VC's NTB ambition and the underlying acquisition reality)_\n- **92 Degrees:** Whole conversation framed around discovery / sampling / new-buyer acquisition: _\"Just a way to get more kind of eyes and exposure, get people to have that tangible contact with the brand and the coffee.\"_ — [06:33] Gerard, 14/01/2026\n\n### 5. Bootstrapped / Capital-Disciplined Mindset on Ad Spend\nTwo of three are bootstrapped; the third (Assisi) is VC-backed but operating under tight Q1 cash discipline.\n\n- **BarberNo1:** _\"We're not ads experts, we're not marketing experts. We've built this business from the ground up, bootstrapping it gorilla market. We've never paid a penny on advertisements ever. So this is all new to us.\"_ — [09:28] Jamie, 29/10/2025\n- **BarberNo1:** Staged spend — willing to scale to ~£18k/month once a 2,000 units/month milestone is hit. Quarterly review gates negotiated. _\"We've, we've done a deep dive on the numbers where we go, say for instance, we put 4,000 that spend per month across all products. We get to 2,000 units. As soon as we reach that 2,000 units, they'll be happy to increase the ad spend.\"_ — [30:25] Jamie, 29/10/2025\n- **92 Degrees:** _\"Our pitifully small marketing budget and what we can do to make it better… distilled it down. It needs to be more effective than the equivalent of standing in the street and just giving away that much money.\"_ — [22:09] Gerard, 14/01/2026\n- **Assisi:** _\"We have other European brands within our portfolio… that are dedicated to that through our Polish team. But we're not actively going to really ramp up in other country because the reality is… there's no point sticking on Amazon, right, in a country where you haven't got the the big bucks to try and do the breakthrough.\"_ — [~00:10] Trevor Smith, 02/03/2026 _(disciplined market entry, refusing to spread thin)_\n\n### 6. Aspirational Brand Ambition — Wanting a Real Strategic Partner, Not a Service Vendor\nAll three want a partner that brings ideas, owns outcomes, and can be trusted to execute — not just a \"place ads on Amazon\" vendor.\n\n- **BarberNo1:** _\"We just want to leave this down to you guys now, using the experts, we want you to tell us what we, you know, it's not down to us to support in and tell you how to do your job. It's where he is supporting you guys now on as much. What you need from us, whether it's invincible, whether it's marketing, whether it's creative for Jazz, whatever you need from us, just let us know.\"_ — [27:19] Jamie Barbersno1, 07/11/2025\n- **BarberNo1:** _\"We just want to be number one… we believe our product and our brands are a lot bigger and better. We want to be number one. So we want to now be shown the roadmap to rights is what I believe will get us there.\"_ — [11:51] Jamie, 29/10/2025\n- **Assisi:** _\"Amazon is quite important. It also then means that venture capitalists have a very high focus on on on my area.\"_ — [~00:10] Trevor Smith, 25/03/2026 _(strategic partnership has to satisfy a board-level audience, not just a marketing function)_\n- **92 Degrees:** _\"It's getting people to have the product.\"_ — [06:33] Gerard, 14/01/2026 _(treats sampling-and-Amazon as one strategic motion, not two)_\n\n### 7. Internal Stakeholder Complexity (Different Flavours)\nEach prospect has internal-stakeholder complexity, but it looks different in each company.\n\n- **Assisi:** Post-acquisition integration debt; VC backers as the dominant audience; Trevor describes himself as _\"third or fourth longest serving person in the business. Which given I only arrived in September 24 is is, you know, that's an appallingly short amount of time.\"_ — [00:10] Trevor Smith, 02/03/2026. Two-agency split (Optimizon + Melody) and external VC-introduced tools (Profitero) add friction.\n- **BarberNo1:** Bootstrapped founders, very direct decision chain — but founders are deeply involved in the day-to-day and need to be brought along on every decision (workshops, breakdowns, transparent reporting).\n- **92 Degrees:** Co-founders are operationally hands-on (Gerard \"drove the van for a minute\") — Amazon decision sits within an active operations rebuild (Square till migration, franchising programme, online platform consolidation).\n\n### 8. Heavy Operational Backlog Just to Get Amazon Working Cleanly\nAll three need significant work just to land the basics.\n\n- **BarberNo1:** Hero SKU (Boost Powder, the retail bestseller) has had no Amazon advertising push at all. New product (brush) awaiting cosmetic license. Influencer/footballer assets unused on listings. Product images don't call out the celebrity wearers.\n- **Assisi:** Digital shelf described internally as _\"a disaster at the moment\"_ ; 18-month creative backlog; 1,600+ assets needed; SKUs going permanently unavailable without Optimizon being notified; vendor central transition for Pet Munchies eaches (Jan 2026) recently completed.\n- **92 Degrees:** Square POS just rolled out; e-commerce currently on Shopify; integration to Amazon FBA not yet planned. Amazon-Square API connectivity is the immediate operational question — _\"That's the thing, it's the connectivity piece.\"_ — [06:03] Gerard Bmc, 14/01/2026\n\n---\n\n## Individual Prospect Profiles\n\n### 1. 92 Degrees Coffee\n**Company:** 92 Degrees Coffee | **Category:** Specialty / artisan coffee (whole bean, ground, capsules) | **Amazon model:** None today — Seller / FBA being scoped\n\n92 Degrees is a Liverpool-roastery-led specialty coffee brand celebrating its 10th anniversary. They've expanded from cafés into Network Rail travel locations (Liverpool, Manchester, Leeds, Glasgow, Edinburgh) and just launched a franchising programme. E-commerce has been a Shopify-only D2C channel until now; they're mid-migration to Square as the unified POS+e-com stack. Amazon is being explored as the next growth lever, with Send Me a Sample (sister Smolen brand) layered alongside as a sampling-to-acquisition mechanic.\n\n**Key points:**\n- Co-founder-led (Gerard, Jack); operationally hands-on; conservative on spend\n- 10th anniversary in early 2026; growth via travel locations + franchising\n- Multiple operational migrations in flight (Square POS+e-com, app, subscription, gift-card)\n- Amazon = greenfield; primary commercial question is connectivity/middleware between Square and Amazon FBA\n- Send Me a Sample (Smolen) bundled into the conversation as part of the discovery-to-purchase motion\n- Sentiment: highly engaged, intellectually curious, cautious on spend, building internal alignment\n\n> \"We've grown through into travel locations is a big thing for us now, having built a relationship with Network Rail… So we're now in Liverpool, Manchester, Leeds, Glasgow, Edinburgh.\" — [04:15] Gerard, 14/01/2026\n> \"It needs to be more effective than the equivalent of standing in the street and just giving away that much money.\" — [22:09] Gerard, 14/01/2026\n> \"It's getting that thing, isn't it? It's getting people to have the product. And so, yeah, that's potentially where you can help us.\" — [06:33] Gerard, 14/01/2026\n\n**Red flags:** No Amazon revenue base; multiple operational migrations competing for bandwidth; co-founders have to align on spend; Send Me a Sample integration adds a second commercial conversation in parallel.\n**Green flags:** Clear product differentiation; strong off-Amazon brand equity; sampling-to-Amazon motion is an unusually clean narrative; Smolen group bundling (SMaS + Optimizon) gives a distinctive proposition; co-founder-led decision making is fast.\n\n---\n\n### 2. BarberNo1\n**Company:** BarberNo1 | **Category:** Premium hair styling / personal care (salt spray, boost powder, clay fibre, matte wax, brushes) | **Amazon model:** Seller (FBA), brand-controlled — no third-party reseller exposure\n\nFounder-led British brand (Harry Hussain founder; Jamie ops/growth). Bootstrapped, premium-positioned (vegan, sugar-free, kosher, non-GMO). Strong off-Amazon momentum: ~4M social views/month, several Premier League footballer ambassadors, JD Sports flagship presence. Hero SKU is Salt Spray (organic Amazon traction ~1,000–1,300 units/month). Boost Powder is a retail bestseller but has had no Amazon push. Previous agency engaged June–October 2025 under-delivered on NTB; Optimizon onboarded November 2025.\n\n**Key points:**\n- Founder-led, bootstrapped, premium-positioned\n- Hero SKU performing organically; Boost Powder under-pushed on Amazon (massive untapped lever)\n- ~£3.5–4k/month current ad spend; willing to scale to ~£18k/month if 2,000-units milestone hits\n- Quarterly review gates negotiated — staged commitment, not blank cheque\n- Lapsed engagement: last contact 07/11/2025 — likely heads-down execution post-onboarding (Q4 BFCM, integrations, audit)\n\n> \"We're positioning ourselves as a premium product, a premium growth and therefore it's not going to sit under the typical pricing.\" — [25:23] Harry Hussain, 08/09/2025\n> \"We're not ads experts, we're not marketing experts. We've built this business from the ground up, bootstrapping it gorilla market. We've never paid a penny on advertisements ever. So this is all new to us.\" — [09:28] Jamie, 29/10/2025\n> \"We just want to be number one… we believe our product and our brands are a lot bigger and better. We want to be number one. So we want to now be shown the roadmap.\" — [11:51] Jamie, 29/10/2025\n> \"We just want to leave this down to you guys now, using the experts, we want you to tell us what we, you know, it's not down to us to support in and tell you how to do your job.\" — [27:19] Jamie Barbersno1, 07/11/2025\n\n**Red flags:** 167 days of silence since last contact — needs an active re-engagement attempt to confirm where the relationship sits; bootstrapped means low tolerance for an early-stage spend miss; founders have personally felt previous-agency disappointment.\n**Green flags:** Founder-trust openly expressed; clear hero-SKU + under-pushed-product story to deliver quick wins; brand-controlled Seller account (no reseller hygiene problem); ~4M social views/month gives a real DSP/retargeting opportunity; staged commercial structure de-risks both sides.\n\n---\n\n### 3. Assisi Pet Care (A CCO) — _Active client_\n**Company:** A CCO / Assisi Pet Care | **Category:** Natural pet treats and food (Hollings, Pet Munchies, High Life, Burns, Yakkers) | **Amazon model:** Vendor (1P) primary + FBA + 3P; UK focus, EU paused\n\nVC-backed buy-and-build of natural pet brands. Trevor Smith (Head of E-commerce, joined Sept 2024) leads a new management team integrating brands previously acquired but not properly merged. Amazon is the second-largest channel in the business and the area where VC pressure concentrates. Two-agency split (Optimizon: Hollings, Pet Munchies, High Life; Melody: Burns, Yakkers). Q1 2026 marked by destocking pressure (vendor sell-in down from £2.6m to ~£2.1m), creative backlog (~1,600 assets pending), and a major brand-relaunch failure (High Life recipe/price/comms misfire) that the new team inherited.\n\n**Key points:**\n- Hollings + Pet Munchies are growth priorities; High Life food deprioritised\n- 30% NTB target driven by VC; Trevor openly pushes back on the NTB-vs-incrementality maths\n- DSP planned at meaningful scale (\"not in thousand, but in millions\" referenced in March MBR context)\n- Two-agency split — consolidation possible but not yet decided\n- Inhousing trend: digital media (Criteo, CitrusAd), Amazon Western Europe ops hire\n- EU expansion paused (Brexit packaging compliance for Republic of Ireland; capital-discipline reluctance for full DE rollout despite Pet Munchies opportunity there)\n\n> \"What the previous management team were very good at was acquiring brands, what they were absolutely appalling at, was integrating brands and driving them forward.\" — [00:05] Trevor Smith, 02/03/2026\n> \"There's a discussion with our with our VC backers, which is 30% of new to brand is really important to fill the funnel with new who are who are coming getting in. But the reality, Trevor, is that 70% potentially could have bought anyway.\" — [00:15] Trevor Smith, 20/02/2026\n> \"Amazon is quite important. It also then means that venture capitalists have a very high focus on on on my area.\" — [~00:10] Trevor Smith, 25/03/2026\n> \"We have other European brands within our portfolio that are dedicated to that through our Polish team. But we're not actively going to really ramp up in other country because the reality is… there's no point sticking on Amazon, right, in a country where you haven't got the the big bucks to try and do the breakthrough.\" — [~00:10] Trevor Smith, 02/03/2026\n\n**Red flags:** VC pressure can override commercial judgment; inhousing trend (Amazon Western Europe ops hire) may compress agency scope over time; two-agency split creates consolidation risk; Q1 cash discipline can pull back ad budget mid-cycle; high creative backlog is a delivery bottleneck.\n**Green flags:** Strong category share (#2 in natural pet treats); clear NTB lens makes DSP a natural fit; Pet Munchies + Hollings have real growth headroom; Trevor is data-literate and transparent; Optimizon is the strategic partner of record; subscribe-and-save penetration ~40%+ on retention is a real efficiency lever.\n\n---\n\n## Profile Info — Aggregated\n\n| Prospect | Key Contact(s) | Personality |\n|---|---|---|\n| 92 Degrees Coffee | Gerard, Jack (co-founders) | Operationally hands-on, intellectually curious, dry-humoured, cautious on spend, builds before deciding |\n| BarberNo1 | Harry Hussain (founder), Jamie (ops/growth) | Founder-pride; bootstrapped, ambitious (\"be number one\"); risk-aware after agency burn; transparent and direct |\n| Assisi | Trevor Smith (Head of E-com), John Bradley (Amazon ops) | Sophisticated, data-literate, transparent about internal complexity; pushes back constructively on VC pressure; values partnership over vendor relationship |\n\n### Product / End-Customer Demographics\n- **92 Degrees:** Coffee enthusiasts; café-goers (Liverpool/Manchester/Leeds/Glasgow/Edinburgh); commuters via Network Rail; gift buyers; online/D2C subscribers; potential new acquisition via sampling\n- **BarberNo1:** Style-conscious men 18–40 (and a growing female audience); social-led; influenced by football culture; willing to pay premium for product quality\n- **Assisi:** Dog and cat owners; natural/premium pet food segment; subscribe-and-save friendly; UK-centric; broad demographic but with a quality-conscious lean\n\n---\n\n## Supporting Information — Aggregated\n\n### Current Amazon Setup\n| Prospect | Setup |\n|---|---|\n| 92 Degrees Coffee | None today; Seller (FBA) being scoped; needs Square ↔ Amazon middleware |\n| BarberNo1 | Seller / FBA, brand-controlled, no 3P resellers |\n| Assisi | Hybrid: Vendor (1P) primary + FBA + 3P; multiple brands, two agencies |\n\n### Budget Picture\n| Prospect | Budget Signal |\n|---|---|\n| 92 Degrees Coffee | \"Pitifully small marketing budget\"; staged Send Me a Sample minimum 5,000 samples; Amazon retainer not yet defined |\n| BarberNo1 | ~£3.5–4k/month current ad spend; scaling to ~£18k/month at the 2,000-units/month milestone |\n| Assisi | Active client; DSP at scale (\"millions\" referenced); Q1 destocking caused mid-cycle cash discipline; vendor sell-in ~£2.1m (down from £2.6m); 80/20 acquisition/retention split indicative |\n\n### Decision Timelines\n| Prospect | Timeline |\n|---|---|\n| 92 Degrees Coffee | Square migration → then Amazon scoping in earnest; weeks-not-months on first proposal; commercial decision likely Q2 2026 |\n| BarberNo1 | Onboarded Nov 2025; quarterly review gates; needs re-engagement (last contact 07/11/2025) |\n| Assisi | Active client; FY26 starts April 2026; 2026 plan in execution |\n\n---\n\n## Motivation — Aggregated\n\n### Common KPIs / Goals\n1. **New-to-Brand acquisition** — all three (BarberNo1: explicit gap from previous agency; Assisi: 30% NTB VC mandate; 92 Degrees: sampling-to-purchase motion is the whole point)\n2. **Hero / under-pushed SKU breakthrough** — BarberNo1 (Boost Powder), Assisi (Hollings Sausages, Pet Munchies cases), 92 Degrees (defining the right starter SKU)\n3. **Subscribe-and-save / recurring revenue** — BarberNo1 (build subscriber base via 5% voucher), Assisi (~40% retention via S&S), 92 Degrees (existing Shopify subs to migrate to Square)\n4. **Profitable scale** — all explicitly resist the race-to-the-bottom; want margin discipline alongside growth\n5. **Full-funnel ad activation incl. DSP** — Assisi (planned at scale), BarberNo1 (4M social views/month is a built-in retargeting audience), 92 Degrees (sampling + retargeting on Amazon)\n\n### Main Problems\n- Previous agency under-delivered or is mid-transition (BarberNo1; Assisi inherited)\n- Hero SKU under-pushed / digital shelf weak (BarberNo1, Assisi)\n- Bootstrapped budgets, low risk tolerance for wasted spend (BarberNo1, 92 Degrees)\n- Operational backlog (Assisi creative debt; 92 Degrees migrations; BarberNo1 licensing)\n- Internal stakeholder complexity — VC pressure (Assisi), founder direct involvement (BarberNo1, 92 Degrees)\n\n### Fears\n- Burning ad spend with no NTB to show (BarberNo1 explicit)\n- Falling into Amazon's race-to-the-bottom trap (BarberNo1)\n- VC backlash / failure to hit return milestones (Assisi)\n- Brand integrity erosion if Amazon is mishandled (all three)\n- Margin compression from Amazon vendor destocking (Assisi)\n\n### Aspirations\n- \"Be number one\" in category (BarberNo1)\n- Take over the world (92 Degrees, half-joking, fully serious)\n- Build Europe's largest independent natural pet brand (Assisi)\n- Cross-channel orchestration where Amazon amplifies brand discovery, not commoditises it\n- Long-term agency partnership with strategic depth — not project work\n\n---\n\n## Objections\n\n1. **\"Will this be like the last agency?\"** — BarberNo1 explicitly framed past-burn as a risk; Assisi inherited a multi-agency post-acquisition mess. Optimizon must show velocity and NTB measurement early.\n2. **\"Can we afford it without burning out cash?\"** — 92 Degrees, BarberNo1; bootstrapped, needs staged commitment.\n3. **\"Will the VC sign off?\"** — Assisi; reporting must satisfy the board, not just the e-com team.\n4. **\"How do we integrate this with the rest of our stack?\"** — 92 Degrees (Square → Amazon
