l anything.\" Wants to launch ~10–20 SKUs into UK/EU first, then scale. Padel highlighted as a potentially bigger EU opportunity than squash. Single 33-min discovery call (thin data).\n\n**Key points:**\n- US Amazon: ~$10k/month; 400+ SKUs (rackets, apparel)\n- Wants to start with 10–20 SKUs (rackets only — light, easy to ship) into UK/EU\n- Existing UK distributor underperforming — would happily replace\n- Padel is the larger EU opportunity, but brand strength is in squash\n- Budget signal: $5–10k/month total (\"not a hard cap\"); seasonal (Aug = field hockey ramp; squash season runs to Christmas)\n\n> \"We do a great job of selling in The US, and our target market is basically all of the private clubs around that play squash… We're the number one [for double squash] there by far, but that's, like, being the tallest midget — there aren't that many people playing.\" — [~00:03] [Other] (Jack Knight), 15/04/2026\n> \"It's hard to trust just one channel to have meaningful growth.\" — [~00:25] [Other] (Jack Knight), 15/04/2026\n\n**Red flags:** Single discovery call (thin data); category may be too niche in UK (squash); US-side seasonality limits Europe-first focus; new to Amazon Europe entirely.\n**Green flags:** Brand recognition among squash players is real (top-10 player sponsorships); distributor relationship is replaceable; Optimizon retail/Smolen-group model is a clean fit (Jack: _\"it's hard to trust just one channel to have meaningful growth\"_); padel adjacency offers category expansion.\n\n---\n\n## Profile Info — Aggregated\n\n| Prospect | Key Contact | Personality |\n|---|---|---|\n| Aqualisa | Jonathan Crowe | Direct, commercially sharp, self-deprecating (\"everybody wants a Ferrari for Mondo money\"), pragmatic, ready to move |\n| Blanco | David Kamperman | Modest about Amazon experience, methodical, exploratory; building internal business case |\n| Draper | Simon Del Nevo | MD-level change agent; pragmatic, willing to fight internal politics; Greenworks-trust based |\n| Everlast | Tom Dols | Operationally rigorous, cost-conscious, analytical; bundle strategist |\n| Harrow Sports | Jack Knight | Curious, candid about constraints; small-team mentality; exploratory |\n\n### Product / End-Customer Demographics\n- **Aqualisa:** Mid-to-high-income home renovators; high-consideration purchase (showers £200–£1,200); research-heavy\n- **Blanco:** Premium kitchen renovation; design-conscious homeowners + trade specifiers; high-consideration\n- **Draper:** Trade and pro-am tool buyers; price-aware; multi-category (automotive, construction, hand tools)\n- **Everlast:** Sports/fitness consumers (boxing/combat focus); active 18–45; brand-aware; entry-level price-sensitive\n- **Harrow Sports:** Niche enthusiast (squash players, club members); affluent; international following via pro sponsorships\n\n---\n\n## Supporting Information — Aggregated\n\n### Current Amazon Setup\n| Prospect | Setup |\n|---|---|\n| Aqualisa | Vendor (1P); Seller activation just starting (April 2026) |\n| Blanco | Seller (historic, near-dormant); German vendor fulfilling some UK orders cross-border |\n| Draper | Vendor (1P) UK — declining; small 3P presence; Germany seller setup is the priority |\n| Everlast | Vendor (1P) primary across DE/ES/UK; FBA bundle trial in 3P |\n| Harrow Sports | US Seller (3P); Europe greenfield |\n\n### Budget Picture\n| Prospect | Budget Signal |\n|---|---|\n| Aqualisa | ~£4.5–5k/month current agency; ~£50–60k Amazon ad budget; 2026 sign-off pending |\n| Blanco | ~£5k/month + 5% sales + 4% ad mgmt offered; ad managed from Germany |\n| Draper | Couple of grand starter; willing to scale to ~15% of revenue (Greenworks benchmark) |\n| Everlast | Active retainer (not disclosed publicly); ad spend scaled from ~€6–7k → >€10k/month in 2025 |\n| Harrow Sports | $5–10k/month total — not a hard cap; \"give it a real shot\" |\n\n### Decision Timelines\n| Prospect | Timeline |\n|---|---|\n| Aqualisa | Onboarded; kickoff April 2026 |\n| Blanco | Direction by mid-2026; H2 2026 implementation |\n| Draper | Effect Connect live early 2026; Germany Seller setup end-Jan 2026; UK audit in flight (Mar 2026) |\n| Everlast | Active client; 2026 plan in execution |\n| Harrow Sports | Exploratory; targeting UK squash season (autumn); proposal next |\n\n---\n\n## Motivation — Aggregated\n\n### Common KPIs / Goals\n1. **Stop Amazon revenue decline / restore growth** — Aqualisa, Draper, Everlast (UK)\n2. **Pricing & buy-box control** — all five\n3. **Establish or scale European footprint (UK + DE primary)** — Blanco, Draper, Everlast, Harrow Sports\n4. **Inventory / availability discipline** — Aqualisa, Everlast, Draper\n5. **Channel-conflict-safe Amazon strategy** — Everlast (bundles), Aqualisa, Draper\n6. **Localised content that converts** — Blanco, Aqualisa, Harrow Sports\n\n### Main Problems\n- Vendor terms / declining vendor revenue (Aqualisa, Draper)\n- Pricing & buy-box loss (all)\n- Cloned/non-localised content (Blanco, Harrow, partly Aqualisa)\n- Stalled or non-existent Seller Central setup (Aqualisa, Draper, Blanco, Harrow)\n- Distributor / trade channel conflict (Draper, Aqualisa, Everlast)\n- Inventory & shipping economics (Everlast, Draper, Aqualisa)\n- Internal stakeholder politics (Draper UK team; Blanco Germany; Aqualisa Fortune Brands governance)\n\n### Fears\n- Amazon cannibalising existing retail/distributor relationships (Everlast, Draper, Aqualisa)\n- Investment without ROI / finance pulling budget (Aqualisa, Draper, Harrow)\n- Sunk-cost on content for ranges about to be replaced (Aqualisa)\n- Brand integrity erosion from unauthorised resellers (Aqualisa, Draper)\n- Wrong agency choice — repeating the past failure (Aqualisa, Draper)\n\n### Aspirations\n- Become the controlling brand on Amazon in their category (all)\n- Use Amazon as a price-discipline anchor for the wider channel mix (Aqualisa, Blanco, Draper)\n- Build a multi-market European Amazon footprint (Blanco, Draper, Everlast, Harrow)\n- Long-term agency partnership, not a project engagement (Aqualisa: \"this isn't a six-month relationship kind of thing\"; Draper trust-based with Optimizon)\n\n---\n\n## Objections\n\n1. **Cost / retainer scrutiny** — \"Everybody wants a Ferrari for Mondo money.\" [Jonathan Crowe, Aqualisa]; Harrow $5–10k cap; Draper wants performance scaling.\n2. **Risk of Amazon cannibalising other channels** — Everlast (Decathlon), Aqualisa (showroom/B&Q), Draper (Eurocar Parts).\n3. **Agency switching fatigue / proving the case internally** — Draper UK team resistance; Aqualisa parent-group governance; Blanco Germany sign-off.\n4. **Long approval chains** — Aqualisa (US legal/finance review); Blanco (UK Head of Sales + Germany); Draper (UK team political consent).\n5. **Range / catalogue change risk** — Aqualisa wary of optimising content for ranges that will be replaced by end-2026.\n\n---\n\n## Evaluations\n\n### Sentiment\n| Prospect | Sentiment |\n|---|---|\n| Aqualisa | Highly positive; ready to move |\n| Blanco | Curious / cautious / exploratory |\n| Draper | Cautiously optimistic; trust-led via Greenworks |\n| Everlast | Positive (active client); operationally trusting; transition-watch on team |\n| Harrow Sports | Engaged but early; exploring options |\n\n### Decision Criteria\n1. Strategic depth (not just operational)\n2. Hybrid 1P+3P expertise — vendor, seller, FBA, bundles\n3. Multi-market capability (UK + EU at minimum; some need US support too)\n4. Reporting that satisfies finance / parent group\n5. Continuity of account team\n6. Trust / credibility — case studies, prior relationships, track record\n7. Commercial flexibility (retainer + commission models preferred)\n\n### Alternatives Considered\n- **Aqualisa:** Incumbent agency (rolling, displaced); Optimizon won\n- **Blanco:** No formal alternatives; comparing internally to German team's results\n- **Draper:** Rhythm (UK incumbent) under review; Optimizon trusted via Greenworks\n- **Everlast:** Active Optimizon client; no current competitor in scope\n- **Harrow Sports:** Small US agency they recently engaged; evaluating Optimizon for Europe\n\n### Key Differentiators (what resonated)\n- Hybrid vendor + seller / FBA + bundle expertise (Everlast, Aqualisa, Draper, Blanco)\n- Smolen group breadth (IMA media, retail field, B2B agency, D2C/Shopify) — Harrow Sports specifically engaged on this\n- Retail model (Optimizon-as-seller-of-record) for low-friction market entry — Harrow Sports\n- LingWorks / Effect Connect-style multi-marketplace integration — Draper, Blanco\n- PackView retail-media platform — all\n- Track record with similar heritage brands (Greenworks proof point) — Draper specifically\n\n---\n\n## Vision — What Success Looks Like\n\n| Prospect | Vision |\n|---|---|\n| Aqualisa | Amazon at £1.2–1.3m by end 2026; Seller Central live; pricing controlled; new product line launched well; brand store owned (not by a reseller); Fortune Brands portfolio expansion follows |\n| Blanco | UK Amazon contribution moving toward German proportion (10–20% of turnover); content localised; price integrity maintained; advertising activated |\n| Draper | UK vendor stabilised + grown via hybrid; Germany Seller Central + FBA generating £1m+; Effect Connect live across EU marketplaces; internal UK-team resistance overcome by results |\n| Everlast | 10–15% category share, 2–3M EUR EU; FBA bundle strategy proven and scaled; smooth account team transition; cannibalisation-safe growth across DE/ES/UK |\n| Harrow Sports | UK presence established (squash + padel); replacing under-performing distributor with direct Amazon channel; eventual EU expansion via Smolen group capability |\n\n---\n\n## Recommendations\n\n**1. Lead with the hybrid 1P+3P thesis.**\nEvery prospect in this group has the same fundamental pain: vendor erodes pricing control, and they've either tried and failed to set up Seller Central or haven't started. Optimizon's hybrid model — vendor-as-volume + seller/FBA-as-control + bundles-as-cannibalisation-safe-growth — is the single strongest pitch hook. Use the **Everlast bundle strategy** as a real, working case study in the cannibalisation conversation.\n\n**2. Expect channel-conflict objections — bring the answer pre-loaded.**\nTrade distributors and retail partners actively resist Amazon for these brands. Draper's Eurocar Parts story and Everlast's Decathlon caution are typical, not edge cases. Optimizon should walk into discovery with the channel-management framing: pricing discipline, exclusive-on-Amazon variants, bundles, MAP-equivalent strategies, and \"Amazon as the price anchor\" narrative.\n\n**3. Build the finance / parent-group story early.**\nBudgets are scrutinised, sign-offs are upstream, and Aqualisa, Draper, Blanco and Harrow all have a finance- or HQ-level approval chain. Optimizon should propose a scorecard-first reporting cadence designed for a CFO/finance audience — not just a marketing dashboard. Tier commercial models (e.g. lower retainer + commission on incremental revenue) so the champion has something defensible to present.\n\n**4. Watch for the \"stalled previous agency / incumbent failure\" pattern.**\nAqualisa lost a year on Seller Central setup; Draper is questioning Rhythm's strategic input; Blanco has no agency input at all in the UK. The pitch needs to **prove velocity in the first 60–90 days** — set up Seller Central, fix top-10-by-revenue listings, run a price-control diagnostic, deliver first scorecard. Quick visible wins kill the \"it'll be the same as last time\" objection.\n\n**5. Range and content investment — sequence carefully.**\nAqualisa is mid-range-rationalisation (EU Drinking Water Directive); Blanco needs 850 SKUs localised; Harrow wants 10–20 SKUs ported from US. Don't sell big content-rebuild engagements upfront — sell **diagnostic + minimum viable optimisation** on existing content, then time the heavy investment to coincide with the brand's own launch window.\n\n**6. Use the Smolen group story for cross-channel prospects.**\nHarrow Sports lit up specifically when Juan introduced the wider Smolen group capability (IMA, B2B, D2C). For prospects with a clear \"Amazon is one of several growth channels\" mindset (Harrow, Draper, Aqualisa multi-brand), pulling in the wider group capability is a meaningful differentiator over Amazon-only agencies.\n\n**7. Green flags to look for in this archetype:**\n- Heritage manufacturer with strong brand recognition in category\n- Vendor revenue **declining**, not flat-and-comfortable (declining = budget-justifiable urgency)\n- Single senior commercial owner with autonomy on Amazon (MD, Head of Online, e-com Manager)\n- Existing distributor/retail tension that motivates Amazon as a control lever\n- Mid-to-premium price points (£20+ retail) — sub-£20 economics rarely work\n- Already attempting (or failing at) Seller Central — proves they understand the problem\n\n**8. Red flags to watch:**\n- No hard revenue targets (Blanco) — long sales cycle, low urgency\n- Single discovery call only (Blanco, Harrow) — thin signal; treat synthesis cautiously\n- Parent-company HQ controls advertising (Blanco) or vendor terms (Aqualisa) — limits agency lever\n- Account team transition mid-engagement (Everlast) — relationship risk\n- Range mid-replacement (Aqualisa) — content investment ROI is constrained\n- Internal political resistance to Amazon as a \"real\" channel (Draper UK team) — long internal change curve\n\n**9. Team continuity is a stated and recurring concern.**\nEverlast just lost Dan Walsh; the conversation explicitly addressed transition. Aqualisa's incumbent failure was about turnover and disengagement. Make team continuity visible in pitches — name the day-to-day account lead, name the strategic counterpart, and own the transition narrative if (when) it changes.\n"}];

// ── File Parsing ──────────────────────────────────────────────────────────
function parseFile(raw) {
  const { filename, folder, content } = raw;
  const key = folder + '/' + filename;
  const yamlMatch = content.match(/^---\n([\s\S]*?)\n---\n/);
  const yamlRaw = yamlMatch ? yamlMatch[1] : '';
  const body = yamlMatch ? content.slice(yamlMatch[0].length) : content;
  const meta = parseYAML(yamlRaw);
  const sections = parseSections(body);
  const titleLine = body.split('\n').find(l => l.startsWith('# '));
  const title = titleLine ? titleLine.slice(2).trim() : filename;
  return { key, filename, folder, meta, title, sections };
}

function parseYAML(yaml) {
  const m = rx => { const r = yaml.match(rx); return r ? r[1].trim() : null; };
  const meta = {
    clientName: m(/^client_name:\s*(.+)$/m),
    type: m(/^type:\s*(.+)$/m),
    group: m(/^group:\s*["']?(.+?)["']?$/m),
    generatedDate: m(/^generated_(?:at|date):\s*(.+)$/m),
    tags: [], participants: [], prospects: []
  };
  const tb = yaml.match(/^tags:\n((?:[ \t]+-[^\n]+\n?)+)/m);
  if (tb) meta.tags = [...tb[1].matchAll(/- (.+)/g)].map(x => x[1].trim());
  const ps = yaml.indexOf('participants:\n');
  if (ps !== -1 && !yaml.slice(0, ps).includes('prospects:'))
    meta.participants = parseParticipantBlock(yaml.slice(ps + 'participants:\n'.length), '  ');
  const pr = yaml.indexOf('prospects:\n');
  if (pr !== -1) meta.prospects = parseProspects(yaml.slice(pr + 'prospects:\n'.length));
  return meta;
}

function parseParticipantBlock(block, ind) {
  const parts = []; let cur = null;
  for (const line of block.split('\n')) {
    const nm = line.match(new RegExp('^' + ind + '- name:\\s*(.+)$'));
    const rm = line.match(new RegExp('^' + ind + '  role:\\s*(.+)$'));
    if (nm) { if (cur) parts.push(cur); cur = { name: nm[1].trim() }; }
    else if (rm && cur) cur.role = rm[1].trim().replace(/^~$/, '');
    else if (line && !line.startsWith(ind) && cur) { parts.push(cur); cur = null; break; }
  }
  if (cur) parts.push(cur);
  return parts;
}

function parseProspects(block) {
  const prospects = []; const lines = block.split('\n');
  let cur = null, inP = false, pLines = [];
  for (const line of lines) {
    if (line.match(/^  - client_name:/)) {
      if (cur) { cur.participants = parseParticipantBlock(pLines.join('\n') + '\n', '      '); prospects.push(cur); }
      cur = { clientName: line.replace(/^  - client_name:\s*/, '').trim(), participants: [] };
      inP = false; pLines = [];
    } else if (cur && line.match(/^    participants:/)) { inP = true; }
    else if (inP && line.match(/^      /)) { pLines.push(line); }
    else if (line.match(/^[a-z]/) || (line.match(/^\S/) && !line.match(/^  /))) { break; }
  }
  if (cur) { cur.participants = parseParticipantBlock(pLines.join('\n') + '\n', '      '); prospects.push(cur); }
  return prospects;
}

function parseSections(body) {
  const lines = body.split('\n');
  const sections = []; let cur = null, curLines = [];
  for (const line of lines) {
    if (line.startsWith('# ')) continue;
    if (line.startsWith('## ')) {
      if (cur !== null) sections.push({ title: cur, content: curLines.join('\n') });
      cur = line.slice(3).trim(); curLines = [];
    } else if (cur !== null) { curLines.push(line); }
  }
  if (cur !== null) sections.push({ title: cur, content: curLines.join('\n') });
  return sections;
}

// ── Markdown ──────────────────────────────────────────────────────────────
function mdToHtml(text) {
  const lines = text.split('\n'), out = [];
  let inUl = false, inOl = false, inBq = false, tableRows = [];

  const close = () => {
    if (inUl) { out.push('</ul>'); inUl = false; }
    if (inOl) { out.push('</ol>'); inOl = false; }
    if (inBq) { out.push('</blockquote>'); inBq = false; }
  };

  const parseRow = row => row.split('|').slice(1,-1).map(c => c.trim());
  const isSepRow = row => /^\|[-:\s|]+\|$/.test(row.trim());

  const flushTable = () => {
    if (!tableRows.length) return;
    const sepIdx = tableRows.findIndex(isSepRow);
    const hasHeader = sepIdx === 1;
    out.push('<div style="overflow-x:auto"><table>');
    if (hasHeader) {
      out.push('<thead><tr>' + parseRow(tableRows[0]).map(c => `<th>${fmt(c)}</th>`).join('') + '</tr></thead>');
    }
    out.push('<tbody>');
    const dataStart = hasHeader ? 2 : (sepIdx >= 0 ? sepIdx + 1 : 0);
    for (let i = dataStart; i < tableRows.length; i++) {
      if (isSepRow(tableRows[i])) continue;
      out.push('<tr>' + parseRow(tableRows[i]).map(c => `<td>${fmt(c)}</td>`).join('') + '</tr>');
    }
    out.push('</tbody></table></div>');
    tableRows = [];
  };

  for (const line of lines) {
    if (line.startsWith('|')) {
      close(); tableRows.push(line);
    } else {
      flushTable();
      if (line.startsWith('### ')) { close(); out.push('<h3>' + fmt(line.slice(4)) + '</h3>'); }
      else if (line.startsWith('## ')) { close(); out.push('<h2>' + fmt(line.slice(3)) + '</h2>'); }
      else if (line === '---') { close(); out.push('<hr>'); }
      else if (line.startsWith('> ')) {
        if (inUl) { out.push('</ul>'); inUl = false; }
        if (inOl) { out.push('</ol>'); inOl = false; }
        if (!inBq) { out.push('<blockquote>'); inBq = true; }
        const c = line.slice(2).trim(); if (c) out.push('<p>' + fmt(c) + '</p>');
      } else if (line.match(/^[-*] /)) {
        if (inBq) { out.push('</blockquote>'); inBq = false; }
        if (inOl) { out.push('</ol>'); inOl = false; }
        if (!inUl) { out.push('<ul>'); inUl = true; }
        out.push('<li>' + fmt(line.replace(/^[-*] /, '')) + '</li>');
      } else if (line.match(/^\d+\. /)) {
        if (inBq) { out.push('</blockquote>'); inBq = false; }
        if (inUl) { out.push('</ul>'); inUl = false; }
        if (!inOl) { out.push('<ol>'); inOl = true; }
        out.push('<li>' + fmt(line.replace(/^\d+\. /, '')) + '</li>');
      } else if (line.trim() === '') {
        if (inBq) { out.push('</blockquote>'); inBq = false; }
      } else {
        close();
        if (line.trim()) out.push('<p>' + fmt(line) + '</p>');
      }
    }
  }
  flushTable(); close();
  return out.join('\n');
}
function fmt(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*\*([^*\n]+)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
    .replace(/`([^`\n]+)`/g,'<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
}

// ── Table View ─────────────────────────────────────────────────────────────
function renderTable() {
  const el = document.getElementById('table-view');
  const individuals = FILES.filter(f => f.folder === 'Individual Personas');
  const metas = FILES.filter(f => f.folder === 'Meta Personas');
  let html = `<div style="padding:24px;max-width:1100px;margin:0 auto">
    <div class="page-title">ICP Persona Library</div>
    <div class="page-subtitle">${FILES.length} persona file${FILES.length !== 1?'s':''} · Click any card to read in full</div>
    <div class="refresh-note">↻ Click <strong>Refresh</strong> in the header to request an update when new files are added to GitHub.</div>`;
  if (individuals.length) html += `<div class="section-heading">👤 Individual Personas</div><div class="file-grid">${individuals.map(fileCardHtml).join('')}</div>`;
  if (metas.length) html += `<div class="section-heading">🗂 Meta Personas</div><div class="file-grid">${metas.map(fileCardHtml).join('')}</div>`;
  html += '</div>';
  el.innerHTML = html;
  el.querySelectorAll('.file-card').forEach(c => c.addEventListener('click', () => {
    const f = FILES.find(x => x.key === c.dataset.key); if (f) openFile(f);
  }));
}

function fileCardHtml(f) {
  const { meta, title, folder, key } = f;
  const isMeta = folder === 'Meta Personas';
  const typeBadge = isMeta ? `<span class="badge badge-purple">Meta Persona</span>` : `<span class="badge badge-blue">Individual Persona</span>`;
  const statusBadge = meta.tags.includes('client') ? `<span class="badge badge-green">✓ Client</span>` : meta.tags.includes('prospect') ? `<span class="badge badge-orange">◎ Prospect</span>` : '';
  const groupBadge = meta.group ? `<span class="badge badge-gray">${esc(meta.group)}</span>` : '';
  let accounts = '';
  if (isMeta && meta.prospects.length) {
    accounts = `<div class="file-card-accounts">Covers: ${meta.prospects.map(p=>`<strong>${esc(p.clientName)}</strong>`).join(', ')}</div>`;
    const chips = meta.prospects.flatMap(p=>p.participants.slice(0,2)).slice(0,6);
    if (chips.length) accounts += `<div style="margin-bottom:6px">${chips.map(chipHtml).join('')}</div>`;
  } else if (!isMeta && meta.participants.length) {
    accounts = `<div class="file-card-accounts"><strong>${esc(meta.clientName||'')}</strong></div><div style="margin-bottom:6px">${meta.participants.slice(0,4).map(chipHtml).join('')}</div>`;
  }
  return `<div class="file-card" data-key="${esc(key)}">
    <div class="file-card-icon ${isMeta?'icon-meta':'icon-individual'}">${isMeta?'🗂':'👤'}</div>
    <div class="file-card-body">
      <div class="file-card-title">${esc(title)}</div>${accounts}
      <div class="tags-row">${typeBadge}${statusBadge}${groupBadge}</div>
    </div>
    <div class="file-card-date">${esc(meta.generatedDate||'')}</div>
  </div>`;
}
function chipHtml(p) { return `<span class="pchip"><span class="av-sm">${inits(p.name)}</span>${esc(p.name)}</span>`; }

// ── Detail View ────────────────────────────────────────────────────────────
function openFile(file) {
  currentFileKey = file.key;
  if (!execModes[file.key]) execModes[file.key] = false;
  if (!collapsedSets[file.key]) collapsedSets[file.key] = new Set();
  if (!sectionOrders[file.key]) sectionOrders[file.key] = file.sections.map((_,i)=>i);
  renderDetail(file);
  showView('detail');
  window.scrollTo(0,0);
}

function renderDetail(file) {
  const { meta, title, folder, key, sections } = file;
  const isMeta = folder === 'Meta Personas';
  const isExec = execModes[key]||false;
  const allP = isMeta ? meta.prospects.flatMap(p=>p.participants.map(pp=>({...pp,company:p.clientName}))) : meta.participants;
  const pHtml = allP.slice(0,8).map(p=>`<div class="p-card"><div class="av-md">${inits(p.name)}</div><div><div class="p-name">${esc(p.name)}</div><div class="p-role">${esc(p.role||p.company||'')}</div></div></div>`).join('')+(allP.length>8?`<div class="p-card"><div class="av-md" style="background:#64748b">+${allP.length-8}</div></div>`:'');
  const typeBadge = isMeta?`<span class="badge badge-purple">Meta Persona</span>`:`<span class="badge badge-blue">Individual Persona</span>`;
  const statusBadge = meta.tags.includes('client')?`<span class="badge badge-green">✓ Client</span>`:meta.tags.includes('prospect')?`<span class="badge badge-orange">◎ Prospect</span>`:'';
  const groupBadge = meta.group?`<span class="badge badge-gray">${esc(meta.group)}</span>`:'';
  const dateBadge = meta.generatedDate?`<span class="badge badge-gray">📅 ${esc(meta.generatedDate)}</span>`:'';
  const topbar = `<div class="detail-topbar">
    <span class="bc-home" onclick="goHome()">Home</span><span class="bc-sep">›</span>
    <span class="bc-sep">${esc(folder)}</span><span class="bc-sep">›</span>
    <span class="bc-cur">${esc(title)}</span>
    <div class="detail-spacer"></div>
    <button class="action-btn" onclick="expandAll('${esc(key)}')">⊞ Expand All</button>
    <button class="action-btn" onclick="collapseAll('${esc(key)}')">⊟ Collapse All</button>
    <button class="action-btn ${isExec?'active':''}" onclick="toggleExec('${esc(key)}')">
      ${isExec?'📄 Full View':'✦ Exec Summary'}
    </button>
  </div>`;
  const header = `<div class="detail-title">${esc(title)}</div>
    ${pHtml?`<div class="detail-participants">${pHtml}</div>`:''}
    <div class="detail-meta-row">${typeBadge}${statusBadge}${groupBadge}${dateBadge}</div>`;
  const body = isExec ? renderExecSummary(file) : renderSections(file);
  document.getElementById('detail-view').innerHTML = topbar + `<div class="detail-inner">${header}${body}</div>`;
  if (!isExec) initDragDrop(key);
}

function renderSections(file) {
  const { key, sections } = file;
  const order = sectionOrders[key]||sections.map((_,i)=>i);
  const collapsed = collapsedSets[key]||new Set();
  const toolbar = `<div class="sections-toolbar">
    <span class="toolbar-label">⠿ Drag to reorder · Click chevron to collapse</span>
    <div class="toolbar-spacer"></div>
    <button class="toolbar-btn" onclick="expandAll('${esc(key)}')">Expand All</button>
    <button class="toolbar-btn" onclick="collapseAll('${esc(key)}')">Collapse All</button>
  </div>`;
  const keyId = key.replace(/[^a-z0-9]/gi,'_');
  const cards = order.map((sIdx,pos) => {
    const s = sections[sIdx]; if (!s) return '';
    const isC = collapsed.has(sIdx);
    return `<div class="section-card${isC?' collapsed':''}" data-sec-idx="${sIdx}" data-pos="${pos}" draggable="true">
      <div class="section-header">
        <div class="drag-handle" title="Drag to reorder">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
            <circle cx="4" cy="3" r="1.4"/><circle cx="10" cy="3" r="1.4"/>
            <circle cx="4" cy="7" r="1.4"/><circle cx="10" cy="7" r="1.4"/>
            <circle cx="4" cy="11" r="1.4"/><circle cx="10" cy="11" r="1.4"/>
          </svg>
        </div>
        <div class="section-title-area">${esc(s.title)}</div>
        <button class="section-toggle" onclick="toggleSection('${esc(key)}',${sIdx})">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="2,4 6.5,9 11,4"/></svg>
        </button>
      </div>
      <div class="section-content">${mdToHtml(s.content)}</div>
    </div>`;
  }).join('');
  return toolbar + `<div class="sections-container" id="sc_${keyId}">${cards}</div>`;
}

function renderExecSummary(file) {
  const { key, sections, folder, meta } = file;
  const isMeta = folder === 'Meta Personas';
  const banner = `<div class="exec-banner">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#d97706" stroke-width="1.5"/><path d="M8 4.5v4M8 11h.01" stroke="#d97706" stroke-width="1.8" stroke-linecap="round"/></svg>
    <span><strong>Exec Summary</strong> — condensed view. Click <strong>Full View</strong> to see all sections.</span>
  </div>`;
  const sumSec = sections.find(s => s.title.toLowerCase() === 'summary');
  let html = '';
  if (sumSec) html += `<div class="exec-section"><h2>Summary</h2><div class="exec-body">${mdToHtml(sumSec.content)}</div></div>`;
  if (isMeta) {
    const profSec = sections.find(s => s.title.toLowerCase().includes('individual prospect profile'));
    if (profSec) {
      html += `<div class="exec-section"><h2>Individual Prospects</h2>`;
      extractSubSections(profSec.content).forEach(sub => {
        html += `<div class="exec-prospect"><div class="exec-prospect-name">${esc(sub.title)}</div><div class="exec-prospect-body">${mdToHtml(firstPara(sub.content))}</div></div>`;
      });
      html += '</div>';
    } else if (meta.prospects.length) {
      html += `<div class="exec-section"><h2>Companies Covered</h2>`;
      meta.prospects.forEach(p => {
        html += `<div class="exec-prospect"><div class="exec-prospect-name">${esc(p.clientName)}</div>`;
        if (p.participants.length) html += `<div class="exec-prospect-body"><em>${p.participants.map(pp=>pp.name+(pp.role?' — '+pp.role:'')).join(', ')}</em></div>`;
        html += '</div>';
      });
      html += '</div>';
    }
  }
  return banner + html;
}

function extractSubSections(content) {
  const lines = content.split('\n'), subs = [];
  let cur = null, curLines = [];
  for (const line of lines) {
    if (line.startsWith('### ')) { if (cur) subs.push({title:cur,content:curLines.join('\n')}); cur=line.slice(4).trim(); curLines=[]; }
    else if (cur !== null) curLines.push(line);
  }
  if (cur) subs.push({title:cur,content:curLines.join('\n')});
  return subs;
}
function firstPara(content) {
  const lines = content.split('\n'); const para = []; let started = false;
  for (const line of lines) {
    if (line.startsWith('###')||line.startsWith('##')) break;
    if (line.trim()) { started=true; para.push(line); }
    else if (started&&para.length>0) break;
  }
  return para.join('\n');
}

// ── Drag & Drop ───────────────────────────────────────────────────────────
function initDragDrop(key) {
  const keyId = key.replace(/[^a-z0-9]/gi,'_');
  const container = document.getElementById('sc_'+keyId);
  if (!container) return;
  const getCards = () => [...container.querySelectorAll('.section-card')];
  container.addEventListener('dragstart', e => {
    const card = e.target.closest('.section-card'); if (!card) return;
    dragSrcIdx = parseInt(card.dataset.secIdx);
    setTimeout(()=>card.classList.add('dragging'),0);
    e.dataTransfer.effectAllowed='move';
  });
  container.addEventListener('dragend', () => {
    getCards().forEach(c=>c.classList.remove('dragging','drag-above','drag-below'));
    dragSrcIdx=null; dragTarget=null;
  });
  container.addEventListener('dragover', e => {
    e.preventDefault();
    const card = e.target.closest('.section-card'); if (!card||dragSrcIdx===null) return;
    getCards().forEach(c=>c.classList.remove('drag-above','drag-below'));
    const rect = card.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height/2;
    card.classList.add(before?'drag-above':'drag-below');
    dragTarget={idx:parseInt(card.dataset.secIdx),before};
  });
  container.addEventListener('drop', e => {
    e.preventDefault();
    if (dragSrcIdx===null||!dragTarget) return;
    const file = FILES.find(f=>f.key===key); if (!file) return;
    const order=[...(sectionOrders[key]||file.sections.map((_,i)=>i))];
    const from=order.indexOf(dragSrcIdx); order.splice(from,1);
    let to=order.indexOf(dragTarget.idx); if(!dragTarget.before) to++;
    order.splice(Math.max(0,to),0,dragSrcIdx);
    sectionOrders[key]=order;
    renderDetail(file); setTimeout(()=>initDragDrop(key),0);
  });
}

// ── Controls ──────────────────────────────────────────────────────────────
function toggleSection(key,sIdx) {
  if (!collapsedSets[key]) collapsedSets[key]=new Set();
  collapsedSets[key].has(sIdx)?collapsedSets[key].delete(sIdx):collapsedSets[key].add(sIdx);
  const f=FILES.find(x=>x.key===key); if(f){renderDetail(f); if(!execModes[key])initDragDrop(key);}
}
function expandAll(key) {
  if (!collapsedSets[key]) collapsedSets[key]=new Set();
  collapsedSets[key].clear();
  const f=FILES.find(x=>x.key===key); if(f){renderDetail(f); initDragDrop(key);}
}
function collapseAll(key) {
  const f=FILES.find(x=>x.key===key); if(!f)return;
  collapsedSets[key]=new Set(f.sections.map((_,i)=>i));
  renderDetail(f); initDragDrop(key);
}
function toggleExec(key) {
  execModes[key]=!execModes[key];
  const f=FILES.find(x=>x.key===key); if(f){renderDetail(f); if(!execModes[key])initDragDrop(key);}
}
function goHome() { currentFileKey=null; renderTable(); showView('table'); window.scrollTo(0,0); }

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function inits(n) { if(!n)return'?'; const p=n.trim().split(/\s+/); return(p.length>=2?p[0][0]+p[p.length-1][0]:n.slice(0,2)).toUpperCase(); }
