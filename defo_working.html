connectivity); Assisi (Profitero, Criteo/CitrusAd inhousing).\n5. **\"Is the agency going to push our hero SKU, not just chase ROAS on the safe ones?\"** — BarberNo1 (Boost Powder under-pushed) and Assisi (high-priority brand prioritisation) both flagged this.\n\n---\n\n## Evaluations\n\n### Sentiment\n| Prospect | Sentiment |\n|---|---|\n| 92 Degrees Coffee | Engaged, curious, cautious; running multiple parallel decisions |\n| BarberNo1 | Onboarded; trust-positive but lapsed in contact; needs re-engagement to confirm state |\n| Assisi | Constructive partnership; transparent about internal complexity; cautiously committed |\n\n### Decision Criteria\n1. NTB / acquisition measurement (not just ROAS / gross sales)\n2. Hero-SKU and under-pushed-SKU strategy\n3. Full-funnel capability incl. DSP and retargeting\n4. Transparency on ad spend pacing and reporting\n5. Strategic credibility — can the agency think beyond placing ads?\n6. Commercial discipline / staged structure (BarberNo1's quarterly review gates; 92 Degrees' \"do the sums\" attitude)\n7. For Assisi: ability to satisfy VC reporting requirements\n\n### Alternatives Considered\n- **92 Degrees:** Currently no Amazon agency; Send Me a Sample (Smolen sister brand) bundled into the proposition rather than alternative\n- **BarberNo1:** Previous agency (Jun–Oct 2025) — replaced with Optimizon Nov 2025\n- **Assisi:** Optimizon (Hollings/Pet Munchies/High Life) + Melody (Burns/Yakkers); Profitero introduced by VC; Criteo/CitrusAd being moved in-house\n\n### Key Differentiators (what resonated)\n- Send Me a Sample integration (Smolen group bundling) — 92 Degrees specifically lit up\n- Nozzle.ai LTV/cohort tracking — Assisi deeply embedded; 92 Degrees discussed sample → Amazon → Nozzle attribution\n- Optimizon's Amazon Platinum Partner credentials and case studies in similar categories (e.g. Carte Noir, Nespresso for SMaS)\n- Tiered/staged commercial models (BarberNo1 quarterly gates)\n- Hybrid Vendor + FBA + 3P expertise (Assisi)\n- Proactivity on diagnostic / hero-SKU pivots (BarberNo1 Boost Powder pivot the early differentiator)\n\n---\n\n## Vision — What Success Looks Like\n\n| Prospect | Vision |\n|---|---|\n| 92 Degrees Coffee | Amazon FBA live with right starter SKU set; Send Me a Sample sampling campaign attributable to Amazon conversions; Square ↔ Amazon middleware clean; recurring subscription motion that complements D2C, not cannibalises it |\n| BarberNo1 | Boost Powder breakout on Amazon; Salt Spray category #1; 2,000+ units/month milestone hit, ad spend scales to ~£18k/month; subscribe-and-save base building; influencer assets monetised on listings |\n| Assisi | Pet Munchies + Hollings as #1 natural treat brands on Amazon UK; 30% NTB consistently; DSP running at scale; digital shelf at \"perfect\" standard; subscribe-and-save retention >40%; Germany Pet Munchies launch when capital allows |\n\n---\n\n## Recommendations\n\n**1. Lead with NTB measurement, not gross-sales projections.**\nEvery prospect in this group has either been burnt by, or fears being burnt by, an agency that delivers units without delivering new customers. Optimizon's pitch should start with a clear NTB measurement framework (Nozzle cohort tracking, S&S retention rates, lapsed-cohort reactivation maths) — and the conversation about ROAS/ACOS should be subordinated to that. This addresses BarberNo1's stated trauma directly and equips Trevor at Assisi for VC conversations.\n\n**2. Identify and unlock the under-pushed hero SKU early.**\nBarberNo1's Boost Powder is the clearest case — retail bestseller, zero Amazon push. Assisi's Hollings Sausages and Pet Munchies cases are equivalents. 92 Degrees doesn't have a hero SKU on Amazon yet, but the equivalent move is \"what's the best starter SKU that converts a sample into a buyer?\" In every case, the diagnostic should surface a concrete under-leveraged asset within the first 60 days. This is the single most repeatable proof-point in this archetype.\n\n**3. Bundle the Smolen group capability where it adds genuine fit.**\n92 Degrees lit up specifically when Send Me a Sample was introduced; the discovery → sample → Amazon → retargeting motion is a genuine differentiator that Amazon-only agencies can't match. For BarberNo1 (4M social views/month), DSP retargeting via PackView is the natural extension. For Assisi, the breadth around DTC, retail-field, and B2B may be relevant as inhousing accelerates. Use the group story selectively — don't lead with it for prospects where Amazon execution is the primary need.\n\n**4. Use staged commercial models — quarterly review gates work.**\nBarberNo1 negotiated quarterly review gates and a 6-month break clause. That is the right shape for bootstrapped or capital-disciplined consumer brands and should be Optimizon's default offer for this archetype, not the exception. It de-risks both sides and signals confidence.\n\n**5. Solve the operational basics before scaling spend.**\n92 Degrees needs Square ↔ Amazon connectivity scoped before any meaningful ad campaign. BarberNo1 has product licensing and influencer-asset gaps. Assisi has a multi-thousand-asset creative backlog. Don't push for ad scale until the digital shelf is at a defensible baseline — these prospects will (rightly) judge the agency on whether it forces good operations or just runs ads.\n\n**6. Founder / VC reporting is a deliverable, not an afterthought.**\nFor founder-led brands (BarberNo1, 92 Degrees), reporting must be readable to a non-marketer who has to defend the spend internally. For Assisi, reporting must satisfy a VC audience focused on NTB, retention, and contribution margin. In both cases this is an explicit deliverable in the engagement design — produce a board-ready scorecard, not just a marketing dashboard.\n\n**7. Re-engagement on dormant prospects: act on signal, not silence.**\nBarberNo1 is 167 days silent. Silence in this archetype most likely means heads-down execution, not lost interest — but it's worth a structured re-engagement (data check-in, scorecard, next-quarter reset) rather than waiting for the prospect to come back. Don't infer churn risk from silence alone; verify.\n\n**8. Green flags for this archetype:**\n- Founder-led or founder-adjacent decision making (fast cycles)\n- Strong off-Amazon brand equity (social, retail, sponsorships) under-leveraged on Amazon\n- Premium / differentiated positioning, not commodity\n- Clear NTB acquisition framing — they ask about new customers, not just sales\n- Existing recurring-revenue motion (Subscribe & Save, app subscriptions, D2C subs) to layer on top\n- Capital discipline rather than no-budget; staged commitment willingness\n\n**9. Red flags to watch:**\n- No Amazon revenue base (92 Degrees) — long sales cycle on first commercial decision\n- Long silence post-onboarding without active reach-out (BarberNo1 — needs re-engagement)\n- VC-imposed tools / partners diluting agency scope (Assisi: Profitero, inhousing of Criteo/CitrusAd)\n- Multiple operational migrations competing with the Amazon project for bandwidth (92 Degrees: Square + franchising)\n- Multi-agency split with consolidation politics (Assisi)\n- Inherited brand-relaunch disasters that need ad spend just to repair, not to grow (Assisi High Life)\n"}, {"filename": "Meta ICP Persona-Established-001--2026-04-30--1030.md", "folder": "Meta Personas", "content": "---\ntype: meta-persona\ngroup: Established\ninstance_id: \"001\"\ngenerated_date: 2026-04-30\ngenerated_time: \"10:30\"\nprospects:\n  - client_name: Aqualisa\n    participants:\n      - name: Jonathan Crowe\n        role: Head of Online & Omni-Channel Sales\n        company: Fortune Brands Innovations (Aqualisa parent)\n        email: jonathan.crowe@fbin.com\n        linkedin: https://uk.linkedin.com/in/jcrowe-dev\n  - client_name: Brita\n    participants:\n      - name: Sadie Baile-Roberts\n        role: Amazon / E-commerce Manager (UK)\n        company: Brita\n        email: ~\n        linkedin: https://uk.linkedin.com/in/sadie-baile-roberts-54840148\n      - name: Marc Lukawsky\n        role: ~\n        company: Brita\n        email: ~\n        linkedin: https://uk.linkedin.com/in/marc-lukawsky-27319939\n  - client_name: Blanco\n    participants:\n      - name: David Kamperman\n        role: E-commerce Manager (UK)\n        company: Blanco\n        email: david.kamperman@blanco.co.uk\n        linkedin: https://uk.linkedin.com/in/david-kamperman-825ba235\n  - client_name: Everlast (Sportive)\n    participants:\n      - name: Tom Dols\n        role: Head of Operations / Amazon Operations\n        company: Sportive (Everlast European licensee)\n        email: ~\n        linkedin: ~\n  - client_name: IBC Simply\n    participants:\n      - name: Kate Ailey\n        role: E-commerce / Brand Lead\n        company: IBC Simply\n        email: kate.ailey@ibcsimply.com\n        linkedin: https://uk.linkedin.com/in/kate-ailey\n      - name: Michael Woodhead\n        role: Finance Director\n        company: IBC Simply\n        email: michael.woodhead@ibcsimply.com\n        linkedin: https://uk.linkedin.com/in/michael-woodhead-b6ba5484\n      - name: Emily Pratchett\n        role: ~\n        company: IBC Simply\n        email: emily.pratchett@ibcsimply.com\n        linkedin: https://uk.linkedin.com/in/emily-pratchett-603626231\n      - name: Gillian Cooper\n        role: ~\n        company: IBC Simply\n        email: gillian.cooper@ibcsimply.com\n        linkedin: https://uk.linkedin.com/in/gilliancooper\n  - client_name: Assisi Pet Care (A CCO)\n    participants:\n      - name: Trevor Smith\n        role: Head of E-commerce\n        company: Assisi Pet Care / A CCO\n        email: trevor.smith@assisipetcare.com\n        linkedin: https://www.linkedin.com/in/thetrevorsmith/\n      - name: John Bradley\n        role: Amazon Day-to-Day Manager\n        company: Assisi Pet Care / A CCO\n        email: john.bradley@assisipetcare.com\n        linkedin: ~\n  - client_name: INCOS\n    participants:\n      - name: Damini Williams\n        role: E-commerce Channel Manager\n        company: INCOS\n        email: damini@incos.co.uk\n        linkedin: https://uk.linkedin.com/in/damini-williams-012412135\n---\n\n# Meta ICP Persona — Instance 001\n\n**Generated:** 2026-04-30 | **Prospects covered:** Aqualisa, Brita, Blanco, Everlast (Sportive), IBC Simply, Assisi Pet Care, INCOS\n\n---\n\n## Summary\n\nOptimizon's prospect and client base across these seven accounts centres on established UK brands — spanning home goods, filtration, kitchen/bath fixtures, sportswear licensing, food & beverage, pet food, and fragrance/cosmetics — that are operating on Amazon (primarily via a Vendor/1P relationship) but are experiencing stagnation, revenue decline, or a lack of strategic direction. The common thread is that these brands have Amazon presence but feel out of control: prices are being eroded, content is weak, advertising is either absent or untargeted, and their current agency or in-house resource is too tactical and not strategic enough. The primary decision-maker or champion is typically a lone e-commerce or digital lead, often navigating internal politics, tight budgets, and sceptical finance or senior stakeholders. They are looking for a partner — not just an operator — who brings strategic thinking, data-driven decisions, and proactive communication.\n\n**Key profile bullets:**\n- UK-based brands with existing Amazon presence (most are vendor/1P, some are transitioning to or adding seller/3P)\n- Revenue range on Amazon: from early-stage (Blanco: ~20 sales in 2024) to established (Assisi: £2.6M+ vendor sell-in; IBC Simply: strong UK base)\n- Company size: SME to mid-market; some are subsidiaries of global groups (Brita, Aqualisa/Fortune Brands, Blanco)\n- Category: premium or specialist products — typically not the cheapest option in their category\n- Primary pain: loss of control (pricing, content, data), declining revenue, under-served by current agency, and lack of Amazon strategy\n- Primary desire: growth, channel control, proactive strategic partnership, and better data/reporting\n- Decision-making: typically involves a champion (e-commerce lead), a blocker (finance or senior management), and in some cases global group governance\n- Budget: cautious — most are working within constrained or unapproved budgets; commission-based or performance-linked models are preferred over large upfront retainers\n\n---\n\n## Cross-Company Overlapping Issues\n\nIssues shared across three or more prospects are grouped below. Specific prospect attributions are noted for each.\n\n### 1. Loss of Control Over Amazon Pricing\nAll seven accounts cite pricing as a central concern. Vendor/1P accounts have no levers to raise or defend prices; Amazon sets the retail price and can undercut other channels. Brands with wide distribution face price-matching chaos.\n\n- **Aqualisa:** Business is 30% down YoY; vendor has held prices below market for 5–6 years, causing channel conflict. \"I have no control. No control on pricing.\" [07:34–07:48, Jonathan Crowe, 14/01/2026]\n- **Brita:** Maintains min/max pricing guide; vendor wins buy box for core products, but resellers in Ireland/Northern Ireland undercut. \"We tend to give a minimum and a maximum price. However, a lot like we wouldn't... want to price lead.\" [23:20, Sadie Baile-Roberts, BRITA Retail call]\n- **Blanco:** Price integrity is paramount. Moving to seller to maintain control. \"The main thing we want is... to maybe maintain some... control over pricing.\" [~00:10, David Kamperman, Blanco call]\n- **INCOS:** FBA competing against vendor pricing. £4.99 SKU taken off ASDA; Amazon then price-matched to £12.99, while FBA sells at £5.09. \"Amazon was priced much in Asda... the next day, Amazon just took the price from £4.99 to £12.99.\" [~00:20–00:25, Damini Williams, INCOS call]\n- **IBC Simply:** EU expansion blocked partly because the unit margin (£1.63 return vs £2.20 cost) makes pricing unworkable.\n\n### 2. Current Agency or Resource Is Too Tactical, Not Strategic\nFive of seven accounts either switched agency, are evaluating alternatives, or explicitly state that current support lacks strategy.\n\n- **Aqualisa:** Current agency \"more operational... strategy has been very light to date.\" Jonathan Crowe: \"I have been disappointed by their effectiveness and efficiency.\" [26:59, 24:46, 14/01/2026]\n- **INCOS:** \"What Dan really gave us before he joined Optimizon was not just tactical. It was very strategic... It is missing the strategic part.\" [~00:05–00:10, Damini Williams, INCOS call]\n- **Brita:** Previous Germany-based partner \"not proactive.\" Sadie wants a partner that comes to her with recommendations. \"I don't want just someone that's going to stick it on Amazon and then wait for me to send them an email to say increase or lower the price.\" [30:06, Sadie Baile-Roberts, BRITA Retail]\n- **Blanco:** Limited prior experience in UK Amazon; content has been cloned from Germany unlocalized. Needs strategy input for direction.\n- **Everlast (Sportive):** Account is young on Amazon; the 2025 Review (internal) highlighted fundamental inventory and forecasting gaps — strategic groundwork is still being laid.\n\n### 3. Weak Content and Listing Optimisation\nSix of seven accounts have content that is below standard: images without lifestyle overlays, thin copy, poor variation structures, and absent or basic A+ pages.\n\n- **Aqualisa:** Listing audit during discovery call revealed minimal text overlays, bullet copy well below the 200-character limit, and no brand store — with a third party having already registered the Aqualisa brand presence on Amazon. Jonathan Crowe acknowledged the content gap: \"Our own suite of imagery and content is not as good as I would like it to be. And obviously, to improve that, involves a lot of cost of investment, which we don't currently really have at the minute.\" [22:38, Jonathan Crowe, 14/01/2026]\n- **Blanco:** German content cloned to UK with German-language descriptors. \"They've still got the German... you don't know what colour it is unless you speak German.\" [~00:25, David Kamperman, Blanco call] 850+ UK SKUs; variations confusing.\n- **Aqualisa:** A third-party reseller (Go Bathrooms, based in Glasgow) had registered the Aqualisa brand on Amazon and was operating a store under the brand name — Crowe was unaware: \"Yeah, it looks like they're based up in Glasgow, but yeah, no idea who they are at all.\" [32:38, Jonathan Crowe, 14/01/2026] — Aqualisa had no owned brand store, while an unauthorised reseller did.\n- **INCOS:** Content not updated to reflect new MPDs; reporting doesn't tell the full story. A premium competitor \"Bellavita\" is outperforming on content investment.\n- **Assisi:** Pet Munchies digital shelf described as \"a disaster at the moment.\" Hollings creative refresh only just beginning. \"We need to get ourselves in into perfect digital shelf at pace.\" [Trevor Smith, ~00:45, Assisi Monthly Connect]\n- **Everlast:** Spring/Summer 2025 range uploaded without being forecasted for; 272 new SKUs added with inadequate inventory planning.\n\n### 4. Inventory Forecasting and Vendor Confirmation Rate Problems\nFour accounts (Aqualisa, Everlast, Assisi, INCOS) suffer from inventory availability issues that directly cap revenue.\n\n- **Everlast:** \"The year basically was selling what they had.\" [~00:05–00:10, internal Everlast Review Deck Run Through — flagged as internal Optimizon meeting] Confirmation rates dropped to 26% on some lines; August forecast inventory didn't arrive until January/February.\n- **Assisi:** Amazon destocking at financial year end; vendor sell-in down from £2.6M to £2.1M. SKUs going permanently unavailable without Optimizon being notified. \"When we got 150, 270 SKUs, it's just too easy for 20 or 30 of them just to suddenly drop off the radar.\" [Trevor Smith, ~00:50, Assisi Monthly Connect]\n- **Aqualisa:** Vendor hasn't taken a price increase in 5–6 years; no reliable demand forecasting in place for seller transition.\n- **INCOS:** Two key gift set SKUs are now FBA bestsellers at £4.99–£5.99, but FBA is competing with vendor, eroding margins and confusing reporting.\n\n### 5. Cautious / Constrained Budget with Finance as a Blocker\nFive accounts have a finance-related constraint or a sceptical finance/senior stakeholder.\n\n- **Aqualisa:** \"The marketing budget for this year, I've just found out, has still not been signed off.\" \"I genuinely don't know if I can find any more money.\" [34:31, 35:29, Jonathan Crowe, 14/01/2026]. Budget is ~£4.5–5k/month total.\n- **IBC Simply (internal post-call):** \"It's always the finance people that ruin people's plans... Michael [Finance Director] just had to come back with a better cost price.\" [~00:30, post-call internal discussion — flagged as internal Optimizon commentary]\n- **Assisi:** VC backers exert pressure and sometimes override commercial decisions. \"They have a tendency of going, 'oh, we can move somebody in to come and help you do this.'\" [Trevor Smith, ~00:05, Assisi catch-up]\n- **Blanco:** No hard revenue targets set; exploratory phase; needs sign-off from Head of Sales and Germany.\n- **INCOS:** Ad spend has been cut because PCOGS reporting was confusing internal decision-makers about ROI.\n\n### 6. Hybrid Vendor + Seller Strategy Gap\nFive accounts are either in 1P-only, or have started 3P/seller without a coherent hybrid plan.\n\n- **Aqualisa:** Stuck in vendor; Seller Central setup stalled for nearly a year with previous agency. Wants control but unsure of hybrid mechanics.\n- **Brita:** Staying in 1P (set by German HQ); adding 3P as backup. No conflict-free buy box strategy in place.\n- **Blanco:** Currently fulfilling UK orders from Germany; wants to bring fulfillment to UK Seller Central for more control.\n- **INCOS:** FBA is actively competing with vendor on the same SKUs — no clean hybrid strategy in place.\n- **Assisi:** Mix of vendor, FBA, and 3P. Strategic clarity about which SKUs belong where is only now being developed.\n\n### 7. EU / International Expansion Interest but Not Yet Ready\nFour accounts have expressed interest in EU/international expansion but face blockers.\n\n- **IBC Simply:** EU economics don't stack up for current syrup SKUs (£1.63 return vs £2.20 cost). New health-aligned products may resolve this. \"We're not sure there is [enough margin for everyone].\" [Michael Woodhead, ~00:05, IBC Simply EU Discussion]\n- **Assisi:** EU expansion limited by Brexit packaging requirements (multilingual). \"We haven't got the big bucks to try and do the breakthrough.\" [Trevor Smith, ~00:35, Assisi Monthly Connect]\n- **INCOS:** France is biggest EU market (not Germany). Italy shows potential. Expanding on gift bundles at higher price points is the play.\n- **Blanco:** Germany already 10–20% of annual turnover via Amazon; UK is only ~2%. \"We know it can sell, but it's not at the... level you'd expect from Amazon.\" [David Kamperman, Blanco call]\n\n---\n\n## Individual Prospect Profiles\n\n---\n\n### 1. Aqualisa\n\n**Company:** Aqualisa (Fortune Brands Innovations) | **Category:** Premium bathroom/shower products | **Amazon model:** Vendor (1P) + setting up Seller (3P)\n\nAqualisa's UK Amazon business fell ~30% YoY (from ~£1M to ~£650–675k in 2024). Jonathan Crowe, Head of Online & Omni-Channel, is a commercially sharp, self-motivated e-commerce leader who has built B&Q Marketplace to ~£200k in year one. He is the only channel showing double-digit growth in the business and is navigating budget uncertainty, a range review (EU Drinking Water Directive forcing range simplification by end 2026), and a stalled Seller Central setup.\n\n**Key points:**\n- Amazon ~£650–675k (2024), target £1.2–1.3M for 2026\n- Budget: ~£4.5–5k/month currently paid to incumbent; marketing budget not yet signed off for 2026\n- Current agency: rolling month-to-month, described as operational not strategic — \"the strategy has been very light to date\" [26:59–27:06, Jonathan Crowe, 14/01/2026]\n- Pain: No Seller Central (stalled ~1 year), no advertising running, no brand store, below-par content, no strategy\n- Complication: EU Drinking Water Directive means ranges will be replaced by end 2026 — don't over-invest in current content\n- Multiple brands in portfolio (Fortune Brands house of brands: Aqualisa, Shows of Darwin, Perrin & Rowe, Victoria & Albert) — longer-term opportunity\n- Decision-maker: Jonathan Crowe — autonomous over marketplace; budget sign-off from above\n- Sentiment: Highly engaged, frustrated with incumbent, ready to move\n\n> \"I have no control. No control on pricing. Our Amazon business is about 30% down year on year.\" [07:34–07:48, Jonathan Crowe, 14/01/2026]\n\n> \"I want to try and get this over the line... The real painful bit for me at the minute is Amazon.\" [~00:05, Jonathan Crowe, 16/01/2026 Granola call]\n\n> \"This isn't a six-month relationship kind of thing. Providing all the growth, all the boxes are being ticked, there's no reason why this shouldn't be a longer-term relationship.\" [56:13, Jonathan Crowe, 14/01/2026]\n\n**Red flags:** Budget uncertainty; marketing budget not approved; EU range review creates content investment risk for 2026.\n**Green flags:** Only double-digit growth channel in business; autonomous decision-maker; ready to move immediately; multi-brand house with long-term opportunity.\n\n---\n\n### 2. Brita\n\n**Company:** Brita UK | **Category:** Water filtration (jugs, filters, taps) | **Amazon model:** 1P (group-set, stays); 3P via authorised partner(s) as backup\n\nBrita UK is seeking a second authorised 3P partner to sit alongside their existing partner (eManage, formerly Rich Insights, since Nov 2024). The primary contact, Sadie Baile-Roberts, controls pricing and the partner relationship. The commercial decision to partner is hers but formal sign-off involves review and comparison of proposals. Decision timeline is approximately October 2026.\n\n**Key points:**\n- Staying 1P long-term (set by German HQ); 3P as backup and for exclusive/tap products vendor doesn't cover\n- Current partner (eManage) performing well; Brita simply wants redundancy and competition\n- Retail distribution is wide (Tesco, Sainsbury's, Asda etc.) — always a promotion somewhere, creating permanent price pressure from Amazon\n- Ad spend currently run by marketing centrally (Sponsored Brands, considering DSP trial); partner ad budget to be discussed\n- ~700–900 units/day on exclusive products; up to 1,800–2,000/day on non-exclusive products\n- Commission-only or tiered retainer + commission model preferred; no revenue guarantees given\n- Decision: Sadie reviewing commercially; internal sign-off required; also evaluating other agencies\n- Sentiment: Professionally warm but measured; will not commit without thorough due diligence\n\n> \"I would say it's very much we want to have a backup partner or another partner that is either equal to them or better if we can find them.\" [04:18, Sadie Baile-Roberts, BRITA Retail call]\n\n> \"I don't want just someone that's going to stick it on Amazon and then wait for me to send them an email to say increase or lower the price.\" [30:06, Sadie Baile-Roberts, BRITA Retail call]\n\n> \"I think for us, that's very much what we want to have in a partner. We want it to be a proactive relationship where I come to you, you come to me.\" [26:42, Sadie Baile-Roberts, BRITA Retail call]\n\n**Red flags:** Not looking to replace eManage; second-partner role limits scope; decision may slip to end of year; no revenue guarantees.\n**Green flags:** High-volume, repeat-purchase product; Sadie is the decision-maker; proactivity is the differentiator; other new marketplace opportunities (Debenhams, B&Q, Tesco) within scope.\n\n---\n\n### 3. Blanco\n\n**Company:** Blanco UK | **Category:** Premium kitchen sinks, taps, and waste management | **Amazon model:** Seller (historic account, minimal activity); Germany = vendor with significant revenue\n\nBlanco UK has approximately 20 Amazon sales across all of 2024. David Kamperman, E-commerce Manager for Blanco UK, is a relatively junior single-person e-commerce team managing a complex 850+ SKU catalogue, with direction coming from the Head of Sales (UK) and comparison/learning from the German team (where Amazon represents 10–20% of annual turnover). The German operation is the proof point; the UK is starting from near zero.\n\n**Key points:**\n- UK Amazon = ~20 sales in 2024; Germany = 10–20% of annual turnover on Amazon\n- 850+ UK SKUs; German content cloned (German-language text, confusing variation structures)\n- No advertising running (managed from Germany)\n- Price integrity is paramount; exploring seller to maintain control vs vendor model\n- Decision timeline: direction needs to be set by mid-2026; David will present costs to Head of Sales\n- No hard sales targets; \"our fair share of the market\" is the aspiration\n- Solo decision-maker (with upward sign-off); no urgency; exploratory phase\n- Sentiment: Curious and open but cautious; needs to build a business case internally\n\n> \"The sticky subjects always around price because... [it's] premium products and how do we maintain that price integrity across the business as well as being competitive.\" [~00:05, David Kamperman, Blanco call]\n\n> \"We're not there to, like, kill prices, but to just have... our fair share of the market pricing.\" [~00:20, David Kamperman, Blanco call]\n\n> \"I've got limited experience with Amazon. It feels like a different market almost... to the continent.\" [~00:20, David Kamperman, Blanco call]\n\n**Red flags:** Near-zero UK revenue base; no hard targets; single-person team with limited budget authority; Germany controls advertising; long exploratory timeline.\n**Green flags:** German proof point (10–20% of turnover); massive content optimisation opportunity; 850 SKUs with German reviews already on platform; clear channel management pain (price integrity) that seller model resolves.\n\n---\n\n### 4. Everlast (Sportive)\n\n**Company:** Sportive BV (Everlast European licensee) | **Category:** Sports/fitness apparel and equipment | **Amazon model:** Vendor (1P), EU focus — Germany, Spain, UK\n\nSportive is the European licensee for the Everlast brand, having taken over the license at the end of 2024 from a previous holder. Tom Dols, Head of Operations, manages logistics and Amazon operations from a warehouse near the Netherlands/Germany/Belgium borders. The business is VC-free, founder-led (Johnny), and cash-conversion focused — growth must be self-funding. Amazon is a core channel alongside Decathlon. The 2025 Review (in-person, Amsterdam) reveals a year characterised by inventory gaps, forecasting methodology development, and advertising scale-up from near zero.\n\n**Key points:**\n- Revenue split (2025): Germany ~40%, Spain ~26%, UK ~16% of Amazon\n- Advertising scaled from ~€6–7k/month to north of €10k/month during 2025\n- European licensee only — no US (Everlast manages its own brand in America)\n- Business is logistically sophisticated (ex-25 years logistics, warehouse on NL/DE/BE axis); Amazon is the e-commerce growth engine\n- Inventory confirmation rates dropped to ~26% on some Spring/Summer 2025 lines due to forecasting gaps\n- Key competitive set: RDX (doing ~£7M UK), Adidas, Leone\n- Target: 2–3M EUR in 2026\n- Business model: separate financing company underwrites inventory; brand focuses on sell-through\n- Decision: Joint (Tom Dols operational; Johnny is owner and final decision-maker)\n- Note: Matthew Walmsley appears in the 2025 Review as an Optimizon team member (not prospect); Tom Dols and \"Johnny\" (Sportive owner) are the external voices.\n\n> [From 2025 Review transcript] \"Our plan is quite simple that we have Everlast but we're also in discussion about getting... other brands as well... It's as much about sourcing as it is about building out sales channels.\" [00:00, Johnny/Sportive owner]\n\n> \"We'll never get into agency. Will we ever be providing services to brands? No. No way. Like that's man hours. We're only into transactions, sleep at night, make money.\" [00:00, Johnny/Sportive owner, Everlast 2025 Review]\n\n> [From internal Everlast Review Deck Run Through, flagged as internal Optimizon meeting — no external quotes] Key themes: P70/P90 forecasting methodology being adopted; inventory availability as the primary growth constraint; three \"key moments\" in 2025 all driven by supply gaps.\n\n**Red flags:** Cash-conversion focus means ad spend increases need clear ROI justification; licensee structure caps geographic scope to Europe; owner very hands-off on marketing.\n**Green flags:** Logistically sophisticated team; clear growth ambition (2–3M EUR); founder is commercially pragmatic and results-focused; existing Amazon presence with data history.\n\n---\n\n### 5. IBC Simply\n\n**Company:** IBC Simply | **Category:** Syrups, sauces, smoothies (food & beverage) | **Amazon model:** Vendor (1P), UK strong; EU expansion evaluated and currently not viable for core SKUs\n\nIBC Simply has a strong UK Amazon vendor business but low TACOS (0.7% — barely any advertising investment). The EU expansion discussion revealed that the core syrup product's economics don't currently work in EU markets (£1.63 returned vs £2.20 COGS). Kate Ailey is the champion; Michael Woodhead (Finance Director) is the key blocker. The business is exploring new health-aligned product lines that may have better EU economics and higher price points.\n\n**Key points:**\n- UK vendor business performing well; sauces line growing 209% YoY\n- TACOS: ~0.7% — massive under-investment in advertising relative to opportunity\n- EU viability: blocked by margin economics (VAT at 19–22%, higher FBA fees, COGS)\n- FD (Michael Woodhead) is cautious on investment; requires clear margin justification\n- New product lines in development: health-aligned syrups, sauces (moving manufacturing in-house), potential new categories\n- Send Me A Sample platform: IBC Simply-adjacent tech for sampling campaigns (drives Amazon conversion)\n- TikTok shop launched but \"not lighting up the world\"\n- Decision: Kate is champion; Michael is financial gatekeeper; all EU/expansion decisions require board-level sign-off\n- Sentiment: Engaged (Kate), cautious (Michael); relationship is constructive but investment-averse\n\n> \"The money that comes back to IBC is actually less than what the product cost us to make.\" [Michael Woodhead, ~00:05, IBC Simply EU Discussion]\n\n> \"I mean, I saw the January February figures in the... year on year, which is great. Which kind of led us to ask the question, can we grow in other markets?\" [Kate Ailey, ~00:05, IBC Simply EU Discussion]\n\n> \"We just want to make sure we're not putting all our eggs in one basket, so to speak.\" [Kate Ailey, Brita call — note: different company; equivalent sentiment from IBC: \"we're exploring options\"]\n\n*[Note: The post-call Optimizon internal discussion captures that Michael is the Finance Director and a key blocker; Torani (a competing syrup brand managed by Optimizon) represents a potential conflict of interest; this was flagged as an internal Optimizon observation and is not attributable to IBC Simply directly.]*\n\n**Red flags:** Finance Director as active blocker; EU economics currently unfavourable; investment-averse culture; 0.7% TACOS suggests limited appetite for ad spend growth.\n**Green flags:** UK business is strong with growth in sauces; Kate is a motivated champion; new health-aligned products in pipeline may unlock both EU and higher price points; Send Me A Sample platform is a differentiator for awareness/acquisition.\n\n---\n\n### 6. Assisi Pet Care (A CCO)\n\n**Company:** A CCO / Assisi Pet Care | **Category:** Natural pet food and treats | **Amazon model:** Vendor (1P) + FBA + 3P; UK focus; limited EU potential\n\nAssisi is a VC-backed buy-and-build of natural pet food brands (Hollings, Pet Munchies, High Life, Burns, Yakkers). Trevor Smith (Head of E-commerce) joined in September 2024 as part of a new management team tasked with integrating previously siloed brands. Amazon is the second biggest revenue channel. The business is complex: multiple brands, two agencies (Optimizon for Hollings/Pet Munchies/High Life; Melody for Burns/Yakkers), and VC oversight that sometimes introduces external tools and decisions. Dan Walsh (key account manager) left Optimizon in April 2026.\n\n**Key points:**\n- Amazon is second biggest channel in the business; ~£2.6M vendor sell-in (Pet Munchies + others)\n- Two agencies: Optimizon (3 brands) + Melody (2 brands); consolidation likely but not confirmed\n- Brand priorities: Haulings (high investment), Pet Munchies (growth), High Life (sustain treats; dog range in decline)\n- NTB (New to Brand) target: 30% — critical KPI for VC backers\n- DSP strategy being developed (Massimo Dattoma, new Global Head of Media)\n- EU expansion: paused due to Brexit packaging, but Germany is a solid long-term bet for Pet Munchies\n- VC involvement means tool choices (e.g. Profitero) and agency decisions can be made above Trevor's head\n- Inhousing: digital media (Criteo, CitrusAd) being brought in-house; operational Amazon role (ex-Amazon Western Europe) recently hired\n- Nozzle: actively using for NTB cohort analysis and LTV tracking\n- Decision: Trevor is champion and decision-maker for day-to-day; VC backers exert structural influence\n\n> \"What our previous management team were very good at was acquiring brands; what they were absolutely appalling at was integrating brands and driving them forward.\" [Trevor Smith, ~00:05, Assisi catch-up call]\n\n> \"Amazon is quite important. It also then means that venture capitalists have a very high focus on my area.\" [Trevor Smith, ~00:05, Assisi catch-up call]\n\n> \"I have a very discussion with our VC backers — 30% of new to brand is really important to fill the funnel.\" [Trevor Smith, ~00:15, Assisi Monthly Connect]\n\n> \"We need to get ourselves in into perfect digital shelf at pace. There's a lot of when when you've left it for so long, that's a challenge.\" [Trevor Smith, ~00:45, Assisi Monthly Connect]\n\n**Red flags:** VC interference in commercial decisions; two-agency split creates consolidation risk; inhousing trend may reduce scope for Optimizon; Dan Walsh departure creates relationship vulnerability.\n**Green flags:** Large and complex account with multiple brands; strong NTB focus aligns with DSP; Nozzle deeply embedded; Trevor is a sophisticated, data-literate client who values transparency and partnership.\n\n---\n\n### 7. INCOS\n\n**Company:** INCOS | **Category:** Fragrance/cosmetics (gift sets, singles) | **Amazon model:** Hybrid vendor + FBA; ~90% retail business\n\nINCOS is primarily a retail brand (Superdrug is biggest customer); digital/Amazon is ~10% of the business with a small team. Damini Williams manages e-commerce channels and is the main Optimizon contact. The business was dissatisfied with the loss of strategic direction after Dan Walsh stepped back, and called the meeting to reset expectations. Key structural challenges: gift sets with £4.99–£5.99 price points have thin margins; FBA is competing with vendor pricing; content investment is needed; PCOGS reporting is causing internal confusion about ad spend ROI. EU expansion (France is current biggest EU market) and Germany are on the roadmap but in early stage.\n\n**Key points:**\n- ~90% of revenue is retail (Superdrug exclusives); Amazon is strategic but secondary\n- Products priced £4.99–£5.99 (gift sets); Amazon taking 37–38% commission makes profitability very tight\n- FBA competing with vendor on same SKUs — needs clean hybrid strategy\n- PCOGS reporting mismatch between OPT and INCOS causes confusion about ad spend ROI — ad spend being cut as a result\n- 40–50 new MPDs (product launches) per year; gift set product changeovers are complex to manage on Amazon\n- Send Me A Sample (INCOS-owned tech platform) drives sampling → Amazon conversion; LTV tracking via Nozzle to be implemented\n- EU focus: France top market; Italy emerging; Germany buys singles (low margin) vs France buys gift sets (better margin)\n- B2B on Amazon: not yet set up as case packs; opportunity to capture trade buyers\n- Decision: Damini is day-to-day champion; Karim (director) is senior stakeholder; accounts team includes Albert and colleagues\n- Sentiment: Frustrated but genuinely motivated to reset; wants strategic partnership not just reporting\n\n> \"What Dan really gave us before he joined Optimizon was not just tactical. It was very strategic.\" [Damini Williams, ~00:05, INCOS call]\n\n> \"We always learn faster when we focus on what's bad and get rid of it.\" [Damini Williams, ~00:05, INCOS call]\n\n> \"We had certain calls where our calls sort of preempted... 'Guys, when you're presenting this part of the data, please include this.' And it wasn't. So then it now became a huge question of why are we working with you guys?\" [Damini Williams, ~00:20–00:25, INCOS call]\n\n> \"I think we we need to have a reset in terms of the relationship.\" [Damini Williams, ~00:45, INCOS call]\n\n**Red flags:** Very low price-point products — thin margins on Amazon; 90% retail mindset makes Amazon investment hard to justify; FD/senior stakeholder scrutiny of spend; risk of losing account if reset doesn't deliver.\n**Green flags:** Motivated champion (Damini) who understands what good looks like; Send Me A Sample integration is a unique data/sampling asset; France/EU expansion is genuinely viable with right product mix; B2B case pack opportunity untapped.\n\n---\n\n## Profile Info — Aggregated\n\n### Prospect Personalities and Working Styles\n\n| Prospect | Key Contact | Personality Notes |\n|---|---|---|\n| Aqualisa | Jonathan Crowe | Commercially driven, direct, self-deprecating humour (\"everybody wants a Ferrari for Mondo money\"), results-focused, pragmatic |\n| Brita | Sadie Baile-Roberts | Professional, measured, thorough due-diligence mindset, relationship-oriented, internally navigating complexity |\n| Blanco | David Kamperman | Curious, open to learning, modest about his Amazon experience, methodical, needs to build internal business cases |\n| Everlast | Tom Dols / Johnny | Operationally focused (Tom); commercially pragmatic, transaction-focused, anti-agency sentiment (Johnny) |\n| IBC Simply | Kate Ailey | Growth-minded champion; pragmatic about constraints; collaborative |\n| Assisi | Trevor Smith | Data-literate, strategically sophisticated, highly transparent, managing upward stakeholder complexity |\n| INCOS | Damini Williams | Direct, analytical, retail-native mindset, values transparency and partnership; frustrated but constructive |\n\n### Product / Service Demographics (prospect's customers)\n- **Aqualisa:** Home renovation consumers; mid-to-high income; considered purchase; research-heavy buying journey (showers £200–£1,200)\n- **Brita:** Broad consumer base; repeat purchase (filters); health/sustainability conscious; subscription-friendly\n- **Blanco:** Premium kitchen/bath renovation; design-conscious; high-consideration purchase; professional trades buyers and high-end homeowners\n- **Everlast:** Sports/fitness consumers; active lifestyle; 18–45; price-sensitive at entry level but brand-aware\n- **IBC Simply:** Home barista/cocktail enthusiasts; health-conscious consumers (for new lines); gift buyers; primarily UK and France\n- **Assisi:** Dog and cat owners; natural/premium pet food segment; health-conscious pet owners; subscription-ready\n- **INCOS:** Fragrance/cosmetics consumers; gift buyers; Superdrug shoppers; broad UK demographic; France as secondary market\n\n---\n\n## Supporting Information — Aggregated\n\n### Current Amazon Setup\n\n| Prospect | Setup | Notes |\n|---|---|---|\n| Aqualisa | Vendor (1P); Seller Central not yet live | Previous agency failed to set up SC for ~1 year |\n| Brita | Vendor (1P, group-set); 3P via eManage (Nov 2024–) | Adding second 3P partner |\n| Blanco | Seller (historic, minimal); German vendor orders to UK | UK: ~20 sales in 2024; Germany 10–20% turnover |\n| Everlast | Vendor (1P), EU markets (DE, ES, UK) | Licensee only for Europe |\n| IBC Simply | Vendor (1P) strong UK; EU not viable yet | Low advertising investment (0.7% TACOS) |\n| Assisi | Vendor + FBA + 3P (mixed strategy) | Multiple brands; two agencies |\n| INCOS | Vendor + FBA (competing — needs clean strategy) | 90% retail; gift sets £4.99–£5.99 |\n\n### Budget\n\n| Prospect | Agency Budget | Ad Spend Notes |\n|---|---|---|\n| Aqualisa | ~£4.5–5k/month (current) | Ad budget part of wider retail media pot; not yet signed off for 2026 |\n| Brita | Commission-only or retainer + commission model preferred | Sponsored Brands run by marketing centrally |\n| Blanco | ~£5k/month retainer + 5% sales + 4% ad management (indicative) | No advertising currently |\n| Everlast | Not disclosed; ad spend scaled to >€10k/month (EU) | VC-free; cash-conversion priority |\n| IBC Simply | Not disclosed; very cautious | TACOS 0.7%; FD is blocker for any increase |\n| Assisi | Not disclosed; ~£160k DSP budget per year indicative | VC oversight; 80/20 acquisition/retention split |\n| INCOS | Ad spend being cut due to PCOGS reporting confusion | Needs scorecard to restore investment confidence |\n\n### Timelines\n\n| Prospect | Decision / Start Timeline |\n|---|---|\n| Aqualisa | Ready to move immediately; proposal requested Jan 2026 |\n| Brita | Decision review ~October 2026; contract start TBC |\n| Blanco | Direction by mid-2026; implementation into H2 2026 |\n| Everlast | Active client; 2026 plan being executed |\n| IBC Simply | Active client; EU test depends on new product economics |\n| Assisi | Active client; new financial year from April 2026 |\n| INCOS | Active client; reset meeting Jan 2026; Q1 2026 strategy being built |\n\n---\n\n## Motivation — Aggregated\n\n### Common KPIs / Goals\n1. **Revenue growth on Amazon** — all prospects\n2. **Price control / buy box ownership** — Aqualisa, Brita, Blanco, INCOS\n3. **New to Brand acquisition** — Assisi (30% NTB target), IBC Simply (growing sauces category), Blanco (establishing UK presence)\n4. **Availability / in-stock rate** — Everlast (P70/P90 forecasting), Assisi (SKU-level weeks cover)\n5. **EU/international expansion** — IBC Simply, INCOS, Blanco, Assisi\n6. **TACOS / ad efficiency** — INCOS, IBC Simply (needs increase), Everlast (scaling carefully)\n\n### Main Problems / Current Challenges\n- **Lack of control over Amazon pricing** (all)\n- **Absent or poor content** (Aqualisa, Blanco, Assisi, INCOS)\n- **Current agency too tactical / not strategic** (Aqualisa, Brita, INCOS, Blanco)\n- **Seller Central not set up / hybrid strategy not implemented** (Aqualisa, Blanco, INCOS)\n- **Inventory forecasting gaps** (Everlast, Assisi)\n- **Budget constraints / internal finance blockers** (Aqualisa, IBC Simply, INCOS)\n- **Reporting confusion / PCOGS vs retail sales misalignment** (INCOS)\n\n### Fears\n- **Losing channel control to Amazon** — pricing, content, buy box\n- **Being undercut by own distributors** — Aqualisa, Brita\n- **Amazon cannibalising other retail channels** — Blanco, Aqualisa, INCOS (Superdrug exclusives)\n- **Wasted investment / sunk cost on content for ranges that will be discontinued** — Aqualisa (EU Drinking Water Directive)\n- **Finance/senior leadership pulling budget** — Aqualisa, IBC Simply, INCOS\n- **VC or group governance overriding agency choice** — Assisi\n\n### Aspirations\n- **Become the dominant brand in their Amazon category** — Everlast, Assisi, IBC Simply\n- **Build a sustainable, scalable direct relationship with Amazon consumers** — all\n- **Establish a long-term strategic agency partnership** — Aqualisa, Brita, INCOS\n- **Use Amazon as a channel management anchor that preserves price across all retail** — Aqualisa, Blanco, INCOS\n\n---\n\n## Objections\n\nCommon objections across the cohort:\n\n1. **Cost / budget ceiling** — \"Everybody wants a Ferrari for Mondo money.\" [Jonathan Crowe, 34:31, Aqualisa]. Retainers are scrutinised; commission-only or performance models preferred by several.\n2. **Proving incremental value over current setup** — Brita needs Optimizon to justify value over eManage; INCOS needs to see that advertising investment actually moves revenue.\n3. **Trust and continuity** — INCOS explicitly said the relationship broke down with team changes (Dan Walsh departure); Assisi worried about further changes.\n4. **Internal approvals** — Blanco (Head of Sales + Germany sign-off), IBC Simply (FD), Aqualisa (marketing budget approval), Assisi (VC oversight).\n5. **Risk of Amazon cannibalisation of retail** — Aqualisa, Blanco, INCOS: concern that Amazon growth will undercut established retail partners or exclusive arrangements.\n\n---\n\n## Evaluations\n\n### Sentiment by Prospect\n\n| Prospect | Sentiment | Notes |\n|---|---|---|\n| Aqualisa | Very positive / urgent | Ready to move; frustrated with incumbent |\n| Brita | Cautious positive | Thorough; evaluating multiple agencies |\n| Blanco | Neutral / exploratory | No urgency; learning phase |\n| Everlast | Positive (active client) | Operationally trusting; some commercial caution from owner |\n| IBC Simply | Mixed | Kate positive; Michael (FD) blocking EU growth |\n| Assisi | Positive with caveats | Trevor transparent about VC risks to partnership |\n| INCOS | Cautiously optimistic | Wants reset; frustrated with past delivery |\n\n### Key Decision Criteria (across cohort)\n1. Proactivity — do they come to us with ideas, not just wait?\n2. Strategic depth — do they think beyond tactics to channel and brand strategy?\n3. Amazon expertise — do they understand vendor dynamics, hybrid models, forecasting?\n4. Reporting quality — can they present data in a way that satisfies finance/senior stakeholders?\n5. Pricing/commercial flexibility — will they work within our budget model?\n6. Team continuity — will there be churn in our account team?\n7. Relationship and trust — do they feel like a partner?\n\n### Alternatives Considered\n- **Aqualisa:** Incumbent agency (rolling month-to-month); evaluated when they lost the original pitch ~1.5 years prior\n- **Brita:** eManage (primary partner); one Germany-based agency (failed, exiting); evaluating 2–3 other agencies alongside Optimizon\n- **Blanco:** No formal alternatives mentioned; internal resource and German team comparison\n- **Everlast:** No other agency mentioned; Optimizon is the full-service partner\n- **IBC Simply:** No other agency change; evaluating whether to expand with Optimizon or find specialist EU partner\n- **Assisi:** Melody (second agency for Burns/Yakkers); Profitero (VC-introduced tool/partner)\n- **INCOS:** Lina/Thomas (internal junior team managing day-to-day); Optimizon under review\n\n### Key Differentiators (what made Optimizon stand out or matter)\n- Amazon Platinum Partner status (only 3 in Europe) — mentioned by Gareth to Brita [36:50]\n- Nozzle.ai proprietary LTV/cohort tool — valued by Assisi, INCOS, Brita\n- Hybrid vendor+seller strategy capability — Aqualisa, INCOS, Blanco\n- PACView retail media platform — Blanco, INCOS, Assisi\n- LingWorks multi-marketplace integration — Blanco\n- Retail model (Optimizon-owned seller account as low-risk entry) — Aqualisa, Assisi, IBC Simply\n- Global expansion capability (offices in EU, US, AU) — Aqualisa\n\n---\n\n## Vision — What Success Looks Like\n\n| Prospect | Vision of Success |\n|---|---|\n| Aqualisa | Amazon at £1.2–1.3M by end 2026; Seller Central live; pricing controlled; brand store built; B&Q/eBay all optimised; potential EU expansion by 2027 |\n| Brita | Two strong, competing 3P partners with zero channel friction; Amazon seller volume growing across taps and specialist products; DSP trial launched |\n| Blanco | UK Amazon matching Germany's proportional contribution (10–20% of turnover); clean product content in English; price integrity maintained |\n| Everlast | 2–3M EUR across EU Amazon markets; inventory always in stock; brand building on Amazon converting awareness from D2C |\n| IBC Simply | Core UK business continuing to grow; new health-aligned products cracking EU economics; France and Italy expanding; TACOS increasing toward market norms |\n| Assisi | Pet Munchies and Hollings as dominant natural pet brands on Amazon UK; 30% NTB consistently; DSP running full-funnel; Germany Pet Munchies launched |\n| INCOS | Clean hybrid vendor/seller strategy; ad spend increasing with visible ROI; France/Italy expansion with gift bundles; B2B case packs live; scorecard reporting trusted by finance |\n\n---\n\n## Recommendations\n\n### Key Patterns and Areas to Watch\n\n**1. The \"strategic gap\" is the primary pitch hook.**\nEvery account or prospect who is unhappy with their current setup describes the same problem: their agency or internal team is operational/tactical, not strategic. Optimizon must lead with strategic thinking in discovery conversations — not just capabilities. Sales questions should probe: \"Who owns the Amazon strategy today? What does that look like in practice?\"\n\n**2. Finance and internal stakeholders are the real decision-makers in many accounts.**\nJonathan Crowe (Aqualisa) had his marketing budget frozen. Michael Woodhead (IBC Simply) blocked EU expansion. Assisi's VC backers override some decisions. INCOS' internal PCOGS confusion cut ad spend. In every pitch and renewal, Optimizon should explicitly address how it helps the champion sell the value internally — scorecard reporting, clear ROI frameworks, and staged investment models all serve this purpose.\n\n**3. Pricing and channel management is the universal pain — position the hybrid model as the solution.**\nVendor clients universally fear price erosion. The hybrid 1P+3P model — where Optimizon's seller account maintains price integrity, serves as a buy-box backup, and enables new launches — is a strong differentiator. It addresses the fear without requiring the brand to abandon their vendor relationship.\n\n**4. Green flags to look for:**\n- Brand operates in premium/specialist category (not commodity)\n- Amazon revenue is declining or flat despite overall brand growth\n- Current agency is described as \"operational\" or \"tactical\"\n- The champion is a lone e-commerce lead or small team with upward reporting to finance/commercial\n- Brand has wide retail distribution (creates price-matching pressure = motivation to control Amazon)\n- EU or international expansion is on the roadmap even if not yet viable\n\n**5. Red flags to watch:**\n- Finance Director or VC is actively blocking investment (likely slow sales cycle; need champion strategy)\n- Brand's product price points are below ~£10 (Amazon fees eat margin; economics hard to justify)\n- No clear hard revenue targets (Blanco: no hard goals) = harder to close\n- Content/range is about to undergo major change (Aqualisa's EU Drinking Water Directive) = risk of low ROI on content investment in the short term\n- Global group governance sets 1P/vendor strategy and cannot be changed at UK level (Brita: 1P set by Germany)\n\n**6. The \"proactive partner\" positioning resonates across all accounts.**\nMultiple prospects explicitly said they want a partner who brings ideas — not one that waits to be told what to do. In sales conversations, Optimizon should demonstrate proactivity during the discovery itself: do live audits, point out issues on their Amazon listing during the call, show competitor analysis. This is what converts \"curious\" prospects into signed clients (as evidenced by Aqualisa's response to Juan's live listing analysis in the first call).\n\n**7. Reporting quality is a retention and expansion issue.**\nINCOS' relationship degraded when reporting failed to present the full picture (PCOGS vs retail). Assisi's VC backers scrutinise NTB and ROAS. IBC Simply's FD needs margin clarity. Building a scorecard-first reporting approach — one that addresses the finance stakeholder, not just the e-commerce champion — is critical for account retention and growth.\n\n**8. Team continuity matters disproportionately.**\nINCOS' relationship crisis was triggered by Dan Walsh stepping back. Assisi's conversation explicitly acknowledged transition risk. Brita wants to know who they'll be working with day-to-day. In new business pitches, introduce the full account team early; make handovers visible and managed.\n"}, {"filename": "Meta ICP Persona-Heritage Manufacturer Brands-002--2026-04-30--1430.md", "folder": "Meta Personas", "content": "---\ntype: meta-persona\ngroup: Heritage Manufacturer Brands\ninstance_id: \"002\"\ngenerated_date: 2026-04-30\ngenerated_time: \"14:30\"\nprospects:\n  - client_name: Aqualisa\n    participants:\n      - name: Jonathan Crowe\n        role: Head of Online & Omni-Channel Sales\n        company: Fortune Brands Innovations (Aqualisa parent)\n        email: jonathan.crowe@fbin.com\n        linkedin: https://uk.linkedin.com/in/jcrowe-dev\n  - client_name: Blanco\n    participants:\n      - name: David Kamperman\n        role: E-commerce Manager (UK)\n        company: Blanco\n        email: david.kamperman@blanco.co.uk\n        linkedin: https://uk.linkedin.com/in/david-kamperman-825ba235\n  - client_name: Draper Tools\n    participants:\n      - name: Simon Del Nevo\n        role: Managing Director (Europe)\n        company: Draper Tools\n        email: sdelnevo@drapertools.com\n        linkedin: https://www.linkedin.com/in/managingdirector-simon-del-nevo-/\n      - name: Kyle Duggan\n        role: E-commerce Project Manager\n        company: Draper Tools\n        email: kduggan@drapertools.com\n        linkedin: ~\n  - client_name: Everlast (Sportive)\n    participants:\n      - name: Tom Dols\n        role: Head of Operations / Amazon Operations\n        company: Sportive (Everlast European licensee)\n        email: ~\n        linkedin: ~\n      - name: Zeinab D Farahanii\n        role: Junior Paid Media Manager\n        company: Sportive (Everlast European licensee)\n        email: ~\n        linkedin: ~\n  - client_name: Harrow Sports\n    participants:\n      - name: Jack Knight\n        role: US-based commercial lead (squash/sports goods)\n        company: NLRP / Harrow Sports\n        email: jack.knight@nlrp.com\n        linkedin: https://www.linkedin.com/in/techsalesjack\n---\n\n# Meta ICP Persona — Instance 002 — Heritage Manufacturer Brands\n\n**Generated:** 2026-04-30 14:30 | **Prospects covered:** Aqualisa, Blanco, Draper Tools, Everlast (Sportive), Harrow Sports\n\n> **Data strength note:** Aqualisa (4 meetings), Draper (3 meetings, 126 min) and Everlast (2 meetings, 132 min, active client incl. 1 internal) are the strong anchors for this persona. Blanco (single 33-min call) and Harrow Sports (single 33-min call) reinforce the patterns but contributed less depth. Insights from the **internal Everlast meeting (25/02/2026)** and **internal Aqualisa Handover (08/04/2026)** are flagged separately and not used for prospect quotes.\n\n---\n\n## Summary\n\nThis persona centres on **established heritage manufacturers** of physical goods — bathroom fixtures, kitchen sinks, hand tools, sports equipment — selling on Amazon as one channel among many. Across all five accounts the same archetype emerges: a **lone commercial or e-commerce leader** (typically managing director, head of online, or e-com manager) inside a complex distribution business, trying to grow Amazon meaningfully despite a vendor relationship that erodes price control, an incumbent agency or internal team that is operational rather than strategic, content cloned or imported from another market, channel-conflict tension with traditional retail/distributor partners, and a budget that is either capped, unsigned, or has to be defended internally. The Amazon revenue picture is almost universally **declining or stagnant** even where overall brand health is fine, which is what triggers the Optimizon conversation. The opportunity is to position Optimizon as the **strategic partner** that reclaims pricing control via a hybrid 1P+3P model, rebuilds content to local-market standard, and reports in a way that satisfies finance and senior stakeholders.\n\n**Key profile bullets:**\n- UK or Europe-based heritage manufacturers; long-established brands with strong recognition in their category\n- Predominantly **vendor (1P)** today — most are exploring or partway through a transition to a hybrid 1P+3P model\n- Amazon revenue typically £400k–£10m and **flat or declining year-on-year** (Aqualisa down ~30% YoY; Draper UK down from £6.5m to £4.4m on vendor)\n- Premium or specialist positioning — these brands are rarely the cheapest in their category and feel particularly exposed to Amazon's price-pressure dynamics\n- Decision-maker is a **single senior commercial owner** (MD, Head of Online, E-com Manager) often working with a thin team and reporting upward to finance, parent group, or in some cases an overseas HQ\n- Primary pains: pricing erosion, channel conflict with own distributors/retailers, weak/unlocalised content, lack of strategic agency input, inventory/forecasting gaps, internal politics around treating Amazon as a real channel\n- Budget profile: **cautious and defensible** — £4.5–10k/month retainer territory, often with finance gatekeeping; ad spend has to be justified against ROAS not just gross sales\n- Decision criteria: strategic depth, proactivity, hybrid model expertise, ability to operate across multiple EU markets, and ability to report in a way that satisfies finance/parent group\n\n---\n\n## Cross-Company Overlapping Issues\n\n### 1. Loss of Pricing Control on Vendor / Buy-Box Erosion\nEvery prospect in this group cites pricing as a top concern. Vendor accounts have no levers; resellers and \"bedroom warriors\" undercut the buy box; cost-price increases are blocked by Amazon for years at a time.\n\n- **Aqualisa:** \"Our Amazon business is about 30% down year on year. I have no control on pricing.\" — [07:48] Jonathan Crowe, 14/01/2026\n- **Aqualisa:** \"Nobody has a pricing strategy other than let's just price scrape and take the cheapest price in the market kind of thing.\" — [00:30] Jonathan Crowe, 22/01/2026\n- **Draper:** \"I think the retail pricing is just out of control and I think that we're not in control of it at all. And I think these lost buy box percentage we're having is because we've got bedroom warriors out there carving it up.\" — [22:24] Simon Del Nevo, 14/01/2026\n- **Draper:** \"Our terms with Amazon vendor, I'm told, are brutal, right? They've given me some numbers, like on top of everything, we have to pay them like another 25 points on top of everything else we're doing.\" — [37:26] Simon Del Nevo, 14/01/2026\n- **Blanco:** \"The sticky subjects always around price… how do we maintain that price integrity across the business as well as being competitive… The main thing we want is… to maybe maintain some… control over pricing.\" — [00:05–00:10] [Other] (David Kamperman), 08/04/2026\n\n### 2. Incumbent Agency or Internal Team Is Operational, Not Strategic\nFour of five prospects explicitly describe their current setup as tactical-only and want a step up.\n\n- **Aqualisa:** \"Our existing agency have been unable to get us set up onto that Amazon seller platform… as yet, to my knowledge, that Amazon setup seller piece has not moved forward any further.\" — [06:05] Jonathan Crowe, 14/01/2026\n- **Aqualisa:** \"The real painful bit for me at the minute is Amazon. We're not set up in seller… they're raising tickets… it's painful.\" — [00:09] Jonathan Crowe, 16/01/2026\n- **Draper:** \"I don't think we've got people that really understand how to drive Amazon forward. I think we've got people that understand tools but not understand Amazon.\" — [20:40] Simon Del Nevo, 14/01/2026\n- **Draper:** \"There's a sales decline. So I asked James whether we're using another agent. I think there's some skepticism about the strategy. Having worked with Optimizum for many years, I sort of trust James's point of view on these things.\" — [25:15] Simon Del Nevo, 10/03/2026\n- **Blanco:** \"I've got limited experience with Amazon. It feels like a different market almost… to the continent.\" — [~00:20] [Other] (David Kamperman), 08/04/2026\n- **Harrow Sports:** \"We just basically sold to these clubs, so I've been trying to expand on everything else. I feel like we're missing out on a lot of revenue from from other channels. So Amazon specifically.\" — [~00:08] [Other] (Jack Knight), 15/04/2026\n\n### 3. Vendor → Hybrid (Vendor + Seller) Transition Stuck or Just Beginning\nAll five accounts are either stuck inside vendor, midway through a stalled seller setup, or about to start one.\n\n- **Aqualisa:** \"I want to grow marketplace because we dealt and still do deal with Amazon under a vendor relationship, which doesn't work for me.\" — [03:16] Jonathan Crowe, 14/01/2026\n- **Aqualisa:** \"I can just turn the taps on or turn them off as we need to, or put stuff on promotion or drop pricing, whatever I feel like it, to try and drive some interaction.\" — [39:46] Jonathan Crowe, 14/01/2026\n- **Draper:** \"We're not killing it in The UK. It's declining heavily. It was a £10,000,000 account. It's now down to a £7,000,000 account. The idea was that marketplace, we were gonna deviate away from vendor into marketplace and that's not really working.\" — [25:83] Simon Del Nevo, 10/03/2026\n- **Draper:** \"We need to look at vendor. We need to look at seller. The UK and do a study… The purpose today is just to figure out how do we get into the next step?\" — [25:31] Simon Del Nevo, 10/03/2026\n- **Everlast:** \"The FBA stuff is what you mentioned earlier about cannibalization. So obviously we cannot affect or support cannibalization in other retailers… So I'm but the segregation between Vendor Central and FBA with having the bundle which is — you're not cannibalizing. That's why we came up with the idea.\" — [~105:20] Tom Dols, 21/04/2026\n- **Harrow Sports:** \"We've had both, but right now, it's only seller.\" — [~00:08] [Other] (Jack Knight), 15/04/2026\n\n### 4. Content Imported / Cloned from Another Market — Not Localised\nThree prospects are running with content created for another country and no time/budget yet to rebuild it for the target market.\n\n- **Blanco:** \"We've cloned some [listings] from Germany into UK, and they don't translate well at all. They've still got the German [text]… you don't know what color it is unless you speak German.\" — [~00:25] [Other] (David Kamperman), 08/04/2026\n- **Aqualisa:** \"I don't think our content is good enough… the bread and butter is still the stuff that we sell today… it's our bread and butter.\" — [00:15] Jonathan Crowe, 22/01/2026\n- **Aqualisa:** \"We literally have three or 4,000 images… four colorways… that will be our big launch kind of thing.\" — [00:20] Jonathan Crowe, 22/01/2026 _(content investment held back pending the new launch)_\n- **Harrow Sports:** Plans to lift US listings into UK/EU — _\"the benefit of you guys being in seller is that we can port we can use your listings in The US and port all the listings that we want, the 20 SKUs that you want to launch into The EU and UK, and that brings over all the reviews\"_ — Jack confirmed this is the intent: \"Oh, nice.\" — [~00:18] [Other] (Jack Knight), 15/04/2026\n\n### 5. Channel Conflict with Distributors / Traditional Retail\nHeritage manufacturers' distributors actively resist Amazon — to the point of threatening to delist them.\n\n- **Draper:** \"There's a little bit of politics going on with these cars. So our core customer in Europe at the moment is places like Eurocar parts, you know those businesses, right? And they just say, oh, you're selling online, we're going to delist you because you're wankers. Basically, you're selling online. You should do everything you do through us.\" — [10:25] Simon Del Nevo, 14/01/2026\n- **Aqualisa:** \"They're being sold on Amazon by somebody. You're just not controlling that. You're not controlling that experience.\" — [00:10] Jonathan Crowe, 22/01/2026 _(third-party reseller \"Go Bathrooms\" had registered the Aqualisa brand store on Amazon — Aqualisa themselves had not)_\n- **Everlast:** \"Does it have to be a product that hasn't been sold anywhere else before or can it be in all the product that you're now using for Amazon exclusively?\" — [96:02] Tom Dols, 21/04/2026 _(cannibalisation of Decathlon and other retail partners is the stated concern — bundle SKUs are the workaround)_\n- **Harrow Sports:** Existing UK distributor is a family business \"they don't really sell anything for us\" — _\"If this distributor decided not to do it anymore, tomorrow, I would not be upset. I would rather go direct to you.\"_ — [~00:27] [Other] (Jack Knight), 15/04/2026\n\n### 6. Inventory & Forecasting as a Hard Cap on Growth\nAcross the strong-data accounts, inventory availability — not demand — is the binding constraint.\n\n- **Aqualisa:** \"We're carrying four times the stock holding, carrying all of that additional inventory… there's tons of it.\" — [21:02] Jonathan Crowe, 14/01/2026 _(SKU complexity: same product in 4 colourways/exclusive variants creates inventory drag)_\n- **Everlast:** \"Yeah. Keep in mind that we need about three, four months to get the stock in. So we still have about two months to adjust. When the first two months of this half year appear to be better than forecasted, we can still react.\" — [52:50] Tom Dols, 21/04/2026\n- **Everlast:** \"Shipping is about 10% to the UK. The shipping into the UK is about 10% of the order value. So if you ship it to Northern Ireland first, you're worse.\" — [20:04] Tom Dols, 21/04/2026\n- **Draper:** \"I think if we launched in 30 to 50 to begin with, that's probably worth doing. But there's a cost involved. So we sell for instance individual spanners. Well, if I sell an individual spanner and post it to Germany, I'm going to be losing my ass.\" — [12:06] Simon Del Nevo, 14/01/2026\n\n### 7. Defensible / Cautious Budgets — Finance & Parent-Group Gatekeeping\nSpend has to be argued for. None of these prospects have a generous unconstrained Amazon budget.\n\n- **Aqualisa:** \"The budget hasn't been signed off… I'm expecting it to be trimmed somewhere… I'm the only channel that was in double-digit growth last year.\" — [34:31] Jonathan Crowe, 14/01/2026\n- **Aqualisa:** \"I'm looking at spreading about a $150,175 grand across all of those… I don't see $50.60 grand on Amazon… Unachievable as a spend for this year.\" — [~00:20] Jonathan Crowe, 16/01/2026\n- **Draper:** \"Growth I think is my priority. You know, as long as I'm profitable, I'm not trying to be super profitable… because if I think about it, my cost-to-serve model is going to be quite low.\" — [31:09] Simon Del Nevo, 14/01/2026\n- **Harrow Sports:** \"I don't have a hard cap on it. But I wanted… it to be enough money where we're giving it a real shot. Like, anywhere between 5 and $10[k] a month… I wanna put enough money into it where we're not just praying that it takes off.\" — [~00:27] [Other] (Jack Knight), 15/04/2026\n- **Blanco:** No hard targets; sign-off required from Head of Sales (UK) and Germany — exploratory phase; advertising managed centrally from Germany.\n\n### 8. International / EU Expansion Ambition Constrained by Logistics & Politics\nAll five want EU/UK presence but each runs into a different friction.\n\n- **Blanco:** Germany already represents ~10–20% of annual turnover via Amazon; UK ~2%. _\"We are smaller, and it's a focus that they want us to try and try and improve and grow.\"_ — [~00:05] [Other] (David Kamperman), 08/04/2026\n- **Draper:** Targeting Germany Seller Central with FBA; UK team political resistance — needs to demonstrate growth before being given full European control.\n- **Everlast:** UK profitability compressed by 8% import duty and 10%-of-order-value shipping cost vs Germany. EU revenue split: DE ~40%, ES ~26%, UK ~16%.\n- **Aqualisa:** Sister brands (Shows of Darwin, Perrin & Rowe, Victoria & Albert) under same Fortune Brands group are longer-term EU expansion candidates.\n- **Harrow Sports:** US-headquartered, expanding into Europe for the first time. _\"How does Amazon work in Europe? Like… would there be a scenario where we'd have Amazon fulfillment shipping from, like, Germany to The UK or Germany to Spain? I don't know how that works really.\"_ — [~00:05] [Other] (Jack Knight), 15/04/2026\n\n---\n\n## Individual Prospect Profiles\n\n### 1. Aqualisa\n**Company:** Aqualisa (Fortune Brands Innovations) | **Category:** Premium showers / bathroom fixtures | **Amazon model:** Vendor (1P), Seller setup just being activated April 2026\n\nAqualisa's UK Amazon business has fallen ~30% YoY (~£1m → ~£675k). Jonathan Crowe is a commercially sharp, autonomous decision-maker for online/omni-channel; Amazon was the only channel showing decline against a portfolio that he's otherwise growing (B&Q Marketplace ~£200k in year one). Stalled with previous agency for over a year on Seller Central setup; now moving to Optimizon. Major new product line (~100 SKUs, 3,000+ assets, 4 colourways) launching mid-2026; EU Drinking Water Directive (Jan 2027) forces range simplification. Internal handover meeting (08/04/2026) confirms transition is in motion under Optimizon.\n\n**Key points:**\n- Revenue: ~£675k 2025; target £1.2–1.3m for 2026\n- Vendor only today; Seller Central activation in progress\n- Budget: ~£4.5–5k/month for current agency; Amazon ad budget circa £50–60k of a wider £150–175k retail-media pie; 2026 marketing budget unsigned at time of first call\n- Sister brands (Shows of Darwin, Perrin & Rowe, Victoria & Albert) = future portfolio opportunity\n- Sentiment: highly engaged, ready to move\n\n> \"I'm expecting to double my turnover on last year… I'm expecting 1.2, 1.3 million.\" — [37:03] Jonathan Crowe, 14/01/2026\n> \"I currently have or we currently use a price scripting tool… I think it's crap… not dynamic… I don't fully trust the data.\" — [00:30] Jonathan Crowe, 22/01/2026\n\n**Internal Optimizon handover (08/04/2026 — internal meeting; flagged):** Juan summarised the account state — _\"the agency was helping him transition to seller. That transition… really never happened\"_ — [00:05] Juan Botero, 08/04/2026 — and noted opportunity to bring in new assortment at the right price across both vendor and seller as Aqualisa rationalises its range.\n\n**Red flags:** Marketing budget unsigned; EU Drinking Water Directive risks investing in content for ranges that will be replaced; portfolio complexity inside Fortune Brands.\n**Green flags:** Autonomous, decisive champion; only growth channel in the business; multi-brand long-term opportunity; new launch creates a clean reset moment for content.\n\n---\n\n### 2. Blanco\n**Company:** Blanco UK | **Category:** Premium kitchen sinks, taps, waste components | **Amazon model:** Seller (historic, dormant); Germany = vendor with significant revenue\n\nUK = ~20 sales in 2024; Germany Amazon = ~10–20% of annual turnover. David Kamperman is a single-person UK e-com team managing 850+ SKUs with content cloned (German-language) from Germany. Advertising managed centrally by Germany. No hard sales targets — exploratory mid-2026 decision window. Will present commercial proposal to Head of Sales (UK) and German team.\n\n**Key points:**\n- 850+ UK SKUs; German content not localised; variation structures confusing for UK consumers\n- Advertising run from Germany — David has no ad lever in the UK\n- Decision needs Head of Sales sign-off; David is junior and exploratory\n- Indicative commercial offered: £5k/month + 5% sales + 4% ad management (start-up tier)\n\n> \"We don't necessarily split [the portfolio] between e-commerce, builders' merchants and retail. Our portfolio goes across all of those… It creates challenges internally for Blanco.\" — [~00:03] [Other] (David Kamperman), 08/04/2026\n> \"We're not there to, like, kill prices, but to just have… our fair share of the market pricing.\" — [~00:20] [Other] (David Kamperman), 08/04/2026\n\n**Red flags:** Single 33-min discovery call (thin data); near-zero UK revenue base; no hard targets; advertising controlled from Germany; long exploratory window.\n**Green flags:** German proof point (10–20% of turnover); 850 SKUs with existing German reviews to leverage; clear price-integrity pain that hybrid seller solves; primary contact is the de facto channel owner.\n\n---\n\n### 3. Draper Tools\n**Company:** Draper Tools (incl. Delta International acquisition) | **Category:** Hand tools, automotive tools, hardware | **Amazon model:** Vendor (1P) dominant — declining; small Seller (3P) presence; pushing toward hybrid\n\nUK vendor account has dropped from £6.5m → £4.4m YoY (~£2m down). France ~€800k, Italy ~€600k, Germany essentially zero. ~14,000 SKU portfolio; rationalisation toward £20+ retail planned to fix shipping cost-per-unit economics on small items. Simon Del Nevo (MD Europe) is the change agent; Kyle Duggan is e-com PM. Major channel-conflict tension with European trade retailers (Eurocar Parts and similar). New marketplace integrator (Effect Connect) recently signed; Amazon Germany Seller Central + FBA set-up is the immediate priority.\n\n**Key points:**\n- Revenue: UK vendor £4.4m (down from £6.5m); FR ~€800k; IT ~€600k; DE near-zero\n- ~14,000 SKUs; rationalising to £20+ items for shipping economics\n- Effect Connect signed; Germany 3P/FBA is top priority\n- Distributor/trade-partner channel conflict is acute (delisting threats)\n- Trust foundation: existing Optimizon Greenworks relationship referenced as the reason Simon brought Draper to the table\n\n> \"We're currently the UK 1P, the vendor account, is hemorrhaging. It's 2 million down. So it was six and a half this time last year. It's 4.4 this time this year, right? So it ain't working.\" — [14:11] Simon Del Nevo, 14/01/2026\n> \"I've got a very thin team and to be honest, the team in Europe, well, they're weak… the e-commerce frightens everybody to death and they're trying to force me into not doing it, which I'm ignoring.\" — [04:46] Simon Del Nevo, 14/01/2026\n\n**Red flags:** Internal political resistance from UK team; complex SKU portfolio; many low-margin small items will need to be culled; multiple territories to coordinate at once.\n**Green flags:** MD-level champion with appetite for change; trust based on prior Optimizon (Greenworks) relationship; Germany is essentially greenfield; Effect Connect commitment shows real investment in multi-marketplace; willing to scale ad spend to ~15% of revenue based on past learning.\n\n---\n\n### 4. Everlast (Sportive) — _Active client_\n**Company:** Sportive BV (Everlast European licensee) | **Category:** Sports/combat apparel & equipment | **Amazon model:** Vendor (1P) primary; FBA bundles trial (3P)\n\nEuropean licensee for Everlast (no US — Everlast manages its own brand in America). Tom Dols leads operations; Zeinab D Farahanii (junior paid media); founder/owner is hands-on commercially. 2025 saw 272 SKU launches and inventory gaps; bundle strategy launched for FBA in Q1 2026 explicitly to avoid cannibalising Decathlon and other retail partners. Targeting 10–15% category share by year-end; 2–3M EUR revenue ambition for 2026 across DE/ES/UK. Smolen group (parent) acquired Optimizon — backstops continuity. Dan Walsh (key account) departed April 2026; Joshua Sinclair taking over vendor management.\n\n**Key points:**\n- Revenue split: DE ~40%, ES ~26%, UK ~16%\n- Hybrid: Vendor primary; FBA bundle SKUs to segregate from retail partners\n- Lead time: 3–4 months on stock-in; 2-month adjustability inside the half\n- UK profitability pressured by 8% import duty + 10%-of-order-value shipping\n- Cost discipline is core to the business model — VC-free, cash-conversion focused\n\n> \"Yeah, yeah, no, no problem… I've been working for Spatif for four years now and I'm responsible for the operational side and all the day to day management and same with the Amazon — I run all that operations for Amazon as well. So that shipments going in and out.\" — [03:01] Tom Dols, 21/04/2026\n> \"Yeah. We have brands now, especially in the beauty space, that they want to see it working on Amazon before they put it in their shop because it's got a following.\" _(spoken by Optimizon — Tom contextually agreed; not used as a Tom quote, included as scene-setter only)_\n\n**Internal Optimizon meeting (25/02/2026 — internal Review Deck Run Through; flagged):** Optimizon team (Juan Botero, Dean Hawes, Dan Walsh) used the call to align on the deck for the 21/04/2026 client review. Internal observation: 2025 was supply-constrained — _\"the year basically was selling what they had\"_ — confirmation rate fell to ~26% on some Spring/Summer 2025 lines; P70/P90 forecasting methodology being adopted for 2026.\n\n**Red flags:** Account team transition (Dan Walsh → Josh Sinclair) creates near-term relationship risk; cash-conversion focus means ad spend increases need clear ROI; licensee structure caps geography to Europe.\n**Green flags:** Operationally sophisticated team; clear growth ambition (10–15% share, 2–3M EUR); Smolen/Optimizon group ownership; bundle strategy is a unique differentiator for cannibalisation-sensitive heritage brands.\n\n---\n\n### 5. Harrow Sports\n**Company:** NLRP / Harrow Sports | **Category:** Squash rackets, sports equipment | **Amazon model:** Seller (US, ~$10k/month, 400+ SKUs); Europe = greenfield\n\nUS-headquartered (Denver) heritage squash brand — biggest US squash manufacturer; sponsors 4 of the world top 10. Currently sell into US private clubs B2B; Amazon US ~$10k/month run by a small new agency. Distributor in UK (a former pro squash family) \"doesn't really sel
