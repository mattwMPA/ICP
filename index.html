<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ICP Viewer</title>
<style>
:root {
  color-scheme: light;
  --navy: #1e3a5f; --blue: #2563eb; --blue-light: #eff6ff;
  --purple: #7c3aed; --purple-light: #f5f3ff;
  --green: #059669; --green-light: #ecfdf5;
  --orange: #d97706; --orange-light: #fffbeb;
  --red: #dc2626; --bg: #f1f5f9; --card: #ffffff;
  --border: #e2e8f0; --text: #1e293b; --muted: #64748b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--navy); color: white; padding: 12px 24px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
.header-logo { font-size: 18px; font-weight: 700; letter-spacing: -.5px; }
.header-logo span { color: #60a5fa; }
.header-sub { font-size: 12px; color: #94a3b8; }
.header-spacer { flex: 1; }
.header-updated { font-size: 11px; color: #94a3b8; }
.header-btn { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25); color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: background .2s; }
.header-btn:hover { background: rgba(255,255,255,.25); }

#table-view { padding: 24px; max-width: 1100px; margin: 0 auto; }
.page-title { font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
.page-subtitle { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
.section-heading { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin: 24px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.file-grid { display: flex; flex-direction: column; gap: 10px; }

.file-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; cursor: pointer; transition: all .17s; display: flex; align-items: flex-start; gap: 14px; }
.file-card:hover { border-color: var(--blue); box-shadow: 0 4px 18px rgba(37,99,235,.10); transform: translateY(-1px); }
.file-card-icon { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.icon-individual { background: var(--blue-light); } .icon-meta { background: var(--purple-light); }
.file-card-body { flex: 1; min-width: 0; }
.file-card-title { font-size: 15px; font-weight: 600; color: var(--navy); margin-bottom: 5px; line-height: 1.35; }
.file-card-accounts { font-size: 13px; color: var(--text); margin-bottom: 8px; line-height: 1.5; }
.tags-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-blue { background: var(--blue-light); color: var(--blue); }
.badge-purple { background: var(--purple-light); color: var(--purple); }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-orange { background: var(--orange-light); color: var(--orange); }
.badge-gray { background: #f1f5f9; color: var(--muted); }
.file-card-date { font-size: 11px; color: var(--muted); flex-shrink: 0; padding-top: 2px; }
.pchip { display: inline-flex; align-items: center; gap: 4px; background: #f8fafc; border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px 2px 2px; font-size: 11px; color: var(--muted); margin-right: 4px; margin-bottom: 4px; }
.av-sm { width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg,#2563eb,#7c3aed); color: white; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
.av-md { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,#2563eb,#7c3aed); color: white; font-size: 13px; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }

#detail-view { display: none; }
.detail-topbar { background: white; border-bottom: 1px solid var(--border); padding: 11px 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; position: sticky; top: 56px; z-index: 50; }
.bc-home { color: var(--blue); cursor: pointer; font-size: 13px; } .bc-home:hover { text-decoration: underline; }
.bc-sep { color: var(--muted); font-size: 13px; }
.bc-cur { color: var(--text); font-weight: 500; font-size: 13px; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.detail-spacer { flex: 1; }
.action-btn { padding: 6px 13px; border-radius: 7px; border: 1px solid var(--border); background: white; color: var(--text); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all .15s; font-weight: 500; white-space: nowrap; }
.action-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
.action-btn.active { background: var(--orange-light); border-color: var(--orange); color: var(--orange); }

.detail-inner { max-width: 880px; margin: 0 auto; padding: 22px 24px; }
.detail-title { font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 12px; line-height: 1.3; }
.detail-participants { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.p-card { display: flex; align-items: center; gap: 8px; background: white; border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; }
.p-name { font-size: 13px; font-weight: 600; color: var(--navy); }
.p-role { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
.detail-meta-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }

.exec-banner { background: #fffbeb; border: 1px solid #f59e0b; border-radius: 8px; padding: 10px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #92400e; }

.sections-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.toolbar-label { font-size: 11px; color: var(--muted); }
.toolbar-spacer { flex: 1; }
.toolbar-btn { padding: 4px 9px; border: 1px solid var(--border); border-radius: 5px; background: white; color: var(--muted); font-size: 11px; cursor: pointer; }
.toolbar-btn:hover { border-color: var(--blue); color: var(--blue); }

.sections-container { display: flex; flex-direction: column; gap: 8px; }
.section-card { background: white; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.section-card.drag-above { box-shadow: 0 -3px 0 0 var(--blue); }
.section-card.drag-below { box-shadow: 0 3px 0 0 var(--blue); }
.section-card.dragging { opacity: .4; }
.section-header { display: flex; align-items: stretch; }
.drag-handle { width: 34px; padding: 13px 6px 13px 10px; cursor: grab; color: #cbd5e1; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.drag-handle:hover { color: var(--muted); } .drag-handle:active { cursor: grabbing; }
.section-title-area { flex: 1; padding: 13px 6px; font-size: 14px; font-weight: 600; color: var(--navy); line-height: 1.3; }
.section-toggle { width: 40px; border: none; background: none; cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center; padding: 13px 12px; transition: all .15s; flex-shrink: 0; }
.section-toggle:hover { color: var(--blue); background: var(--blue-light); }
.section-toggle svg { transition: transform .2s; }
.section-card.collapsed .section-toggle svg { transform: rotate(-90deg); }
.section-card:not(.collapsed) .section-header { border-bottom: 1px solid var(--border); }
.section-content { padding: 15px 18px 18px; font-size: 14px; line-height: 1.65; }
.section-card.collapsed .section-content { display: none; }

.section-content h3 { font-size: 12px; font-weight: 700; color: var(--navy); margin: 16px 0 7px; text-transform: uppercase; letter-spacing: .5px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.section-content h3:first-child { margin-top: 0; }
.section-content h2 { font-size: 15px; font-weight: 700; color: var(--navy); margin: 18px 0 9px; }
.section-content p { margin-bottom: 9px; }
.section-content ul { padding-left: 18px; margin-bottom: 9px; }
.section-content ol { padding-left: 20px; margin-bottom: 9px; }
.section-content li { margin-bottom: 4px; }
.section-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.section-content strong { color: var(--navy); }
.section-content em { color: #475569; }
.section-content code { background: #f1f5f9; border-radius: 3px; padding: 1px 4px; font-family: monospace; font-size: 12px; color: #be185d; }
.section-content a { color: var(--blue); text-decoration: none; }
.section-content a:hover { text-decoration: underline; }
.section-content blockquote { border-left: 3px solid var(--blue); background: var(--blue-light); border-radius: 0 6px 6px 0; padding: 9px 13px; margin: 7px 0 11px; }
.section-content blockquote p { margin-bottom: 3px; font-size: 13px; color: #374151; }
.section-content blockquote p:last-child { margin-bottom: 0; }
.section-content table { border-collapse: collapse; width: 100%; margin: 10px 0 14px; font-size: 13px; }
.section-content th { background: var(--navy); color: white; padding: 8px 12px; text-align: left; font-weight: 600; font-size: 12px; white-space: nowrap; }
.section-content td { padding: 7px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
.section-content tr:last-child td { border-bottom: none; }
.section-content tbody tr:hover td { background: var(--blue-light); }
.section-content tbody tr:nth-child(even) td { background: #f8fafc; }
.section-content tbody tr:nth-child(even):hover td { background: var(--blue-light); }

.exec-section { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 12px; }
.exec-section h2 { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.exec-body { font-size: 14px; line-height: 1.65; }
.exec-body p { margin-bottom: 9px; } .exec-body ul { padding-left: 18px; margin-bottom: 9px; } .exec-body li { margin-bottom: 4px; }
.exec-body strong { color: var(--navy); } .exec-body em { color: #475569; }
.exec-prospect { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
.exec-prospect-name { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 5px; }
.exec-prospect-body { font-size: 13px; color: var(--text); line-height: 1.6; }
.exec-prospect-body p { margin-bottom: 5px; } .exec-prospect-body strong { color: var(--navy); }


@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.refresh-note { background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #166534; display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>
<div class="header">
  <div class="header-logo">ICP<span>Viewer</span></div>
  <div class="header-sub">Optimizon</div>
  <div class="header-spacer"></div>
  <span class="header-updated" id="last-updated"></span>
  <button class="header-btn" onclick="requestRefresh()">↻ Refresh</button>
</div>

<div id="table-view"></div>
<div id="detail-view"></div>

<script>
// ── Embedded file data (updated by Claude on refresh) ────────────────────

// ── State ────────────────────────────────────────────────────────────────
let FILES = [];
let FILE_SECTIONS = {};  // key → [sections]
let sectionOrders = {};
let collapsedSets = {};
let execModes = {};
let currentView = 'table';
let currentFileKey = null;
let dragSrcIdx = null;
let dragTarget = null;

// ── Boot ─────────────────────────────────────────────────────────────────
// ── GitHub Config ─────────────────────────────────────────────────────────
const GITHUB_REPO    = 'mattwMPA/ICP';
const GITHUB_BRANCH  = 'main';
const GITHUB_FOLDERS = ['Individual Personas', 'Meta Personas'];

// ── Boot ─────────────────────────────────────────────────────────────────
async function loadFromGitHub() {
  const btn = document.querySelector('.header-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⟳ Loading…'; }
  showLoadingState();
  showView('table');
  try {
    const allFiles = [];
    for (const folder of GITHUB_FOLDERS) {
      const apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/${encodeURIComponent(folder)}?ref=${GITHUB_BRANCH}`;
      const listRes = await fetch(apiUrl, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
      if (!listRes.ok) {
        if (listRes.status === 404) continue; // folder may not exist yet
        throw new Error(`GitHub API returned ${listRes.status} for folder "${folder}". Is the repo public?`);
      }
      const items = await listRes.json();
      const mdFiles = items.filter(i => i.name.endsWith('.md') && i.type === 'file');
      await Promise.all(mdFiles.map(async item => {
        const r = await fetch(item.download_url);
        if (!r.ok) return;
        const text = await r.text();
        allFiles.push({ filename: item.name, folder, content: text });
      }));
    }
    if (!allFiles.length) throw new Error('No .md files found. Check the repo is public and the folder names match.');
    FILES = allFiles.map(parseFile);
    FILES.forEach(f => { FILE_SECTIONS[f.key] = f.sections; });
    const dates = FILES.map(f => f.meta.generatedDate).filter(Boolean).sort().reverse();
    document.getElementById('last-updated').textContent = dates[0] ? 'Data as of ' + dates[0] : '';
    renderTable();
  } catch (err) {
    showErrorState(err.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '↻ Refresh'; }
  }
}

function showLoadingState() {
  document.getElementById('table-view').innerHTML = `
    <div style="padding:80px 24px;text-align:center">
      <div style="font-size:40px;margin-bottom:16px;display:inline-block;animation:spin 1s linear infinite">⟳</div>
      <div style="font-size:16px;font-weight:600;color:var(--navy);margin-bottom:8px">Loading personas…</div>
      <div style="font-size:13px;color:var(--muted)">Fetching latest .md files from GitHub</div>
    </div>`;
}

function showErrorState(msg) {
  document.getElementById('table-view').innerHTML = `
    <div style="padding:80px 24px;text-align:center">
      <div style="font-size:40px;margin-bottom:16px">⚠️</div>
      <div style="font-size:16px;font-weight:600;color:var(--red);margin-bottom:10px">Could not load files</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:24px;max-width:500px;margin-left:auto;margin-right:auto">${msg}</div>
      <button onclick="loadFromGitHub()" style="padding:8px 20px;background:var(--blue);color:white;border:none;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600">↻ Try Again</button>
    </div>`;
}

window.addEventListener('DOMContentLoaded', () => { loadFromGitHub(); });

async function requestRefresh() { await loadFromGitHub(); }

// ── View ─────────────────────────────────────────────────────────────────
function showView(v) {
  document.getElementById('table-view').style.display = v === 'table' ? 'block' : 'none';
  document.getElementById('detail-view').style.display = v === 'detail' ? 'block' : 'none';
  currentView = v;
}

// ── File Parsing ──────────────────────────────────────────────────────────
function parseFile(raw) {
  const { filename, folder, content } = raw;
  const key = folder + '/' + filename;
  const yamlMatch = content.match(/^---\n([\s\S]*?)\n---\n/);
  const yamlRaw = yamlMatch ? yamlMatch[1] : '';
  const body = yamlMatch ? content.slice(yamlMatch[0].length) : content;
  const meta = parseYAML(yamlRaw);
  const sections = parseSections(body);
  const titleLine = body.split('\n').find(l => l.startsWith('# '));
  const title = titleLine ? titleLine.slice(2).trim() : filename;
  return { key, filename, folder, meta, title, sections };
}

function parseYAML(yaml) {
  const m = rx => { const r = yaml.match(rx); return r ? r[1].trim() : null; };
  const meta = {
    clientName: m(/^client_name:\s*(.+)$/m),
    type: m(/^type:\s*(.+)$/m),
    group: m(/^group:\s*["']?(.+?)["']?$/m),
    generatedDate: m(/^generated_(?:at|date):\s*(.+)$/m),
    tags: [], participants: [], prospects: []
  };
  const tb = yaml.match(/^tags:\n((?:[ \t]+-[^\n]+\n?)+)/m);
  if (tb) meta.tags = [...tb[1].matchAll(/- (.+)/g)].map(x => x[1].trim());
  const ps = yaml.indexOf('participants:\n');
  if (ps !== -1 && !yaml.slice(0, ps).includes('prospects:'))
    meta.participants = parseParticipantBlock(yaml.slice(ps + 'participants:\n'.length), '  ');
  const pr = yaml.indexOf('prospects:\n');
  if (pr !== -1) meta.prospects = parseProspects(yaml.slice(pr + 'prospects:\n'.length));
  return meta;
}

function parseParticipantBlock(block, ind) {
  const parts = []; let cur = null;
  for (const line of block.split('\n')) {
    const nm = line.match(new RegExp('^' + ind + '- name:\\s*(.+)$'));
    const rm = line.match(new RegExp('^' + ind + '  role:\\s*(.+)$'));
    if (nm) { if (cur) parts.push(cur); cur = { name: nm[1].trim() }; }
    else if (rm && cur) cur.role = rm[1].trim().replace(/^~$/, '');
    else if (line && !line.startsWith(ind) && cur) { parts.push(cur); cur = null; break; }
  }
  if (cur) parts.push(cur);
  return parts;
}

function parseProspects(block) {
  const prospects = []; const lines = block.split('\n');
  let cur = null, inP = false, pLines = [];
  for (const line of lines) {
    if (line.match(/^  - client_name:/)) {
      if (cur) { cur.participants = parseParticipantBlock(pLines.join('\n') + '\n', '      '); prospects.push(cur); }
      cur = { clientName: line.replace(/^  - client_name:\s*/, '').trim(), participants: [] };
      inP = false; pLines = [];
    } else if (cur && line.match(/^    participants:/)) { inP = true; }
    else if (inP && line.match(/^      /)) { pLines.push(line); }
    else if (line.match(/^[a-z]/) || (line.match(/^\S/) && !line.match(/^  /))) { break; }
  }
  if (cur) { cur.participants = parseParticipantBlock(pLines.join('\n') + '\n', '      '); prospects.push(cur); }
  return prospects;
}

function parseSections(body) {
  const lines = body.split('\n');
  const sections = []; let cur = null, curLines = [];
  for (const line of lines) {
    if (line.startsWith('# ')) continue;
    if (line.startsWith('## ')) {
      if (cur !== null) sections.push({ title: cur, content: curLines.join('\n') });
      cur = line.slice(3).trim(); curLines = [];
    } else if (cur !== null) { curLines.push(line); }
  }
  if (cur !== null) sections.push({ title: cur, content: curLines.join('\n') });
  return sections;
}

// ── Markdown ──────────────────────────────────────────────────────────────
function mdToHtml(text) {
  const lines = text.split('\n'), out = [];
  let inUl = false, inOl = false, inBq = false, tableRows = [];

  const close = () => {
    if (inUl) { out.push('</ul>'); inUl = false; }
    if (inOl) { out.push('</ol>'); inOl = false; }
    if (inBq) { out.push('</blockquote>'); inBq = false; }
  };

  const parseRow = row => row.split('|').slice(1,-1).map(c => c.trim());
  const isSepRow = row => /^\|[-:\s|]+\|$/.test(row.trim());

  const flushTable = () => {
    if (!tableRows.length) return;
    const sepIdx = tableRows.findIndex(isSepRow);
    const hasHeader = sepIdx === 1;
    out.push('<div style="overflow-x:auto"><table>');
    if (hasHeader) {
      out.push('<thead><tr>' + parseRow(tableRows[0]).map(c => `<th>${fmt(c)}</th>`).join('') + '</tr></thead>');
    }
    out.push('<tbody>');
    const dataStart = hasHeader ? 2 : (sepIdx >= 0 ? sepIdx + 1 : 0);
    for (let i = dataStart; i < tableRows.length; i++) {
      if (isSepRow(tableRows[i])) continue;
      out.push('<tr>' + parseRow(tableRows[i]).map(c => `<td>${fmt(c)}</td>`).join('') + '</tr>');
    }
    out.push('</tbody></table></div>');
    tableRows = [];
  };

  for (const line of lines) {
    if (line.startsWith('|')) {
      close(); tableRows.push(line);
    } else {
      flushTable();
      if (line.startsWith('### ')) { close(); out.push('<h3>' + fmt(line.slice(4)) + '</h3>'); }
      else if (line.startsWith('## ')) { close(); out.push('<h2>' + fmt(line.slice(3)) + '</h2>'); }
      else if (line === '---') { close(); out.push('<hr>'); }
      else if (line.startsWith('> ')) {
        if (inUl) { out.push('</ul>'); inUl = false; }
        if (inOl) { out.push('</ol>'); inOl = false; }
        if (!inBq) { out.push('<blockquote>'); inBq = true; }
        const c = line.slice(2).trim(); if (c) out.push('<p>' + fmt(c) + '</p>');
      } else if (line.match(/^[-*] /)) {
        if (inBq) { out.push('</blockquote>'); inBq = false; }
        if (inOl) { out.push('</ol>'); inOl = false; }
        if (!inUl) { out.push('<ul>'); inUl = true; }
        out.push('<li>' + fmt(line.replace(/^[-*] /, '')) + '</li>');
      } else if (line.match(/^\d+\. /)) {
        if (inBq) { out.push('</blockquote>'); inBq = false; }
        if (inUl) { out.push('</ul>'); inUl = false; }
        if (!inOl) { out.push('<ol>'); inOl = true; }
        out.push('<li>' + fmt(line.replace(/^\d+\. /, '')) + '</li>');
      } else if (line.trim() === '') {
        if (inBq) { out.push('</blockquote>'); inBq = false; }
      } else {
        close();
        if (line.trim()) out.push('<p>' + fmt(line) + '</p>');
      }
    }
  }
  flushTable(); close();
  return out.join('\n');
}
function fmt(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*\*([^*\n]+)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
    .replace(/`([^`\n]+)`/g,'<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
}

// ── Table View ─────────────────────────────────────────────────────────────
function renderTable() {
  const el = document.getElementById('table-view');
  const individuals = FILES.filter(f => f.folder === 'Individual Personas');
  const metas = FILES.filter(f => f.folder === 'Meta Personas')
    .sort((a, b) => {
      const n = f => parseInt((f.filename.match(/-(\d{3})--/) || ['','999'])[1]);
      return n(a) - n(b);
    });
  let html = `<div style="padding:24px;max-width:1100px;margin:0 auto">
    <div class="page-title">ICP Persona Library</div>
    <div class="page-subtitle">${FILES.length} persona file${FILES.length !== 1?'s':''} · Click any card to read in full</div>
    <div class="refresh-note">↻ Click <strong>Refresh</strong> to reload from GitHub and pick up any new files.</div>`;
  if (metas.length) html += `<div class="section-heading">🗂 Meta Personas</div><div class="file-grid">${metas.map(fileCardHtml).join('')}</div>`;
  if (individuals.length) html += `<div class="section-heading">👤 Individual Personas</div><div class="file-grid">${individuals.map(fileCardHtml).join('')}</div>`;
  html += '</div>';
  el.innerHTML = html;
  el.querySelectorAll('.file-card').forEach(c => c.addEventListener('click', () => {
    const f = FILES.find(x => x.key === c.dataset.key); if (f) openFile(f);
  }));
}

function fileCardHtml(f) {
  const { meta, title, folder, key } = f;
  const isMeta = folder === 'Meta Personas';
  const typeBadge = isMeta ? `<span class="badge badge-purple">Meta Persona</span>` : `<span class="badge badge-blue">Individual Persona</span>`;
  const statusBadge = meta.tags.includes('client') ? `<span class="badge badge-green">✓ Client</span>` : meta.tags.includes('prospect') ? `<span class="badge badge-orange">◎ Prospect</span>` : '';
  const groupBadge = meta.group ? `<span class="badge badge-gray">${esc(meta.group)}</span>` : '';
  let accounts = '';
  if (isMeta && meta.prospects.length) {
    accounts = `<div class="file-card-accounts">Covers: ${meta.prospects.map(p=>`<strong>${esc(p.clientName)}</strong>`).join(', ')}</div>`;
    const chips = meta.prospects.flatMap(p=>p.participants.slice(0,2)).slice(0,6);
    if (chips.length) accounts += `<div style="margin-bottom:6px">${chips.map(chipHtml).join('')}</div>`;
  } else if (!isMeta && meta.participants.length) {
    accounts = `<div class="file-card-accounts"><strong>${esc(meta.clientName||'')}</strong></div><div style="margin-bottom:6px">${meta.participants.slice(0,4).map(chipHtml).join('')}</div>`;
  }
  return `<div class="file-card" data-key="${esc(key)}">
    <div class="file-card-icon ${isMeta?'icon-meta':'icon-individual'}">${isMeta?'🗂':'👤'}</div>
    <div class="file-card-body">
      <div class="file-card-title">${esc(title)}</div>${accounts}
      <div class="tags-row">${typeBadge}${statusBadge}${groupBadge}</div>
    </div>
    <div class="file-card-date">${esc(meta.generatedDate||'')}</div>
  </div>`;
}
function chipHtml(p) { return `<span class="pchip"><span class="av-sm">${inits(p.name)}</span>${esc(p.name)}</span>`; }

// ── Detail View ────────────────────────────────────────────────────────────
function openFile(file) {
  currentFileKey = file.key;
  if (!execModes[file.key]) execModes[file.key] = false;
  if (!collapsedSets[file.key]) collapsedSets[file.key] = new Set();
  if (!sectionOrders[file.key]) sectionOrders[file.key] = file.sections.map((_,i)=>i);
  renderDetail(file);
  showView('detail');
  window.scrollTo(0,0);
}

function renderDetail(file) {
  const { meta, title, folder, key, sections } = file;
  const isMeta = folder === 'Meta Personas';
  const isExec = execModes[key]||false;
  const allP = isMeta ? meta.prospects.flatMap(p=>p.participants.map(pp=>({...pp,company:p.clientName}))) : meta.participants;
  const pHtml = allP.slice(0,8).map(p=>`<div class="p-card"><div class="av-md">${inits(p.name)}</div><div><div class="p-name">${esc(p.name)}</div><div class="p-role">${esc(p.role||p.company||'')}</div></div></div>`).join('')+(allP.length>8?`<div class="p-card"><div class="av-md" style="background:#64748b">+${allP.length-8}</div></div>`:'');
  const typeBadge = isMeta?`<span class="badge badge-purple">Meta Persona</span>`:`<span class="badge badge-blue">Individual Persona</span>`;
  const statusBadge = meta.tags.includes('client')?`<span class="badge badge-green">✓ Client</span>`:meta.tags.includes('prospect')?`<span class="badge badge-orange">◎ Prospect</span>`:'';
  const groupBadge = meta.group?`<span class="badge badge-gray">${esc(meta.group)}</span>`:'';
  const dateBadge = meta.generatedDate?`<span class="badge badge-gray">📅 ${esc(meta.generatedDate)}</span>`:'';
  const topbar = `<div class="detail-topbar">
    <span class="bc-home" onclick="goHome()">Home</span><span class="bc-sep">›</span>
    <span class="bc-sep">${esc(folder)}</span><span class="bc-sep">›</span>
    <span class="bc-cur">${esc(title)}</span>
    <div class="detail-spacer"></div>
    <button class="action-btn" onclick="expandAll('${esc(key)}')">⊞ Expand All</button>
    <button class="action-btn" onclick="collapseAll('${esc(key)}')">⊟ Collapse All</button>
    <button class="action-btn ${isExec?'active':''}" onclick="toggleExec('${esc(key)}')">
      ${isExec?'📄 Full View':'✦ Exec Summary'}
    </button>
  </div>`;
  const header = `<div class="detail-title">${esc(title)}</div>
    ${pHtml?`<div class="detail-participants">${pHtml}</div>`:''}
    <div class="detail-meta-row">${typeBadge}${statusBadge}${groupBadge}${dateBadge}</div>`;
  const body = isExec ? renderExecSummary(file) : renderSections(file);
  document.getElementById('detail-view').innerHTML = topbar + `<div class="detail-inner">${header}${body}</div>`;
  if (!isExec) initDragDrop(key);
}

function renderSections(file) {
  const { key, sections } = file;
  const order = sectionOrders[key]||sections.map((_,i)=>i);
  const collapsed = collapsedSets[key]||new Set();
  const toolbar = `<div class="sections-toolbar">
    <span class="toolbar-label">⠿ Drag to reorder · Click chevron to collapse</span>
    <div class="toolbar-spacer"></div>
    <button class="toolbar-btn" onclick="expandAll('${esc(key)}')">Expand All</button>
    <button class="toolbar-btn" onclick="collapseAll('${esc(key)}')">Collapse All</button>
  </div>`;
  const keyId = key.replace(/[^a-z0-9]/gi,'_');
  const cards = order.map((sIdx,pos) => {
    const s = sections[sIdx]; if (!s) return '';
    const isC = collapsed.has(sIdx);
    return `<div class="section-card${isC?' collapsed':''}" data-sec-idx="${sIdx}" data-pos="${pos}" draggable="true">
      <div class="section-header">
        <div class="drag-handle" title="Drag to reorder">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
            <circle cx="4" cy="3" r="1.4"/><circle cx="10" cy="3" r="1.4"/>
            <circle cx="4" cy="7" r="1.4"/><circle cx="10" cy="7" r="1.4"/>
            <circle cx="4" cy="11" r="1.4"/><circle cx="10" cy="11" r="1.4"/>
          </svg>
        </div>
        <div class="section-title-area">${esc(s.title)}</div>
        <button class="section-toggle" onclick="toggleSection('${esc(key)}',${sIdx})">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="2,4 6.5,9 11,4"/></svg>
        </button>
      </div>
      <div class="section-content">${mdToHtml(s.content)}</div>
    </div>`;
  }).join('');
  return toolbar + `<div class="sections-container" id="sc_${keyId}">${cards}</div>`;
}

function renderExecSummary(file) {
  const { key, sections, folder, meta } = file;
  const isMeta = folder === 'Meta Personas';
  const banner = `<div class="exec-banner">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#d97706" stroke-width="1.5"/><path d="M8 4.5v4M8 11h.01" stroke="#d97706" stroke-width="1.8" stroke-linecap="round"/></svg>
    <span><strong>Exec Summary</strong> — condensed view. Click <strong>Full View</strong> to see all sections.</span>
  </div>`;
  const sumSec = sections.find(s => s.title.toLowerCase() === 'summary');
  let html = '';
  if (sumSec) html += `<div class="exec-section"><h2>Summary</h2><div class="exec-body">${mdToHtml(sumSec.content)}</div></div>`;
  if (isMeta) {
    const profSec = sections.find(s => s.title.toLowerCase().includes('individual prospect profile'));
    if (profSec) {
      html += `<div class="exec-section"><h2>Individual Prospects</h2>`;
      extractSubSections(profSec.content).forEach(sub => {
        html += `<div class="exec-prospect"><div class="exec-prospect-name">${esc(sub.title)}</div><div class="exec-prospect-body">${mdToHtml(firstPara(sub.content))}</div></div>`;
      });
      html += '</div>';
    } else if (meta.prospects.length) {
      html += `<div class="exec-section"><h2>Companies Covered</h2>`;
      meta.prospects.forEach(p => {
        html += `<div class="exec-prospect"><div class="exec-prospect-name">${esc(p.clientName)}</div>`;
        if (p.participants.length) html += `<div class="exec-prospect-body"><em>${p.participants.map(pp=>pp.name+(pp.role?' — '+pp.role:'')).join(', ')}</em></div>`;
        html += '</div>';
      });
      html += '</div>';
    }
  }
  return banner + html;
}

function extractSubSections(content) {
  const lines = content.split('\n'), subs = [];
  let cur = null, curLines = [];
  for (const line of lines) {
    if (line.startsWith('### ')) { if (cur) subs.push({title:cur,content:curLines.join('\n')}); cur=line.slice(4).trim(); curLines=[]; }
    else if (cur !== null) curLines.push(line);
  }
  if (cur) subs.push({title:cur,content:curLines.join('\n')});
  return subs;
}
function firstPara(content) {
  const lines = content.split('\n'); const para = []; let started = false;
  for (const line of lines) {
    if (line.startsWith('###')||line.startsWith('##')) break;
    if (line.trim()) { started=true; para.push(line); }
    else if (started&&para.length>0) break;
  }
  return para.join('\n');
}

// ── Drag & Drop ───────────────────────────────────────────────────────────
function initDragDrop(key) {
  const keyId = key.replace(/[^a-z0-9]/gi,'_');
  const container = document.getElementById('sc_'+keyId);
  if (!container) return;
  const getCards = () => [...container.querySelectorAll('.section-card')];
  container.addEventListener('dragstart', e => {
    const card = e.target.closest('.section-card'); if (!card) return;
    dragSrcIdx = parseInt(card.dataset.secIdx);
    setTimeout(()=>card.classList.add('dragging'),0);
    e.dataTransfer.effectAllowed='move';
  });
  container.addEventListener('dragend', () => {
    getCards().forEach(c=>c.classList.remove('dragging','drag-above','drag-below'));
    dragSrcIdx=null; dragTarget=null;
  });
  container.addEventListener('dragover', e => {
    e.preventDefault();
    const card = e.target.closest('.section-card'); if (!card||dragSrcIdx===null) return;
    getCards().forEach(c=>c.classList.remove('drag-above','drag-below'));
    const rect = card.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height/2;
    card.classList.add(before?'drag-above':'drag-below');
    dragTarget={idx:parseInt(card.dataset.secIdx),before};
  });
  container.addEventListener('drop', e => {
    e.preventDefault();
    if (dragSrcIdx===null||!dragTarget) return;
    const file = FILES.find(f=>f.key===key); if (!file) return;
    const order=[...(sectionOrders[key]||file.sections.map((_,i)=>i))];
    const from=order.indexOf(dragSrcIdx); order.splice(from,1);
    let to=order.indexOf(dragTarget.idx); if(!dragTarget.before) to++;
    order.splice(Math.max(0,to),0,dragSrcIdx);
    sectionOrders[key]=order;
    renderDetail(file); setTimeout(()=>initDragDrop(key),0);
  });
}

// ── Controls ──────────────────────────────────────────────────────────────
function toggleSection(key,sIdx) {
  if (!collapsedSets[key]) collapsedSets[key]=new Set();
  collapsedSets[key].has(sIdx)?collapsedSets[key].delete(sIdx):collapsedSets[key].add(sIdx);
  const f=FILES.find(x=>x.key===key); if(f){renderDetail(f); if(!execModes[key])initDragDrop(key);}
}
function expandAll(key) {
  if (!collapsedSets[key]) collapsedSets[key]=new Set();
  collapsedSets[key].clear();
  const f=FILES.find(x=>x.key===key); if(f){renderDetail(f); initDragDrop(key);}
}
function collapseAll(key) {
  const f=FILES.find(x=>x.key===key); if(!f)return;
  collapsedSets[key]=new Set(f.sections.map((_,i)=>i));
  renderDetail(f); initDragDrop(key);
}
function toggleExec(key) {
  execModes[key]=!execModes[key];
  const f=FILES.find(x=>x.key===key); if(f){renderDetail(f); if(!execModes[key])initDragDrop(key);}
}
function goHome() { currentFileKey=null; renderTable(); showView('table'); window.scrollTo(0,0); }

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function inits(n) { if(!n)return'?'; const p=n.trim().split(/\s+/); return(p.length>=2?p[0][0]+p[p.length-1][0]:n.slice(0,2)).toUpperCase(); }
</script>
